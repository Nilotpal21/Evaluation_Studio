# Kafka SASL auth test override — opt-in only.
#
# Switches the local Kafka broker from PLAINTEXT to SASL_PLAINTEXT so you
# can test the resolveKafkaAuth() path end-to-end without touching prod.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.kafka-auth-test.yml up -d kafka
#
# Then set in your .env (or export):
#   KAFKA_AUTH_ENABLED=true
#   KAFKA_SASL_MECHANISM=plain
#   KAFKA_SASL_USERNAME=abl_admin
#   KAFKA_SASL_PASSWORD=abl_dev_password
#   EVENT_KAFKA_BROKERS=localhost:19092
#
# Run auth-mode seed:
#   KAFKA_AUTH_ENABLED=true KAFKA_SASL_USERNAME=abl_admin KAFKA_SASL_PASSWORD=abl_dev_password pnpm seed:kafka:status
#
# Tear down and restore plain broker:
#   docker compose down kafka && docker compose up -d kafka

services:
  kafka:
    volumes:
      - ./docker/kafka-auth-test/kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro
      - ./docker/kafka-auth-test/kafka_client.properties:/etc/kafka/kafka_client.properties:ro
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 --command-config /etc/kafka/kafka_client.properties > /dev/null 2>&1',
        ]

  init-kafka-topics:
    environment:
      KAFKA_AUTH_ENABLED: 'true'
      KAFKA_SASL_MECHANISM: plain
      KAFKA_SASL_USERNAME: abl_admin
      KAFKA_SASL_PASSWORD: abl_dev_password
