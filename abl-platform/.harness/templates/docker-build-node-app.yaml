template:
  name: Docker Build Node App
  identifier: docker_build_node_app
  versionLabel: '1'
  type: Stage
  projectIdentifier: ABLPlatform
  orgIdentifier: default
  description: 'Build, scan (Trivy), and push a Node.js app Docker image to ACR.'
  spec:
    type: CI
    variables:
      - name: app_name
        type: String
        required: true
        value: <+input>
      - name: dockerfile_dir
        type: String
        required: true
        value: <+input>
    spec:
      cloneCodebase: true
      infrastructure:
        type: KubernetesDirect
        spec:
          connectorRef: ABL_AKS_Dev
          namespace: default
          automountServiceAccountToken: true
          nodeSelector:
            workload: ci
          tolerations:
            - key: workload
              operator: Equal
              value: ci
              effect: NoSchedule
          os: Linux
      execution:
        steps:
          - step:
              type: BuildAndPushACR
              name: Build Image
              identifier: build_image
              timeout: 30m
              spec:
                connectorRef: account.KoreaiAzure
                repository: acrabldev.azurecr.io/abl-<+stage.variables.app_name>
                tags:
                  - <+pipeline.stages.generate_tag.spec.execution.steps.generate_image_tag.output.outputVariables.IMAGE_TAG>
                  - <+pipeline.stages.generate_tag.spec.execution.steps.generate_image_tag.output.outputVariables.IMAGE_TAG_DATE>
                  - latest
                dockerfile: <+stage.variables.dockerfile_dir>/<+stage.variables.app_name>/Dockerfile
                target: production
                context: .
                buildArgs:
                  BUILDKIT_INLINE_CACHE: '1'
                labels:
                  org.opencontainers.image.source: <+codebase.repoUrl>
                  org.opencontainers.image.revision: <+codebase.commitSha>
                envVariables:
                  PLUGIN_NO_PUSH: 'true'
                  PLUGIN_TAR_PATH: abl-<+stage.variables.app_name>.tar
                resources:
                  limits:
                    memory: 8Gi
                    cpu: '4'
          - step:
              type: Run
              name: Trivy Scan
              identifier: trivy_scan
              timeout: 15m
              spec:
                connectorRef: Docker
                image: ghcr.io/aquasecurity/trivy:0.69.3
                shell: Sh
                command: |
                  set -euo pipefail
                  trivy image --input abl-<+stage.variables.app_name>.tar --severity CRITICAL,HIGH --ignore-unfixed --ignorefile .trivyignore --exit-code 1 --format table
                  trivy image --input abl-<+stage.variables.app_name>.tar --format spdx-json --output sbom-<+stage.variables.app_name>.json
          - step:
              type: BuildAndPushACR
              name: Push Image
              identifier: push_image
              timeout: 15m
              spec:
                connectorRef: account.KoreaiAzure
                repository: acrabldev.azurecr.io/abl-<+stage.variables.app_name>
                tags:
                  - <+pipeline.stages.generate_tag.spec.execution.steps.generate_image_tag.output.outputVariables.IMAGE_TAG>
                  - <+pipeline.stages.generate_tag.spec.execution.steps.generate_image_tag.output.outputVariables.IMAGE_TAG_DATE>
                  - latest
                dockerfile: <+stage.variables.dockerfile_dir>/<+stage.variables.app_name>/Dockerfile
                target: production
                context: .
                envVariables:
                  PLUGIN_PUSH_ONLY: 'true'
                  PLUGIN_SOURCE_TAR_PATH: abl-<+stage.variables.app_name>.tar
                resources:
                  limits:
                    memory: 8Gi
                    cpu: '4'
    failureStrategies:
      - onFailure:
          errors:
            - AllErrors
          action:
            type: MarkAsFailure
