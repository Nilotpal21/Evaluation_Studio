pipeline:
  name: Post Deploy Validation
  identifier: post_deploy_validation
  projectIdentifier: ABLPlatform
  orgIdentifier: default
  description: |
    Manual and scheduled validation pipeline for heavyweight suites that should
    not block PRs or merge-to-main CI. Runs deep integration tests in isolation
    plus deployed browser validation against the selected environment.
  tags:
    pipeline_type: validation
    trigger: manual_or_scheduled
  variables:
    - name: environment_name
      type: String
      description: 'Human-readable target environment label for logs and reporting.'
      required: false
      default: 'dev'
      value: <+input>.default(dev)
    - name: studio_url
      type: String
      description: 'Public Studio URL for deployed browser validation.'
      required: false
      default: 'https://agents-dev.kore.ai'
      value: <+input>.default(https://agents-dev.kore.ai)
    - name: runtime_api_url
      type: String
      description: 'Public Runtime base URL used by live environment tests.'
      required: false
      default: 'https://agents-dev.kore.ai'
      value: <+input>.default(https://agents-dev.kore.ai)
    - name: search_ai_url
      type: String
      description: 'Public SearchAI ingestion URL used by live environment tests.'
      required: false
      default: 'https://agents-dev.kore.ai/api/search-ai'
      value: <+input>.default(https://agents-dev.kore.ai/api/search-ai)
    - name: search_ai_runtime_url
      type: String
      description: 'Public SearchAI Runtime URL used by live environment tests.'
      required: false
      default: 'https://agents-dev.kore.ai/api/search-ai-runtime'
      value: <+input>.default(https://agents-dev.kore.ai/api/search-ai-runtime)
    - name: admin_url
      type: String
      description: 'Public Admin app URL. Set this before enabling Admin browser validation.'
      required: false
      default: 'https://agents-dev.kore.ai'
      value: <+input>.default(https://agents-dev.kore.ai)
    - name: login_email
      type: String
      description: 'Dev-login email used by live Studio environment tests.'
      required: false
      default: 'developer@kore.ai'
      value: <+input>.default(developer@kore.ai)
    - name: run_deep_integration
      type: String
      description: 'Run the heavyweight Node integration tier outside merge-gating CI.'
      required: false
      default: 'true'
      value: <+input>.default(true).selectOneFrom(true,false)
    - name: run_studio_live_e2e
      type: String
      description: 'Run the deployed Studio Playwright environment suite.'
      required: false
      default: 'true'
      value: <+input>.default(true).selectOneFrom(true,false)
    - name: run_admin_playwright
      type: String
      description: 'Run the deployed Admin Playwright suite after setting admin_url.'
      required: false
      default: 'false'
      value: <+input>.default(false).selectOneFrom(true,false)
  properties:
    ci:
      codebase:
        connectorRef: ablplatformconnector
        repoName: abl-platform
        build: <+input>
  stages:
    # ── Stage 1: Deep Integration Tests (moved out of merge gate) ──────────
    - stage:
        name: Deep Integration Tests
        identifier: deep_integration_tests
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.run_deep_integration> == "true"
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          serviceDependencies:
            - identifier: mongodb
              name: MongoDB 7
              type: Service
              spec:
                connectorRef: Docker
                image: mongo:7
                envVariables:
                  MONGO_INITDB_REPLICA_SET_NAME: rs0
                command: >-
                  mongod --replSet rs0 --bind_ip_all &&
                  mongosh --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
            - identifier: redis
              name: Redis 7
              type: Service
              spec:
                connectorRef: Docker
                image: redis:7
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
              - .turbo
          execution:
            steps:
              - step:
                  type: Run
                  name: Build and Run Deep Integration
                  identifier: build_and_run_deep_integration
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      sh ./scripts/ensure-workspace-install.sh "deep integration"

                      BUILD_FILTERS="--filter=@agent-platform/studio --filter=@agent-platform/search-ai --filter=@agent-platform/search-ai-runtime --filter=@agent-platform/runtime --filter=@agent-platform/multimodal-service"
                      TEST_FILTERS="--filter=./apps/studio --filter=./apps/search-ai --filter=./apps/search-ai-runtime --filter=./apps/runtime --filter=./apps/multimodal-service"
                      JUNIT_FLAGS="-- --reporter=default --reporter=junit --outputFile.junit=junit-report.xml"

                      echo "=== Environment: <+pipeline.variables.environment_name> ==="
                      pnpm turbo build ${BUILD_FILTERS} --concurrency=4
                      pnpm turbo test ${TEST_FILTERS} --concurrency=2 ${JUNIT_FLAGS}
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=8192'
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                      CI: 'true'
                      MONGODB_URL: 'mongodb://localhost:27017/abl_platform_validation?replicaSet=rs0&directConnection=true'
                      REDIS_URL: 'redis://localhost:6379'
                    resources:
                      limits:
                        memory: 12Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-report.xml'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 2: Deployed Studio Validation ────────────────────────────────
    - stage:
        name: Studio Live E2E
        identifier: studio_live_e2e
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.run_studio_live_e2e> == "true"
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Studio Live E2E
                  identifier: run_studio_live_e2e
                  spec:
                    connectorRef: Docker
                    image: mcr.microsoft.com/playwright:v1.58.2-noble
                    shell: Sh
                    command: |
                      corepack enable
                      sh ./scripts/ensure-workspace-install.sh "Studio live E2E"

                      echo "=== Environment: <+pipeline.variables.environment_name> ==="
                      echo "=== Studio URL: <+pipeline.variables.studio_url> ==="
                      pnpm --filter @agent-platform/studio exec playwright test --config=e2e-env.config.ts
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                      CI: 'true'
                      TEST_BASE_URL: <+pipeline.variables.studio_url>
                      TEST_RUNTIME_URL: <+pipeline.variables.runtime_api_url>
                      TEST_SEARCHAI_URL: <+pipeline.variables.search_ai_url>
                      TEST_SEARCHAI_RUNTIME_URL: <+pipeline.variables.search_ai_runtime_url>
                      TEST_LOGIN_EMAIL: <+pipeline.variables.login_email>
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 3: Deployed Admin Validation (opt-in until URL is finalized) ──
    - stage:
        name: Admin Live E2E
        identifier: admin_live_e2e
        type: CI
        when:
          pipelineStatus: Success
          condition: >-
            <+pipeline.variables.run_admin_playwright> == "true"
            && <+pipeline.variables.admin_url> != ""
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
          execution:
            steps:
              - step:
                  type: Run
                  name: Run Admin Live E2E
                  identifier: run_admin_live_e2e
                  spec:
                    connectorRef: Docker
                    image: mcr.microsoft.com/playwright:v1.58.2-noble
                    shell: Sh
                    command: |
                      corepack enable
                      sh ./scripts/ensure-workspace-install.sh "Admin live E2E"

                      echo "=== Environment: <+pipeline.variables.environment_name> ==="
                      echo "=== Admin URL: <+pipeline.variables.admin_url> ==="
                      pnpm --filter @agent-platform/admin exec playwright test --config=playwright.config.ts
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                      CI: 'true'
                      ADMIN_URL: <+pipeline.variables.admin_url>
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

  allowStageExecutions: true

  # Scheduled validation runs against the deployed dev environment.
  # Cron expressions are evaluated in UTC by default in Harness.
  triggers:
    - trigger:
        name: Nightly Dev Validation
        identifier: nightly_dev_validation
        enabled: true
        description: Run deep integration and deployed browser validation every day at 02:00 UTC.
        type: Scheduled
        spec:
          type: Cron
          spec:
            expression: 0 2 * * *
            type: UNIX
        inputYaml: |
          pipeline:
            identifier: post_deploy_validation
            properties:
              ci:
                codebase:
                  build:
                    type: branch
                    spec:
                      branch: main
            variables:
              - name: environment_name
                type: String
                value: dev
              - name: studio_url
                type: String
                value: https://agents-dev.kore.ai
              - name: runtime_api_url
                type: String
                value: https://agents-dev.kore.ai
              - name: search_ai_url
                type: String
                value: https://agents-dev.kore.ai/api/search-ai
              - name: search_ai_runtime_url
                type: String
                value: https://agents-dev.kore.ai/api/search-ai-runtime
              - name: admin_url
                type: String
                value: https://agents-dev.kore.ai
              - name: login_email
                type: String
                value: developer@kore.ai
              - name: run_deep_integration
                type: String
                value: "true"
              - name: run_studio_live_e2e
                type: String
                value: "true"
              - name: run_admin_playwright
                type: String
                value: "false"
