pipeline:
  name: CI - PR Auto Detect
  identifier: ci_pr_auto
  projectIdentifier: ABLPlatform
  orgIdentifier: default
  description: |
    PR validation pipeline with automatic change detection.
    Triggered on Bitbucket PR events targeting develop or main.
    Detects affected modules via turbo dependency graph + file path matching.
    Builds and typechecks selectively, but runs the full Node unit, regression,
    integration, and E2E suites whenever Node validation is required. Docker
    builds are handled by ci_build on merge.
  tags:
    pipeline_type: ci
    trigger: pr
    detection: auto
  variables:
    - name: skip_architecture_gate
      type: String
      description: Set to 'true' to skip the architecture fitness gate (emergency only).
      required: false
      default: 'false'
      value: <+input>.default(false).allowedValues(true,false)
  properties:
    ci:
      codebase:
        connectorRef: ablplatformconnector
        repoName: abl-platform
        build: <+input>
  stages:
    # ── Stage 1: Detect Changes + Post INPROGRESS ─────────────────────────────
    - stage:
        name: Detect Changes
        identifier: generate_tag
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
              - .turbo
          execution:
            steps:
              - step:
                  type: Run
                  name: Post INPROGRESS to Bitbucket
                  identifier: post_inprogress
                  spec:
                    connectorRef: Docker
                    image: alpine:3.19
                    shell: Sh
                    command: |
                      apk add --no-cache curl jq >/dev/null 2>&1
                      BB_TOKEN="<+secrets.getValue('bb-ci-workspace-token')>"
                      BB_COMMIT="<+codebase.commitSha>"
                      BB_EXEC_URL="<+pipeline.executionUrl>"
                      BB_BRANCH="<+codebase.sourceBranch>"
                      BB_API="https://api.bitbucket.org/2.0/repositories/koreteam1/abl-platform/commit"

                      post_status() {
                        STATUS_KEY="$1"
                        STATUS_NAME="$2"

                        JSON_BODY=$(jq -n \
                          --arg state "INPROGRESS" \
                          --arg key "$STATUS_KEY" \
                          --arg name "$STATUS_NAME" \
                          --arg url "$BB_EXEC_URL" \
                          --arg desc "CI pipeline running..." \
                          --arg ref "$BB_BRANCH" \
                          '{state: $state, key: $key, name: $name, url: $url, description: $desc, refname: $ref}')

                        HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
                          -H "Authorization: Bearer ${BB_TOKEN}" \
                          -H "Content-Type: application/json" \
                          -X POST "${BB_API}/${BB_COMMIT}/statuses/build" \
                          -d "$JSON_BODY" 2>/dev/null) || true

                        echo "${STATUS_KEY} INPROGRESS status: HTTP ${HTTP_CODE}"
                      }

                      post_status "ABL-CI" "CI - Required PR Validation"
                      post_status "ABL-CI-EXTENDED" "CI - Extended PR Checks"
                    resources:
                      limits:
                        memory: 256Mi
                        cpu: '0.5'
              - step:
                  type: Run
                  name: Detect Affected Modules
                  identifier: detect_affected
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      TARGET_BRANCH="<+codebase.targetBranch>"
                      if [ -z "$TARGET_BRANCH" ] || [ "$TARGET_BRANCH" = "null" ]; then
                        TARGET_BRANCH="main"
                      fi

                      echo "=== Target branch: ${TARGET_BRANCH} ==="

                      # ── Fetch target branch for comparisons ──────────────
                      # Progressive deepening for shallow clones.
                      echo "Fetching origin/${TARGET_BRANCH}..."
                      git fetch origin "${TARGET_BRANCH}" --depth=1 2>/dev/null || true
                      if ! git merge-base "origin/${TARGET_BRANCH}" HEAD >/dev/null 2>&1; then
                        echo "Shallow clone insufficient — deepening..."
                        git fetch origin "${TARGET_BRANCH}" --deepen=100 2>/dev/null || true
                        git fetch --deepen=100 2>/dev/null || true
                      fi
                      if ! git merge-base "origin/${TARGET_BRANCH}" HEAD >/dev/null 2>&1; then
                        echo "Still insufficient — fetching full history..."
                        git fetch origin "${TARGET_BRANCH}" --unshallow 2>/dev/null || git fetch origin "${TARGET_BRANCH}" 2>/dev/null || true
                        git fetch --unshallow 2>/dev/null || true
                      fi

                      # ── Run both checks independently ──────────────────────
                      IS_BEHIND="false"
                      MERGE_COMMIT_COUNT="0"
                      PROBLEMS=""

                      # Check 1: Is branch behind target?
                      if git merge-base "origin/${TARGET_BRANCH}" HEAD >/dev/null 2>&1; then
                        if ! git merge-base --is-ancestor "origin/${TARGET_BRANCH}" HEAD; then
                          IS_BEHIND="true"
                          PROBLEMS="${PROBLEMS}behind,"
                          echo "  Branch is behind origin/${TARGET_BRANCH}"
                        fi
                      fi

                      # Check 2: Has merge commits? (always runs)
                      MERGE_COMMIT_COUNT=$(git rev-list --merges --count "origin/${TARGET_BRANCH}..HEAD" 2>/dev/null || echo "0")
                      if [ "$MERGE_COMMIT_COUNT" -gt 0 ]; then
                        PROBLEMS="${PROBLEMS}merge-commits,"
                        echo "  Branch has ${MERGE_COMMIT_COUNT} merge commit(s)"
                      fi

                      # ── Handle failures ─────────────────────────────────────
                      if [ -n "$PROBLEMS" ]; then
                        echo ""
                        echo "============================================================"
                        if [ "$IS_BEHIND" = "true" ]; then
                          echo "  Branch is behind origin/${TARGET_BRANCH}"
                        fi
                        if [ "$MERGE_COMMIT_COUNT" -gt 0 ]; then
                          echo "  Branch has ${MERGE_COMMIT_COUNT} merge commit(s)"
                        fi
                        echo ""
                        echo "  Fix: git fetch origin ${TARGET_BRANCH} && git rebase origin/${TARGET_BRANCH}"
                        echo "  Then: git push --force-with-lease"
                        echo "============================================================"

                        # Post PR comment with failure details (best-effort)
                        BB_TOKEN="<+secrets.getValue('bb-ci-workspace-token')>"
                        PR_NUMBER="<+codebase.prNumber>"
                        BB_PR_API="https://api.bitbucket.org/2.0/repositories/koreteam1/abl-platform/pullrequests"
                        MARKER="<!-- abl-ci-branch-check -->"

                        if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
                          # Build comment body using printf for real newlines
                          # (YAML command: | preserves indentation, printf \n produces newlines)
                          ISSUES=""
                          if [ "$IS_BEHIND" = "true" ]; then
                            ISSUES=$(printf '%s- Branch is behind `%s` - please rebase\n' "$ISSUES" "$TARGET_BRANCH")
                          fi
                          if [ "$MERGE_COMMIT_COUNT" -gt 0 ]; then
                            ISSUES=$(printf '%s- Branch has %s merge commit(s) - use rebase instead of merge\n' "$ISSUES" "$MERGE_COMMIT_COUNT")
                          fi
                          COMMENT_BODY=$(printf '%s\n## CI Branch Check Failed\n\n**Issues found:**\n%s\n**How to fix:**\n```\ngit fetch origin %s\ngit rebase origin/%s\ngit push --force-with-lease\n```\n\n[View CI logs](%s)' \
                            "$MARKER" "$ISSUES" "$TARGET_BRANCH" "$TARGET_BRANCH" "<+pipeline.executionUrl>")

                          COMMENT_JSON=$(printf '%s' "$COMMENT_BODY" | jq -Rs '{content: {raw: .}}')

                          # Find and delete existing comment with our marker
                          EXISTING_ID=$(curl -s --max-time 10 \
                            -H "Authorization: Bearer ${BB_TOKEN}" \
                            "${BB_PR_API}/${PR_NUMBER}/comments?pagelen=100" 2>/dev/null \
                            | jq -r --arg marker "$MARKER" '.values[]? | select(.content.raw | contains($marker)) | .id' \
                            | head -1) || true

                          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
                            curl -s --max-time 10 -X DELETE \
                              -H "Authorization: Bearer ${BB_TOKEN}" \
                              "${BB_PR_API}/${PR_NUMBER}/comments/${EXISTING_ID}" 2>/dev/null || true
                          fi

                          # Post new comment
                          COMMENT_HTTP=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
                            -H "Authorization: Bearer ${BB_TOKEN}" \
                            -H "Content-Type: application/json" \
                            -X POST "${BB_PR_API}/${PR_NUMBER}/comments" \
                            -d "$COMMENT_JSON" 2>/dev/null) || true
                          echo "PR comment: HTTP ${COMMENT_HTTP}"
                        fi

                        # Set skip outputs — all stages will skip
                        AFFECTED_SERVICES="none"
                        AFFECTED_PACKAGES="none"
                        RUN_RUNTIME_SMOKE="false"
                        HAS_NODE_CHANGES="false"
                        HAS_PYTHON_CHANGES="false"
                        HAS_STANDALONE_CHANGES="false"
                        ROOT_CONFIG_CHANGED="false"
                        BRANCH_BEHIND="true"
                        SKIP_REASON_OUT="${PROBLEMS%,}"
                      else
                        echo "PR branch is up to date with origin/${TARGET_BRANCH} ✓"
                        echo "No merge commits found ✓"
                        SKIP_REASON_OUT=""

                        # ── Quick check: do any code files need Node.js detection? ──
                        CHANGED_FILES=$(git diff --name-only "origin/${TARGET_BRANCH}...HEAD" 2>/dev/null || git diff --name-only "origin/${TARGET_BRANCH}" HEAD 2>/dev/null || echo "")
                        # Exclude standalone (non-Node) apps from triggering pnpm install
                        NEEDS_NODE=$(echo "$CHANGED_FILES" | grep -E "^(apps/|packages/|turbo\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|tsconfig|package\.json|\.npmrc|\.nvmrc|coverage-thresholds\.json|\.eslintrc)" | grep -vE "^apps/(nlu-sidecar|crawler-go-worker)/" || true)

                        if [ -z "$NEEDS_NODE" ]; then
                          echo ""
                          echo "=== No code changes detected — skipping pnpm install ==="
                          echo "Changed files are non-code (CI config, docs, etc.)"

                          # Check for Python/standalone changes via file paths only
                          PYTHON_SVCS=""
                          for svc in docling-service bge-m3-service preprocessing-service codetool-sandbox; do
                            if echo "$CHANGED_FILES" | grep -q "^services/${svc}/"; then
                              PYTHON_SVCS="${PYTHON_SVCS}${svc},"
                            fi
                          done
                          STANDALONE=""
                          for app in nlu-sidecar crawler-go-worker; do
                            if echo "$CHANGED_FILES" | grep -q "^apps/${app}/"; then
                              STANDALONE="${STANDALONE}${app},"
                            fi
                          done
                          ALL_SVCS="${PYTHON_SVCS}${STANDALONE}"
                          ALL_SVCS=$(echo "$ALL_SVCS" | sed 's/,$//')

                          AFFECTED_SERVICES="${ALL_SVCS:-none}"
                          AFFECTED_PACKAGES="none"
                          RUN_RUNTIME_SMOKE="false"
                          HAS_NODE_CHANGES="false"
                          HAS_PYTHON_CHANGES=$( [ -n "$PYTHON_SVCS" ] && echo "true" || echo "false" )
                          HAS_STANDALONE_CHANGES=$( [ -n "$STANDALONE" ] && echo "true" || echo "false" )
                          ROOT_CONFIG_CHANGED="false"
                          BRANCH_BEHIND="false"
                        else
                          # ── Install and detect (only if code files changed) ─────
                          echo "=== Code changes detected — running full detection ==="
                          corepack enable
                          sh ./scripts/ensure-workspace-install.sh "detection"

                          # Run detection once, capture output, and parse variables safely
                          # (eval is unsafe when values contain spaces, e.g. AFFECTED_PACKAGES)
                          # (<<<  is bash-only, pipeline uses shell: Sh — use temp file instead)
                          DETECT_OUTPUT=$(bash ./tools/detect-affected.sh "${TARGET_BRANCH}" 2>&1)
                          echo "$DETECT_OUTPUT"
                          echo "$DETECT_OUTPUT" | grep -E "^(AFFECTED_SERVICES|AFFECTED_PACKAGES|RUN_RUNTIME_SMOKE|HAS_NODE_CHANGES|HAS_PYTHON_CHANGES|HAS_STANDALONE_CHANGES|ROOT_CONFIG_CHANGED)=" > /tmp/detect_vars.txt
                          while IFS= read -r line; do
                            key="${line%%=*}"
                            value="${line#*=}"
                            case "$key" in
                              AFFECTED_SERVICES)    AFFECTED_SERVICES="$value" ;;
                              AFFECTED_PACKAGES)    AFFECTED_PACKAGES="$value" ;;
                              RUN_RUNTIME_SMOKE)    RUN_RUNTIME_SMOKE="$value" ;;
                              HAS_NODE_CHANGES)     HAS_NODE_CHANGES="$value" ;;
                              HAS_PYTHON_CHANGES)   HAS_PYTHON_CHANGES="$value" ;;
                              HAS_STANDALONE_CHANGES) HAS_STANDALONE_CHANGES="$value" ;;
                              ROOT_CONFIG_CHANGED)  ROOT_CONFIG_CHANGED="$value" ;;
                            esac
                          done < /tmp/detect_vars.txt
                          BRANCH_BEHIND="false"
                        fi
                      fi
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                    outputVariables:
                      - name: AFFECTED_SERVICES
                      - name: AFFECTED_PACKAGES
                      - name: RUN_RUNTIME_SMOKE
                      - name: HAS_NODE_CHANGES
                      - name: HAS_PYTHON_CHANGES
                      - name: HAS_STANDALONE_CHANGES
                      - name: ROOT_CONFIG_CHANGED
                      - name: BRANCH_BEHIND
                      - name: SKIP_REASON_OUT
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 2: Build and Test (Node.js) ───────────────────────────────────
    - stage:
        name: Build and Test
        identifier: build_test
        type: CI
        when:
          pipelineStatus: Success
          condition: >-
            <+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_NODE_CHANGES> == "true"
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          serviceDependencies:
            - identifier: mongodb
              name: MongoDB 7
              type: Service
              spec:
                connectorRef: Docker
                image: mongo:7
                envVariables:
                  MONGO_INITDB_REPLICA_SET_NAME: rs0
                command: >-
                  mongod --replSet rs0 --bind_ip_all &&
                  mongosh --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
            - identifier: redis
              name: Redis 7
              type: Service
              spec:
                connectorRef: Docker
                image: redis:7
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
              - .turbo
          execution:
            steps:
              - step:
                  type: Run
                  name: Dockerfile Workspace Copy Guard
                  identifier: dockerfile_workspace_copy_guard
                  spec:
                    connectorRef: Docker
                    image: alpine:3.20
                    shell: Sh
                    command: |
                      set -eu
                      sh ./tools/verify-dockerfile-copies.sh --ci
                    envVariables:
                      CI: 'true'
                    resources:
                      limits:
                        memory: 256Mi
                        cpu: '0.5'
              - step:
                  type: Run
                  name: Install and Build
                  identifier: install_and_build
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      sh ./scripts/ensure-workspace-install.sh

                      FILTER_FLAGS="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.AFFECTED_PACKAGES>"

                      if [ "$FILTER_FLAGS" = "all" ] || [ -z "$FILTER_FLAGS" ] || [ "$FILTER_FLAGS" = "none" ]; then
                        echo "=== Full build ==="
                        pnpm turbo build --concurrency=4
                      else
                        echo "=== Selective build: ${FILTER_FLAGS} ==="
                        pnpm turbo build ${FILTER_FLAGS} --concurrency=4
                      fi
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                    resources:
                      limits:
                        memory: 12Gi
                        cpu: '4'
              - step:
                  type: Run
                  name: Typecheck
                  identifier: typecheck
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable

                      FILTER_FLAGS="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.AFFECTED_PACKAGES>"

                      if [ "$FILTER_FLAGS" = "all" ] || [ -z "$FILTER_FLAGS" ] || [ "$FILTER_FLAGS" = "none" ]; then
                        echo "=== Full typecheck ==="
                        pnpm turbo typecheck --concurrency=4
                      else
                        echo "=== Selective typecheck: ${FILTER_FLAGS} ==="
                        pnpm turbo typecheck ${FILTER_FLAGS} --concurrency=4
                      fi
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
              - step:
                  type: Run
                  name: Config Policy Validation
                  identifier: config_policy_validation
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      npx tsx scripts/validate-config-policies.ts
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: '1'
              - step:
                  type: Run
                  name: Tenant Isolation Lint
                  identifier: tenant_isolation_lint
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      bash ./tools/tenant-isolation-lint.sh
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: '1'
              - step:
                  type: Run
                  name: Auth Profile Query Shape Lint
                  identifier: auth_profile_query_shape_lint
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command: |
                      bash ./tools/auth-profile-query-shape-lint.sh
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: '1'
              - step:
                  type: Run
                  name: Auth Type Coverage Lint
                  identifier: auth_type_coverage_lint
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command: |
                      bash ./tools/auth-type-coverage.sh
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: '1'
              - step:
                  type: Run
                  name: Architecture Fitness Gate
                  identifier: architecture_fitness_gate
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.skip_architecture_gate> != "true"
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      echo "=== Architecture Fitness Gate ==="
                      echo "Running architecture fitness tests (unconditional — all PRs)..."
                      pnpm turbo test:fast --filter=@agent-platform/shared-kernel --concurrency=1
                      echo ""
                      echo "Running boundary check (dependency-cruiser)..."
                      pnpm boundary-check
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=4096'
                    resources:
                      limits:
                        memory: 4Gi
                        cpu: '2'
              - step:
                  type: Run
                  name: Unit Tests
                  identifier: unit_tests
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      bash ./tools/run-ci-test-lane.sh unit
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      REDIS_URL: 'redis://localhost:6379'
                      CI_TEST_CONCURRENCY: '4'
                      RUNTIME_TEST_LANE_TIMEOUT_MS: '600000'
                    resources:
                      limits:
                        memory: 12Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-report*.xml'
              - step:
                  type: Run
                  name: Runtime Regression Tests
                  identifier: runtime_regression_tests
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      bash ./tools/run-ci-test-lane.sh runtime-regression
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      MONGODB_URL: 'mongodb://localhost:27017/abl_platform_runtime_regression?replicaSet=rs0&directConnection=true'
                      REDIS_URL: 'redis://localhost:6379'
                      CI_BUILD_CONCURRENCY: '4'
                      RUNTIME_TEST_LANE_TIMEOUT_MS: '600000'
                    resources:
                      limits:
                        memory: 12Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-regression-runtime*.xml'
              - step:
                  type: Run
                  name: Integration Tests
                  identifier: integration_tests
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      bash ./tools/run-ci-test-lane.sh integration
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=8192'
                      MONGODB_URL: 'mongodb://localhost:27017/abl_platform_integration?replicaSet=rs0&directConnection=true'
                      REDIS_URL: 'redis://localhost:6379'
                      CI_BUILD_CONCURRENCY: '4'
                    resources:
                      limits:
                        memory: 14Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-integration-*.xml'
              - step:
                  type: Run
                  name: API E2E Tests
                  identifier: api_e2e_tests
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      bash ./tools/run-ci-test-lane.sh api-e2e
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=8192'
                      MONGODB_URL: 'mongodb://localhost:27017/abl_platform_e2e?replicaSet=rs0&directConnection=true'
                      REDIS_URL: 'redis://localhost:6379'
                      CI_BUILD_CONCURRENCY: '4'
                    resources:
                      limits:
                        memory: 14Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-e2e-runtime*.xml'
                          - '**/junit-e2e-cli.xml'
              - step:
                  type: Run
                  name: Studio Browser E2E Tests
                  identifier: studio_browser_e2e_tests
                  spec:
                    connectorRef: Docker
                    image: mcr.microsoft.com/playwright:v1.58.2-noble
                    shell: Sh
                    command: |
                      corepack enable
                      bash ./tools/run-ci-test-lane.sh studio-browser-e2e
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=8192'
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                      CI: 'true'
                      SDK_BROWSER_E2E_ISOLATED: 'true'
                      SDK_BROWSER_E2E_STRICT: 'true'
                      PLAYWRIGHT_JUNIT_OUTPUT_FILE: 'test-results/junit-e2e-studio-browser.xml'
                      CI_BUILD_CONCURRENCY: '3'
                    resources:
                      limits:
                        memory: 12Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-e2e-studio-browser.xml'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 3: Runtime Smoke (fast merge gate only) ───────────────────────
    # Runtime smoke remains as a focused post-build sanity check on top of the
    # full unit/regression/integration/E2E lanes in the main PR gate.
    - stage:
        name: Runtime Smoke
        identifier: runtime_smoke
        type: CI
        when:
          pipelineStatus: Success
          condition: >-
            <+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.RUN_RUNTIME_SMOKE> == "true"
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
              - .turbo
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Build and Run Runtime Smoke
                  identifier: runtime_smoke_run
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      sh ./scripts/ensure-workspace-install.sh "runtime smoke"

                      pnpm turbo test:smoke --filter=@agent-platform/runtime --concurrency=1
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                      CI: 'true'
                    resources:
                      limits:
                        memory: 6Gi
                        cpu: '2'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 4: Post Required PR Status ──────────────────────────────────────
    - stage:
        name: Post Required Status
        identifier: post_required_status
        type: CI
        when:
          pipelineStatus: All
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Post Required Status to Bitbucket
                  identifier: post_required_status_step
                  spec:
                    connectorRef: Docker
                    image: alpine:3.19
                    shell: Sh
                    command: |
                      apk add --no-cache curl jq >/dev/null 2>&1

                      BB_TOKEN="<+secrets.getValue('bb-ci-workspace-token')>"
                      BB_COMMIT="<+codebase.commitSha>"
                      BB_EXEC_URL="<+pipeline.executionUrl>"
                      BB_BRANCH="<+codebase.sourceBranch>"
                      BB_API="https://api.bitbucket.org/2.0/repositories/koreteam1/abl-platform/commit"

                      SKIP_REASON="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.SKIP_REASON_OUT>"

                      if [ -n "$SKIP_REASON" ] && [ "$SKIP_REASON" != "null" ]; then
                        OVERALL="FAILED"
                        DESC="Branch check failed - see PR comment for details"
                      else
                        DETECT_STATUS="<+pipeline.stages.generate_tag.status>"
                        BUILD_STATUS="<+pipeline.stages.build_test.status>"
                        SMOKE_STATUS="<+pipeline.stages.runtime_smoke.status>"

                        echo "Required stage statuses:"
                        echo "  Detect: ${DETECT_STATUS}"
                        echo "  Build:  ${BUILD_STATUS}"
                        echo "  Smoke:  ${SMOKE_STATUS}"

                        OVERALL="SUCCESSFUL"
                        for STATUS in "$DETECT_STATUS" "$BUILD_STATUS" "$SMOKE_STATUS"; do
                          case "$STATUS" in
                            Failed|FAILED|Errored|Aborted)
                              OVERALL="FAILED"
                              ;;
                            Succeeded|Success|Skipped|SKIPPED|NotStarted|NOT_STARTED)
                              ;;
                            *)
                              echo "WARNING: unexpected status: ${STATUS}"
                              OVERALL="FAILED"
                              ;;
                          esac
                        done

                        if [ "$OVERALL" = "SUCCESSFUL" ]; then
                          DESC="Required PR validation passed"
                        else
                          DESC="Required PR validation failed - check Harness for details"
                        fi
                      fi

                      JSON_BODY=$(jq -n \
                        --arg state "$OVERALL" \
                        --arg key "ABL-CI" \
                        --arg name "CI - Required PR Validation" \
                        --arg url "$BB_EXEC_URL" \
                        --arg desc "$DESC" \
                        --arg ref "$BB_BRANCH" \
                        '{state: $state, key: $key, name: $name, url: $url, description: $desc, refname: $ref}')

                      HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
                        -H "Authorization: Bearer ${BB_TOKEN}" \
                        -H "Content-Type: application/json" \
                        -X POST "${BB_API}/${BB_COMMIT}/statuses/build" \
                        -d "$JSON_BODY" 2>/dev/null) || true

                      echo "ABL-CI status: ${OVERALL} (HTTP ${HTTP_CODE})"
                    resources:
                      limits:
                        memory: 256Mi
                        cpu: '0.5'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 5: Coverage Enforcement (extended checks) ──────────────────────
    - stage:
        name: Coverage Enforcement
        identifier: coverage_enforcement
        type: CI
        when:
          pipelineStatus: Success
          condition: >-
            <+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_NODE_CHANGES> == "true"
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          serviceDependencies:
            - identifier: mongodb
              name: MongoDB 7
              type: Service
              spec:
                connectorRef: Docker
                image: mongo:7
                envVariables:
                  MONGO_INITDB_REPLICA_SET_NAME: rs0
                command: >-
                  mongod --replSet rs0 --bind_ip_all &&
                  mongosh --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
            - identifier: redis
              name: Redis 7
              type: Service
              spec:
                connectorRef: Docker
                image: redis:7
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
              - .turbo
          execution:
            steps:
              - step:
                  type: Run
                  name: Enforce Coverage
                  identifier: coverage_enforcement_step
                  spec:
                    connectorRef: Docker
                    image: node:24.14-bookworm
                    shell: Sh
                    command: |
                      corepack enable
                      sh ./scripts/ensure-workspace-install.sh "coverage"

                      AFFECTED="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.AFFECTED_SERVICES>"

                      # Coverage packages that have thresholds configured
                      COV_FILTERS=""
                      COV_CHECK_PACKAGES=""
                      if echo ",$AFFECTED," | grep -q ",runtime,"; then
                        COV_FILTERS="$COV_FILTERS --filter=@agent-platform/runtime"
                        COV_CHECK_PACKAGES="$COV_CHECK_PACKAGES apps/runtime"
                      fi
                      if echo ",$AFFECTED," | grep -q ",search-ai,"; then
                        COV_FILTERS="$COV_FILTERS --filter=@agent-platform/search-ai"
                        COV_CHECK_PACKAGES="$COV_CHECK_PACKAGES apps/search-ai"
                      fi
                      FILTER_FLAGS="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.AFFECTED_PACKAGES>"
                      if echo "$FILTER_FLAGS" | grep -q "compiler"; then
                        COV_FILTERS="$COV_FILTERS --filter=@abl/compiler"
                        COV_CHECK_PACKAGES="$COV_CHECK_PACKAGES packages/compiler"
                      fi

                      if [ -n "$COV_FILTERS" ]; then
                        echo "=== Coverage enforcement:${COV_FILTERS} ==="
                        pnpm turbo test:coverage ${COV_FILTERS} --concurrency=2
                        pnpm coverage:check -- ${COV_CHECK_PACKAGES}
                      else
                        echo "=== No coverage-tracked packages affected — skipping ==="
                      fi
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: '--max-old-space-size=6144'
                      MONGODB_URL: 'mongodb://localhost:27017/abl_platform_cov?replicaSet=rs0&directConnection=true'
                      REDIS_URL: 'redis://localhost:6379'
                    resources:
                      limits:
                        memory: 12Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-report*.xml'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 6: Code Security + Dependency Scan ─────────────────────────────
    # Docker builds removed from PR pipeline — handled by ci_build on merge.
    # PR pipeline focuses on code quality: SAST, secrets, and dependency CVEs.
    # Skip when: branch is behind develop, or no code changes (docs/CI-config only)
    - stage:
        name: Code Security Scan
        identifier: code_security_scan
        type: SecurityTests
        when:
          pipelineStatus: Success
          condition: >-
            <+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.BRANCH_BEHIND> != "true"
            && (<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_NODE_CHANGES> == "true"
              || <+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_PYTHON_CHANGES> == "true"
              || <+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_STANDALONE_CHANGES> == "true")
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          execution:
            steps:
              - step:
                  type: Semgrep
                  name: Semgrep SAST
                  identifier: semgrep_sast
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
                      fail_on_severity: critical
                    resources:
                      limits:
                        memory: 4Gi
                        cpu: '2'
              - step:
                  type: Gitleaks
                  name: Gitleaks Secret Detection
                  identifier: gitleaks_scan
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
                      fail_on_severity: critical
                    resources:
                      limits:
                        memory: 2Gi
                        cpu: '1'
              - step:
                  type: Run
                  name: Trivy Dependency Scan
                  identifier: trivy_dependency_scan
                  spec:
                    connectorRef: Docker
                    image: ghcr.io/aquasecurity/trivy:0.69.3
                    shell: Sh
                    command: |
                      # ── Selective Trivy scan based on what changed ──────────
                      # trivy fs accepts exactly ONE target path per invocation.
                      # Node.js deps are in root pnpm-lock.yaml — scan just the lockfile.
                      # Python/Go/standalone services have per-directory dependency files.

                      AFFECTED_SERVICES="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.AFFECTED_SERVICES>"
                      HAS_NODE_CHANGES="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_NODE_CHANGES>"
                      HAS_PYTHON_CHANGES="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_PYTHON_CHANGES>"
                      HAS_STANDALONE_CHANGES="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.HAS_STANDALONE_CHANGES>"

                      TRIVY_COMMON="--severity CRITICAL,HIGH --ignore-unfixed --ignorefile .trivyignore --format table --scanners vuln"
                      SCAN_FAILED=0

                      # Node.js: scan only the lockfile (not the whole repo, which would pick up Python/Go deps)
                      if [ "$HAS_NODE_CHANGES" = "true" ]; then
                        echo "=== Scanning Node.js dependencies (pnpm-lock.yaml) ==="
                        trivy fs pnpm-lock.yaml ${TRIVY_COMMON} --exit-code 1 || SCAN_FAILED=1
                      fi

                      # Python services: each has its own pyproject.toml / requirements / uv.lock
                      if [ "$HAS_PYTHON_CHANGES" = "true" ]; then
                        for svc in docling-service bge-m3-service preprocessing-service codetool-sandbox; do
                          if echo ",$AFFECTED_SERVICES," | grep -q ",${svc},"; then
                            if [ -d "services/${svc}" ]; then
                              echo "=== Scanning Python service: ${svc} ==="
                              trivy fs "services/${svc}" ${TRIVY_COMMON} --exit-code 1 || SCAN_FAILED=1
                            fi
                          fi
                        done
                      fi

                      # Standalone apps (nlu-sidecar is Python, crawler-go-worker is Go)
                      # Each has its own dependency files — trivy auto-detects the ecosystem
                      if [ "$HAS_STANDALONE_CHANGES" = "true" ]; then
                        for app in nlu-sidecar crawler-go-worker; do
                          if echo ",$AFFECTED_SERVICES," | grep -q ",${app},"; then
                            if [ -d "apps/${app}" ]; then
                              echo "=== Scanning standalone app: ${app} ==="
                              trivy fs "apps/${app}" ${TRIVY_COMMON} --exit-code 1 || SCAN_FAILED=1
                            fi
                          fi
                        done
                      fi

                      # Exit with failure if any scan found vulnerabilities
                      if [ "$SCAN_FAILED" -ne 0 ]; then
                        echo "CRITICAL/HIGH vulnerabilities found — failing pipeline"
                        exit 1
                      fi

                      echo "All scans passed"
                    resources:
                      limits:
                        memory: 4Gi
                        cpu: '2'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    # ── Stage 7: Post Extended Status to Bitbucket ────────────────────────────
    # Always runs — posts extended SUCCESSFUL or FAILED to Bitbucket PR.
    # Uses direct Bitbucket API call since Harness sendGitStatus is unreliable.
    - stage:
        name: Post Extended Status
        identifier: post_extended_status
        type: CI
        when:
          pipelineStatus: All
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Post Extended Status to Bitbucket
                  identifier: post_extended_status_step
                  spec:
                    connectorRef: Docker
                    image: alpine:3.19
                    shell: Sh
                    command: |
                      apk add --no-cache curl jq >/dev/null 2>&1

                      # Bitbucket API — uses workspace access token (Bearer auth)
                      # Separate from the connector creds — only for build status posting
                      BB_TOKEN="<+secrets.getValue('bb-ci-workspace-token')>"
                      BB_COMMIT="<+codebase.commitSha>"
                      BB_EXEC_URL="<+pipeline.executionUrl>"
                      BB_BRANCH="<+codebase.sourceBranch>"
                      BB_API="https://api.bitbucket.org/2.0/repositories/koreteam1/abl-platform/commit"

                      # Check if pipeline was skipped due to branch issues
                      SKIP_REASON="<+pipeline.stages.generate_tag.spec.execution.steps.detect_affected.output.outputVariables.SKIP_REASON_OUT>"

                      if [ -n "$SKIP_REASON" ] && [ "$SKIP_REASON" != "null" ]; then
                        # Branch has issues (behind, merge commits, or both)
                        OVERALL="FAILED"
                        DESC="Branch check failed - see PR comment for details"
                      else
                        # Check previous stage statuses to determine overall result
                        DETECT_STATUS="<+pipeline.stages.generate_tag.status>"
                        BUILD_STATUS="<+pipeline.stages.build_test.status>"
                        SMOKE_STATUS="<+pipeline.stages.runtime_smoke.status>"
                        REQUIRED_STATUS="<+pipeline.stages.post_required_status.status>"
                        COVERAGE_STATUS="<+pipeline.stages.coverage_enforcement.status>"
                        SECURITY_STATUS="<+pipeline.stages.code_security_scan.status>"

                        echo "Extended stage statuses:"
                        echo "  Detect:   ${DETECT_STATUS}"
                        echo "  Build:    ${BUILD_STATUS}"
                        echo "  Smoke:    ${SMOKE_STATUS}"
                        echo "  Required: ${REQUIRED_STATUS}"
                        echo "  Coverage: ${COVERAGE_STATUS}"
                        echo "  Security: ${SECURITY_STATUS}"

                        # Determine overall status
                        # Failed if any stage failed. Skipped stages are OK.
                        OVERALL="SUCCESSFUL"
                        for STATUS in "$DETECT_STATUS" "$BUILD_STATUS" "$SMOKE_STATUS" "$REQUIRED_STATUS" "$COVERAGE_STATUS" "$SECURITY_STATUS"; do
                          case "$STATUS" in
                            Failed|FAILED|Errored|Aborted)
                              OVERALL="FAILED"
                              ;;
                            Succeeded|Success|Skipped|SKIPPED|NotStarted|NOT_STARTED)
                              ;; # expected good states
                            *)
                              echo "WARNING: unexpected status: ${STATUS}"
                              OVERALL="FAILED"
                              ;;
                          esac
                        done

                        # Build description
                        if [ "$OVERALL" = "SUCCESSFUL" ]; then
                          DESC="Extended PR checks passed"
                        else
                          DESC="Extended PR checks failed - check Harness for details"
                        fi
                      fi

                      echo ""
                      echo "Overall: ${OVERALL} - ${DESC}"

                      # Build JSON safely using jq (handles special chars in URLs and branch names)
                      JSON_BODY=$(jq -n \
                        --arg state "$OVERALL" \
                        --arg key "ABL-CI-EXTENDED" \
                        --arg name "CI - Extended PR Checks" \
                        --arg url "$BB_EXEC_URL" \
                        --arg desc "$DESC" \
                        --arg ref "$BB_BRANCH" \
                        '{state: $state, key: $key, name: $name, url: $url, description: $desc, refname: $ref}')

                      # Post to Bitbucket using Bearer auth (workspace access token)
                      HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
                        -H "Authorization: Bearer ${BB_TOKEN}" \
                        -H "Content-Type: application/json" \
                        -X POST "${BB_API}/${BB_COMMIT}/statuses/build" \
                        -d "$JSON_BODY" 2>/dev/null) || true

                      echo "Bitbucket API response: HTTP ${HTTP_CODE}"
                      if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
                        echo "WARNING: Failed to post build status to Bitbucket"
                      fi
                    resources:
                      limits:
                        memory: 256Mi
                        cpu: '0.5'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

  allowStageExecutions: true

  # ── Triggers: Bitbucket PR events targeting develop or main ───────────────
  triggers:
    - trigger:
        name: PR to Develop or Main
        identifier: pr_auto_detect
        enabled: true
        type: Webhook
        spec:
          type: BitbucketCloud
          spec:
            connectorRef: ablplatformconnector
            repoName: abl-platform
            event: PullRequest
            actions:
              - Create
              - Update
            payloadConditions:
              - key: targetBranch
                operator: In
                value: main, develop
            pathFilters:
              - pathFilter:
                  operator: StartsWith
                  value:
                    # Source code (MUST trigger)
                    - apps/
                    - packages/
                    - services/
                    # Root build config (MUST trigger)
                    - turbo.json
                    - tsconfig.json
                    - pnpm-lock.yaml
                    - pnpm-workspace.yaml
                    - package.json
                    - .npmrc
                    - .nvmrc
                    - .eslintrc.base.json
                    - coverage-thresholds.json
                    - commitlint.config.ts
                    # CI infrastructure (SHOULD trigger)
                    - .harness/
                    - tools/detect-affected.sh
                    - tools/tenant-isolation-lint.sh
                    - tools/run-semgrep.sh
                    - tools/verify-dockerfile-copies.sh
                    - scripts/validate-config-policies.ts
                    - scripts/coverage-check.ts
                    # Security scan config (SHOULD trigger)
                    - .gitleaks.toml
                    - .trivyignore
