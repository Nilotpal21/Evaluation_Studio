pipeline:
  name: CI - Build
  identifier: ci_build
  projectIdentifier: ABLPlatform
  orgIdentifier: default
  description: 'Main branch CI pipeline. Builds, tests, pushes Docker images to ACR.

    On success, updates dev values file for ArgoCD auto-sync.

    '
  tags:
    pipeline_type: ci
    trigger: push
  variables:
    - name: build_services
      type: String
      description: Services to build. Default 'all' builds everything. Pick specific services for selective builds.
      required: false
      default: all
      value: <+input>.default(all).selectManyFrom(all,runtime,studio,admin,search-ai,search-ai-runtime,workflow-engine,multimodal-service,pipeline-engine,docling-service,bge-m3-service,preprocessing-service,nlu-sidecar,crawler-go-worker,crawler-mcp-server,codetool-sandbox)
    - name: skip_architecture_gate
      type: String
      description: Set to 'true' to skip the architecture fitness gate (emergency only).
      required: false
      default: 'false'
      value: <+input>.default(false).allowedValues(true,false)
  properties:
    ci:
      codebase:
        connectorRef: ablplatformconnector
        repoName: abl-platform
        build: <+input>
        defaultBranch: develop
  stages:
    - stage:
        name: Generate Tag
        identifier: generate_tag
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Generate Image Tag
                  identifier: generate_image_tag
                  spec:
                    connectorRef: Docker
                    image: alpine:3.19
                    shell: Sh
                    command: 'SHORT_SHA=$(echo "<+codebase.commitSha>" | cut -c1-7)

                      IMAGE_TAG="${SHORT_SHA}"

                      IMAGE_TAG_DATE="main-$(date +%Y%m%d)"

                      echo "IMAGE_TAG=${IMAGE_TAG} IMAGE_TAG_DATE=${IMAGE_TAG_DATE}"

                      '
                    outputVariables:
                      - name: IMAGE_TAG
                      - name: IMAGE_TAG_DATE
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
    - stage:
        name: Build and Test
        identifier: build_test
        type: CI
        when:
          pipelineStatus: Success
          condition:
            <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",runtime,")
            || (","+<+pipeline.variables.build_services>+",").contains(",studio,") || (","+<+pipeline.variables.build_services>+",").contains(",admin,")
            || (","+<+pipeline.variables.build_services>+",").contains(",search-ai,") || (","+<+pipeline.variables.build_services>+",").contains(",search-ai-runtime,")
            || (","+<+pipeline.variables.build_services>+",").contains(",workflow-engine,") || (","+<+pipeline.variables.build_services>+",").contains(",multimodal-service,")
            || (","+<+pipeline.variables.build_services>+",").contains(",docling-service,") || (","+<+pipeline.variables.build_services>+",").contains(",bge-m3-service,")
            || (","+<+pipeline.variables.build_services>+",").contains(",preprocessing-service,") || (","+<+pipeline.variables.build_services>+",").contains(",nlu-sidecar,")
            || (","+<+pipeline.variables.build_services>+",").contains(",crawler-go-worker,") || (","+<+pipeline.variables.build_services>+",").contains(",crawler-mcp-server,")
            || (","+<+pipeline.variables.build_services>+",").contains(",pipeline-engine,") || (","+<+pipeline.variables.build_services>+",").contains(",codetool-sandbox,")
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          serviceDependencies:
            - identifier: mongodb
              name: MongoDB 7
              type: Service
              spec:
                connectorRef: Docker
                image: mongo:7
                envVariables:
                  MONGO_INITDB_REPLICA_SET_NAME: rs0
                command: mongod --replSet rs0 --bind_ip_all && mongosh --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
            - identifier: redis
              name: Redis 7
              type: Service
              spec:
                connectorRef: Docker
                image: redis:7
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
              - .turbo
          execution:
            steps:
              - step:
                  type: Run
                  name: Install and Build
                  identifier: install_and_build
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command:
                      "corepack enable\n\nif [ -x node_modules/.bin/turbo ] && [ -d node_modules/.pnpm ]; then\n  echo\
                      \ \"=== Reusing cached workspace install ===\"\nelse\n  echo \"=== No cached workspace install found \u2014\
                      \ running pnpm install ===\"\n  pnpm install --frozen-lockfile\nfi\n\nSELECTED=\"<+pipeline.variables.build_services>\"\
                      \n\nif echo \",$SELECTED,\" | grep -q \",all,\"; then\n  echo \"=== Full build ===\"\n  pnpm turbo build\
                      \ --concurrency=4\nelse\n  # Selective build \u2014 construct turbo --filter flags for Node.js apps only\n\
                      \  FILTERS=\"\"\n  for item in $(echo \"$SELECTED\" | tr ',' ' '); do\n    case \"$item\" in\n      runtime|studio|admin|search-ai|search-ai-runtime|workflow-engine|multimodal-service|pipeline-engine)\n\
                      \        FILTERS=\"$FILTERS --filter=@agent-platform/$item\"\n        ;;\n    esac\n  done\n  if [ -n \"\
                      $FILTERS\" ]; then\n    echo \"=== Selective build: $FILTERS ===\"\n    pnpm turbo build $FILTERS --concurrency=4\n\
                      \  else\n    echo \"=== No Node.js apps selected \u2014 skipping build ===\"\n  fi\nfi\n"
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: --max-old-space-size=8192
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                    resources:
                      limits:
                        memory: 12Gi
                        cpu: '4'
              - step:
                  type: Run
                  name: Typecheck
                  identifier: typecheck
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command: 'corepack enable

                      pnpm turbo typecheck --concurrency=4

                      '
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: --max-old-space-size=6144
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
              - step:
                  type: Run
                  name: Config Policy Validation
                  identifier: config_policy_validation
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command: 'corepack enable

                      npx tsx scripts/validate-config-policies.ts

                      '
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: '1'
              - step:
                  type: Run
                  name: Tenant Isolation Lint
                  identifier: tenant_isolation_lint
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command: 'bash ./tools/tenant-isolation-lint.sh

                      '
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: '1'
              - step:
                  type: Run
                  name: Architecture Fitness Gate
                  identifier: architecture_fitness_gate
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.skip_architecture_gate> != "true"
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command: 'corepack enable

                      echo "=== Architecture Fitness Gate ==="

                      echo "Running architecture fitness tests (unconditional)..."

                      pnpm turbo test:fast --filter=@agent-platform/shared-kernel --concurrency=1

                      echo ""

                      echo "Running boundary check (dependency-cruiser)..."

                      pnpm boundary-check

                      '
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: --max-old-space-size=4096
                    resources:
                      limits:
                        memory: 4Gi
                        cpu: '2'
              - step:
                  type: Run
                  name: Unit Tests
                  identifier: unit_tests
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command:
                      "corepack enable\nSELECTED=\"<+pipeline.variables.build_services>\"\n\nif echo \",$SELECTED,\" |\
                      \ grep -q \",all,\"; then\n  pnpm turbo test:fast --concurrency=4\nelse\n  FILTERS=\"\"\n  for item in $(echo\
                      \ \"$SELECTED\" | tr ',' ' '); do\n    case \"$item\" in\n      runtime|studio|admin|search-ai|search-ai-runtime|workflow-engine|multimodal-service|pipeline-engine)\n\
                      \        FILTERS=\"$FILTERS --filter=@agent-platform/$item\"\n        ;;\n    esac\n  done\n  if [ -n \"\
                      $FILTERS\" ]; then\n    echo \"=== Selective test: $FILTERS ===\"\n    pnpm turbo test:fast $FILTERS --concurrency=4\n\
                      \  else\n    echo \"=== No Node.js apps selected \u2014 skipping tests ===\"\n  fi\nfi\n"
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: --max-old-space-size=6144
                      REDIS_URL: redis://localhost:6379
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-report.xml'
              - step:
                  type: Run
                  name: Integration Tests
                  identifier: integration_tests
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command:
                      "corepack enable\nSELECTED=\"<+pipeline.variables.build_services>\"\n\nif echo \",$SELECTED,\" |\
                      \ grep -q \",all,\"; then\n  pnpm turbo test --filter=./apps/studio --filter=./apps/search-ai --filter=./apps/multimodal-service\
                      \ --filter=./apps/search-ai-runtime --filter=./apps/runtime --concurrency=2\nelse\n  # Only run integration\
                      \ tests for selected apps that have them\n  FILTERS=\"\"\n  for item in $(echo \"$SELECTED\" | tr ',' '\
                      \ '); do\n    case \"$item\" in\n      runtime|studio|search-ai|search-ai-runtime|multimodal-service) FILTERS=\"\
                      $FILTERS --filter=./apps/$item\" ;;\n    esac\n  done\n  if [ -n \"$FILTERS\" ]; then\n    echo \"=== Selective\
                      \ integration test: $FILTERS ===\"\n    pnpm turbo test $FILTERS --concurrency=2\n  else\n    echo \"===\
                      \ No integration-test apps selected \u2014 skipping ===\"\n  fi\nfi\n"
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: --max-old-space-size=6144
                      MONGODB_URL: mongodb://localhost:27017/abl_platform?replicaSet=rs0&directConnection=true
                      REDIS_URL: redis://localhost:6379
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-report.xml'
              - step:
                  type: Run
                  name: Coverage Enforcement
                  identifier: coverage_enforcement
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command: 'corepack enable

                      # Run coverage for core packages

                      pnpm turbo test:coverage --filter=@agent-platform/runtime --filter=@agent-platform/search-ai --filter=@abl/compiler
                      --concurrency=2

                      # Check thresholds

                      pnpm coverage:check -- apps/runtime apps/search-ai packages/compiler

                      '
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: --max-old-space-size=6144
                      MONGODB_URL: mongodb://localhost:27017/abl_platform_cov?replicaSet=rs0&directConnection=true
                      REDIS_URL: redis://localhost:6379
                    resources:
                      limits:
                        memory: 8Gi
                        cpu: '4'
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - '**/junit-report.xml'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
    - stage:
        name: Runtime Smoke
        identifier: runtime_smoke
        type: CI
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",runtime,")
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          caching:
            enabled: true
            key: pnpm-v3-{{ checksum "pnpm-lock.yaml" }}
            paths:
              - node_modules
              - .turbo
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Build and Run Runtime Smoke
                  identifier: runtime_smoke_run
                  spec:
                    connectorRef: Docker
                    image: node:24-bookworm
                    shell: Sh
                    command:
                      "corepack enable\n\nif [ -x node_modules/.bin/turbo ] && [ -d node_modules/.pnpm ]; then\n  echo\
                      \ \"=== Reusing cached workspace install for runtime smoke ===\"\nelse\n  echo \"=== No cached workspace\
                      \ install found \u2014 running pnpm install ===\"\n  pnpm install --frozen-lockfile\nfi\n\npnpm turbo test:smoke\
                      \ --filter=@agent-platform/runtime --concurrency=1\n"
                    envVariables:
                      TURBO_TELEMETRY_DISABLED: '1'
                      NODE_OPTIONS: --max-old-space-size=6144
                      MONGOMS_DISABLE_POSTINSTALL: '1'
                      CI: 'true'
                    resources:
                      limits:
                        memory: 6Gi
                        cpu: '2'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
    - parallel:
        - stage:
            name: Docker - Runtime
            identifier: docker_runtime
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",runtime,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: runtime
                  - name: dockerfile_dir
                    type: String
                    value: apps
        - stage:
            name: Docker - Runtime Init
            identifier: docker_runtime_init
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",runtime,")
            type: CI
            spec:
              cloneCodebase: true
              infrastructure:
                type: KubernetesDirect
                spec:
                  connectorRef: ABL_AKS_Dev
                  namespace: default
                  automountServiceAccountToken: true
                  nodeSelector:
                    workload: ci
                  tolerations:
                    - key: workload
                      operator: Equal
                      value: ci
                      effect: NoSchedule
                  os: Linux
              execution:
                steps:
                  - step:
                      type: BuildAndPushACR
                      name: Build and Push Runtime Init
                      identifier: build_push_runtime_init
                      spec:
                        connectorRef: account.KoreaiAzure
                        repository: acrabldev.azurecr.io/abl-runtime-init
                        tags:
                          - <+pipeline.stages.generate_tag.spec.execution.steps.generate_image_tag.output.outputVariables.IMAGE_TAG>
                          - latest
                        dockerfile: apps/runtime/Dockerfile
                        target: init
                        context: .
                        buildArgs:
                          BUILDKIT_INLINE_CACHE: '1'
                        labels:
                          org.opencontainers.image.source: <+codebase.repoUrl>
                          org.opencontainers.image.revision: <+codebase.commitSha>
                        resources:
                          limits:
                            memory: 8Gi
                            cpu: '4'
            failureStrategies:
              - onFailure:
                  errors:
                    - AllErrors
                  action:
                    type: MarkAsFailure
        - stage:
            name: Docker - Studio
            identifier: docker_studio
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",studio,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: studio
                  - name: dockerfile_dir
                    type: String
                    value: apps
        - stage:
            name: Docker - Admin
            identifier: docker_admin
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",admin,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: admin
                  - name: dockerfile_dir
                    type: String
                    value: apps
        - stage:
            name: Docker - Search AI
            identifier: docker_search_ai
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",search-ai,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: search-ai
                  - name: dockerfile_dir
                    type: String
                    value: apps
        - stage:
            name: Docker - Search AI Runtime
            identifier: docker_search_ai_runtime
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",search-ai-runtime,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: search-ai-runtime
                  - name: dockerfile_dir
                    type: String
                    value: apps
        - stage:
            name: Docker - Docling
            identifier: docker_docling
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",docling-service,")
            template:
              templateRef: docker_build_python_service
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: service_name
                    type: String
                    value: docling-service
        - stage:
            name: Docker - BGE-M3
            identifier: docker_bge_m3
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",bge-m3-service,")
            template:
              templateRef: docker_build_python_service
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: service_name
                    type: String
                    value: bge-m3-service
        - stage:
            name: Docker - Preprocessing
            identifier: docker_preprocessing
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",preprocessing-service,")
            template:
              templateRef: docker_build_python_service
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: service_name
                    type: String
                    value: preprocessing-service
        - stage:
            name: Docker - Workflow Engine
            identifier: docker_workflow_engine
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",workflow-engine,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: workflow-engine
                  - name: dockerfile_dir
                    type: String
                    value: apps
        - stage:
            name: Docker - Multimodal
            identifier: docker_multimodal
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",multimodal-service,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: multimodal-service
                  - name: dockerfile_dir
                    type: String
                    value: apps
        - stage:
            name: Docker - NLU Sidecar
            identifier: docker_nlu_sidecar
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",nlu-sidecar,")
            template:
              templateRef: docker_build_standalone_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: nlu-sidecar
        - stage:
            name: Docker - Crawler Go Worker
            identifier: docker_crawler_go_worker
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",crawler-go-worker,")
            template:
              templateRef: docker_build_standalone_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: crawler-go-worker
        - stage:
            name: Docker - Crawler MCP Server
            identifier: docker_crawler_mcp_server
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",crawler-mcp-server,")
            template:
              templateRef: docker_build_standalone_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: crawler-mcp-server
        - stage:
            name: Docker - Pipeline Engine
            identifier: docker_pipeline_engine
            when:
              pipelineStatus: Success
              condition: <+pipeline.variables.build_services> == "all" || (","+<+pipeline.variables.build_services>+",").contains(",pipeline-engine,")
            template:
              templateRef: docker_build_node_app
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: app_name
                    type: String
                    value: pipeline-engine
                  - name: dockerfile_dir
                    type: String
                    value: packages
        - stage:
            name: Docker - Codetool Sandbox
            identifier: docker_codetool_sandbox
            when:
              pipelineStatus: Success
              condition: (","+<+pipeline.variables.build_services>+",").contains(",codetool-sandbox,")
            template:
              templateRef: docker_build_python_service
              versionLabel: '1'
              templateInputs:
                type: CI
                variables:
                  - name: service_name
                    type: String
                    value: codetool-sandbox
    - stage:
        name: Code Security Scan
        identifier: code_security_scan
        type: SecurityTests
        when:
          pipelineStatus: Success
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          execution:
            steps:
              - step:
                  type: Semgrep
                  name: Semgrep SAST
                  identifier: semgrep_sast
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
                      fail_on_severity: critical
                    resources:
                      limits:
                        memory: 4Gi
                        cpu: '2'
              - step:
                  type: Gitleaks
                  name: Gitleaks Secret Detection
                  identifier: gitleaks_scan
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
                      fail_on_severity: critical
                    resources:
                      limits:
                        memory: 2Gi
                        cpu: '1'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
    - stage:
        name: Update Dev Deploy
        identifier: update_dev_deploy
        type: CI
        when:
          pipelineStatus: Success
          condition:
            <+pipeline.stages.docker_runtime.status> == "SUCCEEDED" || <+pipeline.stages.docker_runtime_init.status>
            == "SUCCEEDED" || <+pipeline.stages.docker_studio.status> == "SUCCEEDED" || <+pipeline.stages.docker_admin.status>
            == "SUCCEEDED" || <+pipeline.stages.docker_search_ai.status> == "SUCCEEDED" || <+pipeline.stages.docker_search_ai_runtime.status>
            == "SUCCEEDED" || <+pipeline.stages.docker_docling.status> == "SUCCEEDED" || <+pipeline.stages.docker_bge_m3.status>
            == "SUCCEEDED" || <+pipeline.stages.docker_preprocessing.status> == "SUCCEEDED" || <+pipeline.stages.docker_workflow_engine.status>
            == "SUCCEEDED" || <+pipeline.stages.docker_multimodal.status> == "SUCCEEDED" || <+pipeline.stages.docker_nlu_sidecar.status>
            == "SUCCEEDED" || <+pipeline.stages.docker_crawler_go_worker.status> == "SUCCEEDED" || <+pipeline.stages.docker_crawler_mcp_server.status>
            == "SUCCEEDED" || <+pipeline.stages.docker_pipeline_engine.status> == "SUCCEEDED" || <+pipeline.stages.docker_codetool_sandbox.status>
            == "SUCCEEDED"
        spec:
          cloneCodebase: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: ABL_AKS_Dev
              namespace: default
              automountServiceAccountToken: true
              nodeSelector:
                workload: ci
              tolerations:
                - key: workload
                  operator: Equal
                  value: ci
                  effect: NoSchedule
              os: Linux
          execution:
            steps:
              - step:
                  type: GitClone
                  name: Clone Deploy Repo
                  identifier: clone_deploy_repo
                  spec:
                    connectorRef: ablplatformconnector
                    repoName: abl-platform-deploy
                    build:
                      type: branch
                      spec:
                        branch: main
                    cloneDirectory: /harness/deploy
              - step:
                  type: Run
                  name: Push Image Tag
                  identifier: push_image_tag
                  spec:
                    connectorRef: Docker
                    image: alpine/git:latest
                    shell: Sh
                    command:
                      "set -euo pipefail\napk add --no-cache openssh-client yq\n\n# Setup SSH\nmkdir -p ~/.ssh && chmod\
                      \ 700 ~/.ssh\necho '<+secrets.getValue(\"abl-platform-ssh-file-key\")>' > ~/.ssh/id_rsa\nchmod 600 ~/.ssh/id_rsa\n\
                      ssh-keyscan -H bitbucket.org >> ~/.ssh/known_hosts 2>/dev/null\n\nIMAGE_TAG=\"<+pipeline.stages.generate_tag.spec.execution.steps.generate_image_tag.output.outputVariables.IMAGE_TAG>\"\
                      \nSELECTED=\"<+pipeline.variables.build_services>\"\n# Per-env wrapper chart: image registry/tag under abl-platform-stack.abl-platform.global\n\
                      # to avoid overriding infra sub-chart registries (ingress-nginx, redis, etc.)\nVALUES_FILE=\"environments/dev/values.yaml\"\
                      \n# yq needs each key quoted separately for nested access (hyphens in key names)\nPREFIX='\"abl-platform-stack\"\
                      .\"abl-platform\"'\n\ncd /harness/deploy\n\nif echo \",$SELECTED,\" | grep -q \",all,\"; then\n  # Full\
                      \ build \u2014 set global tag and clear stale per-service overrides\n  # so every service picks up the new\
                      \ global tag\n  echo \"Full build \u2014 updating ${PREFIX}.global.image.tag to ${IMAGE_TAG}\"\n  yq -i\
                      \ \".${PREFIX}.global.image.tag = \\\"${IMAGE_TAG}\\\"\" \"$VALUES_FILE\"\n  # Note: codetoolSandbox is\
                      \ excluded \u2014 it's opt-in only, not part of \"all\" builds\n  for svc_key in runtime runtime.init studio\
                      \ searchAi searchAiRuntime admin preprocessing workflowEngine multimodal nluSidecar crawlerGoWorker crawlerMcpServer\
                      \ bgeM3 docling pipelineEngine; do\n    if yq -e \".${PREFIX}.${svc_key}.image.tag\" \"$VALUES_FILE\" >\
                      \ /dev/null 2>&1; then\n      echo \"  Clearing stale override: ${PREFIX}.${svc_key}.image.tag\"\n     \
                      \ yq -i \"del(.${PREFIX}.${svc_key}.image.tag)\" \"$VALUES_FILE\"\n      # Remove empty image map if tag\
                      \ was the only key\n      if [ \"$(yq \".${PREFIX}.${svc_key}.image | length\" \"$VALUES_FILE\")\" = \"\
                      0\" ]; then\n        yq -i \"del(.${PREFIX}.${svc_key}.image)\" \"$VALUES_FILE\"\n      fi\n    fi\n  done\n\
                      \  COMMIT_MSG=\"deploy(dev): update image tag to ${IMAGE_TAG}\"\nelse\n  # Selective build \u2014 update\
                      \ per-service tags under the subchart key\n  BUILT_LIST=\"\"\n  for item in $(echo \"$SELECTED\" | tr ','\
                      \ ' '); do\n    case \"$item\" in\n      runtime)               key=\"runtime\" ;;\n      studio)      \
                      \          key=\"studio\" ;;\n      admin)                 key=\"admin\" ;;\n      search-ai)          \
                      \   key=\"searchAi\" ;;\n      search-ai-runtime)     key=\"searchAiRuntime\" ;;\n      docling-service)\
                      \       key=\"docling\" ;;\n      bge-m3-service)        key=\"bgeM3\" ;;\n      preprocessing-service)\
                      \ key=\"preprocessing\" ;;\n      workflow-engine)       key=\"workflowEngine\" ;;\n      multimodal-service)\
                      \    key=\"multimodal\" ;;\n      nlu-sidecar)           key=\"nluSidecar\" ;;\n      crawler-go-worker)\
                      \     key=\"crawlerGoWorker\" ;;\n      crawler-mcp-server)    key=\"crawlerMcpServer\" ;;\n      pipeline-engine)\
                      \       key=\"pipelineEngine\" ;;\n      codetool-sandbox)      key=\"codetoolSandbox\" ;;\n      all) \
                      \                  continue ;;\n      *) continue ;;\n    esac\n    echo \"  ${PREFIX}.${key}.image.tag\
                      \ = ${IMAGE_TAG}\"\n    yq -i \".${PREFIX}.${key}.image.tag = \\\"${IMAGE_TAG}\\\"\" \"$VALUES_FILE\"\n\
                      \    # When runtime is built, also update the init image tag (PreSync hook)\n    if [ \"$item\" = \"runtime\"\
                      \ ]; then\n      echo \"  ${PREFIX}.runtime.init.image.tag = ${IMAGE_TAG}\"\n      yq -i \".${PREFIX}.runtime.init.image.tag\
                      \ = \\\"${IMAGE_TAG}\\\"\" \"$VALUES_FILE\"\n    fi\n    BUILT_LIST=\"${BUILT_LIST}${item},\"\n  done\n\
                      \  BUILT_LIST=\"${BUILT_LIST%,}\"\n  COMMIT_MSG=\"deploy(dev): update ${BUILT_LIST} to ${IMAGE_TAG}\"\n\
                      fi\n\ngit config user.name \"Harness CI\"\ngit config user.email \"ci@kore.ai\"\ngit add \"$VALUES_FILE\"\
                      \n\nCHANGED=$(git diff --cached --name-only)\nif [ -z \"$CHANGED\" ]; then\n  echo \"No changes to deploy\
                      \ \u2014 tag already up to date\"\n  exit 0\nfi\nif [ \"$CHANGED\" != \"$VALUES_FILE\" ]; then\n  echo \"\
                      ERROR: Unexpected files staged: $CHANGED\"\n  exit 1\nfi\n\ngit commit -m \"${COMMIT_MSG}\n\nSource commit:\
                      \ <+codebase.commitSha>\nPipeline: <+pipeline.executionUrl>\n[skip ci]\"\ngit push origin main\n"
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
  allowStageExecutions: true
  triggers:
    - trigger:
        name: Main Branch Push
        identifier: main_branch_push
        enabled: true
        type: Webhook
        spec:
          type: BitbucketCloud
          spec:
            connectorRef: ablplatformconnector
            repoName: abl-platform
            event: Push
            actions:
              - PushBranch
            payloadConditions:
              - key: targetBranch
                operator: Equals
                value: main
            pathFilters:
              - pathFilter:
                  operator: StartsWith
                  value:
                    - apps/
                    - packages/
                    - services/
    - trigger:
        name: Pull Request
        identifier: pull_request_ci
        enabled: true
        type: Webhook
        spec:
          type: BitbucketCloud
          spec:
            connectorRef: ablplatformconnector
            repoName: abl-platform
            event: PullRequest
            actions:
              - Create
              - Update
            payloadConditions:
              - key: targetBranch
                operator: In
                value: main, develop
            pathFilters:
              - pathFilter:
                  operator: StartsWith
                  value:
                    - apps/
                    - packages/
                    - services/
