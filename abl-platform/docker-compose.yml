# =============================================================================
# ABL Platform - Development Infrastructure
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose down -v        # Stop and remove volumes (reset data)
#   docker compose logs -f mongo  # Follow MongoDB logs
#
# Required env vars (set in shell or .env):
#   ENCRYPTION_MASTER_KEY  — Generate with: openssl rand -hex 32
#   REDIS_PASSWORD         — Defaults to "localdev" if unset
#   OPENSEARCH_ADMIN_PASSWORD — Defaults to "LocalDev123!" if unset
# =============================================================================

services:
  # ─── MongoDB 7 ─────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: abl-mongo
    restart: unless-stopped
    ports:
      - '127.0.0.1:27018:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: abl_admin
      MONGO_INITDB_ROOT_PASSWORD: abl_dev_password
      MONGO_INITDB_DATABASE: abl_platform
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    entrypoint:
      - bash
      - -c
      - |
        # Generate keyfile for replica set auth (required when auth + replSet)
        mkdir -p /etc/mongo
        openssl rand -base64 756 > /etc/mongo/keyfile
        chmod 400 /etc/mongo/keyfile
        chown 999:999 /etc/mongo/keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo/keyfile
    networks:
      - data
    healthcheck:
      test: >
        mongosh -u abl_admin -p abl_dev_password --authenticationDatabase admin --quiet --eval "
          try {
            rs.status().ok
          } catch(e) {
            rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]});
            1;
          }
        "
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── ClickHouse 24 ────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: abl-clickhouse
    restart: unless-stopped
    ports:
      - '127.0.0.1:8124:8123' # HTTP interface
      - '127.0.0.1:9001:9000' # Native TCP interface
    environment:
      CLICKHOUSE_DB: abl_platform
      CLICKHOUSE_USER: abl_admin
      CLICKHOUSE_PASSWORD: abl_dev_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ['CMD', 'clickhouse-client', '--query', 'SELECT 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - data

  # ─── Redis (Optional — runtime falls back to in-memory) ───────────────
  redis:
    image: redis:7-alpine
    container_name: abl-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-localdev}
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-localdev}', '--no-auth-warning', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data

  # ─── Neo4j (Knowledge Graph) ──────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: abl-neo4j
    restart: unless-stopped
    ports:
      - '127.0.0.1:7474:7474' # HTTP
      - '127.0.0.1:7687:7687' # Bolt
    environment:
      NEO4J_AUTH: neo4j/abl_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD', 'cypher-shell', '-u', 'neo4j', '-p', 'abl_dev_password', 'RETURN 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - data

  # ─── Qdrant (Vector Store - Alternative) ────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: abl-qdrant
    restart: unless-stopped
    ports:
      - '127.0.0.1:6333:6333' # HTTP API
      - '127.0.0.1:6334:6334' # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6333/']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data

  # ─── Docling Service (Python — auto-detects GPU at runtime) ──────────
  # GPU: On hosts with NVIDIA Container Toolkit, add GPU reservation:
  #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up docling-service
  # CPU: Default — just `docker compose up` works on any host.
  docling-service:
    build:
      context: ./services/docling-service
      dockerfile: Dockerfile
    container_name: abl-docling-service
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: info
    volumes:
      - ./services/docling-service:/app
      - ./test_data/docling:/test_data/docling:ro
      - ./uploads:/uploads:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend

  # ─── BGE-M3 Embedding Service (Python — auto-detects GPU at runtime) ─
  # Uses Flask + SentenceTransformer with threading.Lock() for GPU safety.
  # Works on ARM64 (Mac) and x86_64. Auto-detects GPU/CPU at startup.
  #
  # Production (x86_64 Linux): Use TEI for better performance:
  #   docker compose -f docker-compose.yml -f docker-compose.bge-m3.yml up bge-m3-embeddings
  # GPU: Add GPU reservation overlay:
  #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up bge-m3-embeddings
  bge-m3-embeddings:
    build:
      context: ./services/bge-m3-service
      dockerfile: Dockerfile
    container_name: abl-bge-m3
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      MODEL_NAME: BAAI/bge-m3
      PORT: 8000
      PYTHONUNBUFFERED: 1
      HF_HUB_OFFLINE: 1
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend

  # ─── Preprocessing Service (Python - Query preprocessing) ──────────
  preprocessing-service:
    build:
      context: ./services/preprocessing-service
      dockerfile: Dockerfile
    container_name: abl-preprocessing
    restart: unless-stopped
    ports:
      - '8003:8003'
    environment:
      FLASK_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdev}
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: 1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'from urllib.request import urlopen; urlopen("http://localhost:8003/health", timeout=5)',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend
      - data

  # ─── Codetool Sandbox (gVisor-based code execution) ───────────────────
  codetool-sandbox:
    build:
      context: ./services/codetool-sandbox
      dockerfile: Dockerfile
    container_name: abl-codetool-sandbox
    restart: unless-stopped
    ports:
      - '8001:8001'
    # gVisor runsc needs SYS_ADMIN for namespace/cgroup creation and
    # SYS_PTRACE for ptrace-based sandboxing of untrusted user code.
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp=services/codetool-sandbox/seccomp-profile.json
    environment:
      EXECUTABLE_TYPE: codetool_python
      TIMEOUT: '60'
      DEBUG: 'True'
      GALE_ENV: local
      ML_APP_HOST: http://host.docker.internal:3112
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - backend

  # ─── NLU Sidecar (Python - Entity extraction + correction detection) ─
  nlu-sidecar:
    build: ./apps/nlu-sidecar
    container_name: abl-nlu-sidecar
    restart: unless-stopped
    ports:
      - '8092:8090'
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import sys, urllib.request; resp = urllib.request.urlopen('http://localhost:8090/health', timeout=3); sys.exit(0 if resp.status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # ─── OpenSearch (Vector Store with k-NN - Primary) ──────────────────
  opensearch:
    image: opensearchproject/opensearch:3.1.0
    container_name: abl-opensearch
    restart: unless-stopped
    ports:
      - '127.0.0.1:9200:9200'
      - '127.0.0.1:9600:9600'
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: 'false'
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD:-LocalDev123!}
      OPENSEARCH_JAVA_OPTS: -Xms2g -Xmx2g
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        ['CMD', 'curl', '-f', '-k', '-u', 'admin:admin', 'https://localhost:9200/_cluster/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - data

  # ─── Kafka (KRaft single-node) ────────────────────────────────────
  kafka:
    image: apache/kafka:4.2.0
    container_name: abl-kafka
    restart: unless-stopped
    ports:
      - '127.0.0.1:19092:19092'
    environment:
      # KRaft combined mode (broker + controller in one node)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Dual listeners: INTERNAL for Docker-to-Docker, EXTERNAL for host access
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Storage
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      # Defaults for dev
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_COMPRESSION_TYPE: lz4
      CLUSTER_ID: 'abl-local-dev-cluster-001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - data

  # ─── Kafka Topic Initialization ──────────────────────────────────
  # One-shot init container that runs `seed-kafka.ts` once Kafka is healthy.
  # Mirrors the production path: the same script runs in the ArgoCD PreSync
  # init container (apps/runtime/Dockerfile target=seed) — so dev↔prod parity
  # is preserved and topic state is created exactly once per cluster bringup.
  init-kafka-topics:
    build:
      context: .
      dockerfile: apps/runtime/Dockerfile
      target: seed
    container_name: abl-init-kafka-topics
    command: ['tsx', 'packages/eventstore/seed-kafka.ts']
    environment:
      EVENT_KAFKA_BROKERS: kafka:9092
      KAFKA_AUTH_ENABLED: ${KAFKA_AUTH_ENABLED:-}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL_ENABLED: ${KAFKA_SSL_ENABLED:-}
    depends_on:
      kafka:
        condition: service_healthy
    restart: 'no'
    networks:
      - data

  # ─── Restate (Durable Execution Engine) ────────────────────────────
  restate:
    image: docker.io/restatedev/restate:1.6.2
    container_name: abl-restate
    restart: unless-stopped
    ports:
      - '9070:9070' # Admin API
      - '8091:8080' # Ingress (mapped to 8091 to avoid conflict with nlu-sidecar on 8090)
    volumes:
      - ./docker/restate.toml:/restate.toml:ro
    environment:
      RESTATE_CONFIG: /restate.toml
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:9070/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend
      - data

  # ─── Workflow Engine (Restate-backed workflow execution) ───────────
  workflow-engine:
    build:
      context: .
      dockerfile: apps/workflow-engine/Dockerfile
    container_name: abl-workflow-engine
    restart: unless-stopped
    ports:
      - '9080:9080'
    environment:
      PORT: 9080
      RESTATE_ADMIN_URL: http://abl-restate:9070
      RESTATE_INGRESS_URL: http://abl-restate:8080
      RESTATE_ENDPOINT_URL: http://abl-workflow-engine:9081
      RUNTIME_URL: http://host.docker.internal:3112
      MONGODB_URL: mongodb://abl_admin:abl_dev_password@mongo:27017/abl_platform?authSource=admin&directConnection=true
      REDIS_URL: redis://:${REDIS_PASSWORD:-localdev}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-that-is-at-least-32chars}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY must be set}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      restate:
        condition: service_healthy
      init-kafka-topics:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          '/nodejs/bin/node',
          '-e',
          "require('http').get('http://localhost:9080/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend
      - data

  # ─── Pipeline Engine (Restate-backed analytics pipelines) ────────
  pipeline-engine:
    build:
      context: .
      dockerfile: packages/pipeline-engine/Dockerfile
    container_name: abl-pipeline-engine
    restart: unless-stopped
    ports:
      - '9082:9082'
    environment:
      RESTATE_SERVICE_PORT: 9082
      RESTATE_ADMIN_URL: http://abl-restate:9070
      RESTATE_INGRESS_URL: http://abl-restate:8080
      RESTATE_ENDPOINT_URL: http://pipeline-engine:9082
      MONGODB_URL: mongodb://abl_admin:abl_dev_password@mongo:27017/abl_platform?authSource=admin&directConnection=true
      CLICKHOUSE_URL: http://abl_admin:abl_dev_password@clickhouse:8123
      REDIS_URL: redis://:${REDIS_PASSWORD:-localdev}@redis:6379
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY must be set}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-that-is-at-least-32chars}
      EVAL_SERVICE_USER_ID: ${EVAL_SERVICE_USER_ID:-}
      RUNTIME_URL: http://host.docker.internal:3112
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      restate:
        condition: service_healthy
      init-kafka-topics:
        condition: service_completed_successfully
    networks:
      - backend
      - data

  # ─── Academy Service (Learning Academy API) ─────────────────────────────
  academy:
    build:
      context: .
      dockerfile: apps/academy/Dockerfile
    container_name: abl-academy
    restart: unless-stopped
    ports:
      - '3116:3116'
    environment:
      PORT: 3116
      NODE_ENV: production
      MONGODB_URL: mongodb://abl_admin:abl_dev_password@mongo:27017/abl_platform?authSource=admin&replicaSet=rs0
      MONGODB_DATABASE: abl_platform
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:3116/health\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - backend
      - data

  # ─── Template Store Service (Marketplace API) ────────────────────────────
  template-store:
    build:
      context: .
      dockerfile: apps/template-store/Dockerfile
      target: debug
    container_name: abl-template-store
    restart: unless-stopped
    ports:
      - '3115:3115'
    env_file: .env
    environment:
      PORT: 3115
      NODE_ENV: development
      MONGODB_URL: mongodb://abl_admin:abl_dev_password@mongo:27017/abl_platform?authSource=admin&replicaSet=rs0
      MONGODB_DATABASE: abl_platform
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:3115/health\").then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./apps/template-store/src:/app/apps/template-store/src
    networks:
      - backend
      - data

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
  clickhouse_data:
  clickhouse_logs:
  redis_data:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
  opensearch_data:
