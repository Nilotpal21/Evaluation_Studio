<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent SDK - Interactive Test</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        margin-bottom: 20px;
        color: #667eea;
      }
      .status {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .status.connected {
        background: #10b98120;
        border: 1px solid #10b981;
      }
      .status.disconnected {
        background: #ef444420;
        border: 1px solid #ef4444;
      }
      .status.connecting {
        background: #f59e0b20;
        border: 1px solid #f59e0b;
      }

      .section {
        background: #2a2a4a;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      .section h2 {
        font-size: 18px;
        margin-bottom: 16px;
        color: #a5b4fc;
      }

      .chat-box {
        background: #1a1a2e;
        border-radius: 8px;
        height: 300px;
        overflow-y: auto;
        padding: 16px;
        margin-bottom: 12px;
      }
      .message {
        padding: 10px 14px;
        border-radius: 12px;
        margin-bottom: 8px;
        max-width: 80%;
      }
      .message.user {
        background: #667eea;
        margin-left: auto;
      }
      .message.assistant {
        background: #3a3a5a;
      }
      .message.system {
        background: #f59e0b30;
        color: #fbbf24;
        font-size: 12px;
        text-align: center;
        max-width: 100%;
      }

      .input-row {
        display: flex;
        gap: 8px;
      }
      .input-row input {
        flex: 1;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        background: #1a1a2e;
        color: #fff;
        font-size: 14px;
      }
      .input-row input:focus {
        outline: 2px solid #667eea;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        background: #5a6fd6;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.danger {
        background: #ef4444;
      }
      button.danger:hover {
        background: #dc2626;
      }
      button.success {
        background: #10b981;
      }

      .voice-controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .voice-status {
        padding: 8px 16px;
        border-radius: 20px;
        background: #3a3a5a;
        font-size: 13px;
      }
      .voice-status.listening {
        background: #10b98130;
        color: #34d399;
      }
      .voice-status.speaking {
        background: #667eea30;
        color: #a5b4fc;
      }

      .logs {
        background: #0a0a1a;
        border-radius: 8px;
        padding: 12px;
        font-family: monospace;
        font-size: 12px;
        height: 150px;
        overflow-y: auto;
      }
      .log-entry {
        margin-bottom: 4px;
      }
      .log-entry.error {
        color: #ef4444;
      }
      .log-entry.success {
        color: #10b981;
      }
      .log-entry.info {
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Agent SDK Test</h1>

      <div id="status" class="status disconnected">Disconnected - Click "Connect" to start</div>

      <!-- Connection -->
      <div class="section">
        <h2>Connection</h2>
        <div style="display: flex; gap: 12px">
          <button id="connectBtn" onclick="connect()">Connect</button>
          <button id="disconnectBtn" onclick="disconnect()" disabled class="danger">
            Disconnect
          </button>
        </div>
      </div>

      <!-- Chat -->
      <div class="section">
        <h2>Chat</h2>
        <div id="chatBox" class="chat-box">
          <div class="message system">Send a message to start chatting</div>
        </div>
        <div class="input-row">
          <input
            type="text"
            id="chatInput"
            placeholder="Type a message..."
            onkeydown="if (event.key === 'Enter') sendMessage();"
          />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>

      <!-- Voice -->
      <div class="section">
        <h2>Voice</h2>
        <div class="voice-controls">
          <button id="voiceStartBtn" onclick="startVoice()">Start Voice</button>
          <button id="voiceStopBtn" onclick="stopVoice()" disabled class="danger">Stop</button>
          <button id="muteBtn" onclick="toggleMute()" disabled>Mute</button>
          <div id="voiceStatus" class="voice-status">Idle</div>
        </div>
      </div>

      <!-- Logs -->
      <div class="section">
        <h2>Debug Logs</h2>
        <div id="logs" class="logs"></div>
      </div>
    </div>

    <script type="module">
      import { AgentSDK } from '../../dist/agent-sdk.esm.js';

      let sdk = null;
      let chat = null;
      let voice = null;

      function log(msg, type = '') {
        const logs = document.getElementById('logs');
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + type;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logs.appendChild(entry);
        logs.scrollTop = logs.scrollHeight;
      }

      function updateStatus(status, text) {
        const el = document.getElementById('status');
        el.className = 'status ' + status;
        el.textContent = text;
      }

      function addMessage(text, role) {
        const chatBox = document.getElementById('chatBox');
        const msg = document.createElement('div');
        msg.className = 'message ' + role;
        msg.textContent = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      window.connect = async function () {
        try {
          updateStatus('connecting', 'Connecting...');
          log('Initializing SDK...', 'info');

          sdk = new AgentSDK({
            projectId: 'demo_project',
            apiKey: 'pk_demo_key',
            endpoint: 'http://localhost:3112',
            debug: true,
          });

          // Set up event handlers
          sdk.on('connected', () => {
            log('Connected!', 'success');
            updateStatus('connected', 'Connected - Session: ' + sdk.getSessionId());
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('disconnectBtn').disabled = false;
          });

          sdk.on('disconnected', () => {
            log('Disconnected', 'error');
            updateStatus('disconnected', 'Disconnected');
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
          });

          sdk.on('error', (err) => {
            log('Error: ' + err.error?.message, 'error');
          });

          // Connect
          await sdk.connect();

          // Get chat client
          chat = sdk.chat();
          chat.on('message', (msg) => {
            log('Received message: ' + msg.content?.substring(0, 50) + '...', 'info');
            addMessage(msg.content, msg.role);
          });
          chat.on('typing', () => {
            log('Agent is typing...', 'info');
          });

          // Get voice client
          voice = sdk.voice();
          voice.on('stateChange', ({ state }) => {
            document.getElementById('voiceStatus').textContent = state;
            document.getElementById('voiceStatus').className = 'voice-status ' + state;
            log('Voice state: ' + state, 'info');
          });
          voice.on('transcription', ({ text }) => {
            log('Transcription: ' + text, 'info');
          });
          voice.on('error', ({ error }) => {
            log('Voice error: ' + error.message, 'error');
          });
        } catch (err) {
          log('Connection failed: ' + err.message, 'error');
          updateStatus('disconnected', 'Connection failed: ' + err.message);
        }
      };

      window.disconnect = function () {
        if (sdk) {
          sdk.disconnect();
          sdk = null;
          chat = null;
          voice = null;
        }
      };

      window.sendMessage = async function () {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !chat) return;

        input.value = '';
        addMessage(text, 'user');
        log('Sending: ' + text, 'info');

        try {
          await chat.send(text);
        } catch (err) {
          log('Send failed: ' + err.message, 'error');
        }
      };

      window.startVoice = async function () {
        if (!voice) {
          log('Not connected', 'error');
          return;
        }
        try {
          log('Starting voice...', 'info');
          await voice.start();
          document.getElementById('voiceStartBtn').disabled = true;
          document.getElementById('voiceStopBtn').disabled = false;
          document.getElementById('muteBtn').disabled = false;
        } catch (err) {
          log('Voice start failed: ' + err.message, 'error');
        }
      };

      window.stopVoice = function () {
        if (voice) {
          voice.stop();
          document.getElementById('voiceStartBtn').disabled = false;
          document.getElementById('voiceStopBtn').disabled = true;
          document.getElementById('muteBtn').disabled = true;
        }
      };

      window.toggleMute = function () {
        if (voice) {
          const muted = voice.toggleMute();
          document.getElementById('muteBtn').textContent = muted ? 'Unmute' : 'Mute';
        }
      };

      // Auto-connect on load
      log('Page loaded. Click Connect to start.', 'info');
    </script>
  </body>
</html>
