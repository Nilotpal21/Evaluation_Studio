# Workflow Engine — Local Development Stack
#
# Starts Restate + Kafka for @agent-platform/pipeline-engine.
# MongoDB and Redis are reused from the abl-platform stack (abl-platform_default network).
#
# Usage:
#   docker compose up -d            # start stack
#   docker compose up -d --wait     # start + wait for healthy
#   pnpm dev                        # run pipeline-worker locally (tsx watch)
#
# After the stack is up, register the local worker with Restate:
#   ./docker/register-services.sh
#
# Ports:
#   8080  — Restate Ingress  (pipeline client calls)
#   9070  — Restate Admin    (deployments, subscriptions)
#   9071  — Restate Metrics  (Prometheus scrape)
#   19092 — Kafka broker     (host-mapped)
#   8090  — Kafka UI         (topic browser)
#   9080  — Pipeline Worker  (run locally via pnpm dev)
#
# Reused from abl-platform:
#   27018 → MongoDB  (container: abl-mongo)
#   6380  → Redis    (container: abl-redis)

services:
  # ── Restate Server ────────────────────────────────────────────────
  restate:
    image: docker.io/restatedev/restate:1.6.2
    container_name: wfe-restate
    ports:
      - '8080:8080'
      - '9070:9070'
      - '9071:9071'
    volumes:
      - restate-data:/target/restate-data
      - ./docker/restate.toml:/restate.toml:ro
    environment:
      RESTATE_CONFIG: /restate.toml
      RESTATE_OBSERVABILITY__LOG__FORMAT: Json
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9070/version || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - wfe
      - abl-platform

  # ── Kafka (KRaft single-node) ────────────────────────────────────
  kafka:
    image: apache/kafka:4.2.0
    container_name: wfe-kafka
    ports:
      - '19092:19092'
    environment:
      # KRaft combined mode (broker + controller in one node)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Dual listeners: INTERNAL for Docker-to-Docker, EXTERNAL for host access
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Storage
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      # Defaults for dev
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_COMPRESSION_TYPE: lz4
      CLUSTER_ID: 'wfe-local-dev-cluster-001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - wfe

  # ── Kafka Topic Initialization ────────────────────────────────────
  # One-shot init container: runs `seed-kafka.ts` once Kafka is healthy.
  # Mirrors the production path (ArgoCD PreSync init container) so dev↔prod
  # parity is preserved.
  init-kafka-topics:
    build:
      context: ../..
      dockerfile: apps/runtime/Dockerfile
      target: seed
    container_name: wfe-init-kafka-topics
    command: ['tsx', 'packages/eventstore/seed-kafka.ts']
    environment:
      EVENT_KAFKA_BROKERS: kafka:9092
      KAFKA_AUTH_ENABLED: ${KAFKA_AUTH_ENABLED:-}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_SSL_ENABLED: ${KAFKA_SSL_ENABLED:-}
    depends_on:
      kafka:
        condition: service_healthy
    restart: 'no'
    networks:
      - wfe

  # ── Kafka UI (kafbat fork — provectuslabs/kafka-ui is abandoned) ──
  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: wfe-kafka-ui
    ports:
      - '8090:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: wfe-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - wfe

volumes:
  restate-data:

networks:
  wfe:
    name: wfe-network
  abl-platform:
    external: true
    name: abl-platform_default
