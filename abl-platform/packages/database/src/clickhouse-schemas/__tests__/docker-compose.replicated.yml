services:
  clickhouse-r1:
    image: clickhouse/clickhouse-server:24.8
    container_name: ch-test-r1
    ports:
      - '18123:8123'
      - '19000:9000'
    volumes:
      - ch-r1-data:/var/lib/clickhouse
    configs:
      - source: ch-r1-config
        target: /etc/clickhouse-server/config.d/cluster.xml
      - source: ch-r1-keeper
        target: /etc/clickhouse-server/config.d/keeper.xml
      - source: ch-r1-macros
        target: /etc/clickhouse-server/config.d/macros.xml
      - source: ch-users
        target: /etc/clickhouse-server/users.d/default.xml

  clickhouse-r2:
    image: clickhouse/clickhouse-server:24.8
    container_name: ch-test-r2
    ports:
      - '28123:8123'
      - '29000:9000'
    volumes:
      - ch-r2-data:/var/lib/clickhouse
    configs:
      - source: ch-r2-config
        target: /etc/clickhouse-server/config.d/cluster.xml
      - source: ch-r2-keeper
        target: /etc/clickhouse-server/config.d/keeper.xml
      - source: ch-r2-macros
        target: /etc/clickhouse-server/config.d/macros.xml
      - source: ch-users
        target: /etc/clickhouse-server/users.d/default.xml

  clickhouse-r3:
    image: clickhouse/clickhouse-server:24.8
    container_name: ch-test-r3
    volumes:
      - ch-r3-data:/var/lib/clickhouse
    configs:
      - source: ch-r3-config
        target: /etc/clickhouse-server/config.d/cluster.xml
      - source: ch-r3-keeper
        target: /etc/clickhouse-server/config.d/keeper.xml
      - source: ch-r3-macros
        target: /etc/clickhouse-server/config.d/macros.xml
      - source: ch-users
        target: /etc/clickhouse-server/users.d/default.xml

volumes:
  ch-r1-data:
  ch-r2-data:
  ch-r3-data:

configs:
  ch-r1-keeper:
    content: |
      <clickhouse>
        <keeper_server>
          <tcp_port>9181</tcp_port>
          <server_id>1</server_id>
          <coordination_settings>
            <operation_timeout_ms>10000</operation_timeout_ms>
            <session_timeout_ms>30000</session_timeout_ms>
          </coordination_settings>
          <raft_configuration>
            <server><id>1</id><hostname>ch-test-r1</hostname><port>9234</port></server>
            <server><id>2</id><hostname>ch-test-r2</hostname><port>9234</port></server>
            <server><id>3</id><hostname>ch-test-r3</hostname><port>9234</port></server>
          </raft_configuration>
        </keeper_server>
      </clickhouse>
  ch-r2-keeper:
    content: |
      <clickhouse>
        <keeper_server>
          <tcp_port>9181</tcp_port>
          <server_id>2</server_id>
          <coordination_settings>
            <operation_timeout_ms>10000</operation_timeout_ms>
            <session_timeout_ms>30000</session_timeout_ms>
          </coordination_settings>
          <raft_configuration>
            <server><id>1</id><hostname>ch-test-r1</hostname><port>9234</port></server>
            <server><id>2</id><hostname>ch-test-r2</hostname><port>9234</port></server>
            <server><id>3</id><hostname>ch-test-r3</hostname><port>9234</port></server>
          </raft_configuration>
        </keeper_server>
      </clickhouse>
  ch-r3-keeper:
    content: |
      <clickhouse>
        <keeper_server>
          <tcp_port>9181</tcp_port>
          <server_id>3</server_id>
          <coordination_settings>
            <operation_timeout_ms>10000</operation_timeout_ms>
            <session_timeout_ms>30000</session_timeout_ms>
          </coordination_settings>
          <raft_configuration>
            <server><id>1</id><hostname>ch-test-r1</hostname><port>9234</port></server>
            <server><id>2</id><hostname>ch-test-r2</hostname><port>9234</port></server>
            <server><id>3</id><hostname>ch-test-r3</hostname><port>9234</port></server>
          </raft_configuration>
        </keeper_server>
      </clickhouse>

  ch-r1-config:
    content: |
      <clickhouse>
        <listen_host>0.0.0.0</listen_host>
        <zookeeper>
          <node><host>ch-test-r1</host><port>9181</port></node>
          <node><host>ch-test-r2</host><port>9181</port></node>
          <node><host>ch-test-r3</host><port>9181</port></node>
        </zookeeper>
        <remote_servers>
          <test_cluster>
            <shard>
              <internal_replication>true</internal_replication>
              <replica><host>ch-test-r1</host><port>9000</port></replica>
              <replica><host>ch-test-r2</host><port>9000</port></replica>
            </shard>
          </test_cluster>
        </remote_servers>
        <distributed_ddl><path>/clickhouse/task_queue/ddl</path></distributed_ddl>
      </clickhouse>
  ch-r2-config:
    content: |
      <clickhouse>
        <listen_host>0.0.0.0</listen_host>
        <zookeeper>
          <node><host>ch-test-r1</host><port>9181</port></node>
          <node><host>ch-test-r2</host><port>9181</port></node>
          <node><host>ch-test-r3</host><port>9181</port></node>
        </zookeeper>
        <remote_servers>
          <test_cluster>
            <shard>
              <internal_replication>true</internal_replication>
              <replica><host>ch-test-r1</host><port>9000</port></replica>
              <replica><host>ch-test-r2</host><port>9000</port></replica>
            </shard>
          </test_cluster>
        </remote_servers>
        <distributed_ddl><path>/clickhouse/task_queue/ddl</path></distributed_ddl>
      </clickhouse>
  ch-r3-config:
    content: |
      <clickhouse>
        <listen_host>0.0.0.0</listen_host>
        <zookeeper>
          <node><host>ch-test-r1</host><port>9181</port></node>
          <node><host>ch-test-r2</host><port>9181</port></node>
          <node><host>ch-test-r3</host><port>9181</port></node>
        </zookeeper>
        <remote_servers>
          <test_cluster>
            <shard>
              <internal_replication>true</internal_replication>
              <replica><host>ch-test-r1</host><port>9000</port></replica>
              <replica><host>ch-test-r2</host><port>9000</port></replica>
            </shard>
          </test_cluster>
        </remote_servers>
        <distributed_ddl><path>/clickhouse/task_queue/ddl</path></distributed_ddl>
      </clickhouse>
  ch-r1-macros:
    content: |
      <clickhouse><macros><shard>1</shard><replica>ch-test-r1</replica><cluster>test_cluster</cluster></macros></clickhouse>
  ch-r2-macros:
    content: |
      <clickhouse><macros><shard>1</shard><replica>ch-test-r2</replica><cluster>test_cluster</cluster></macros></clickhouse>
  ch-r3-macros:
    content: |
      <clickhouse><macros><shard>1</shard><replica>ch-test-r3</replica><cluster>test_cluster</cluster></macros></clickhouse>
  ch-users:
    content: |
      <clickhouse>
        <users>
          <default>
            <password></password>
            <networks><ip>::/0</ip></networks>
            <profile>default</profile>
            <quota>default</quota>
            <access_management>1</access_management>
          </default>
        </users>
      </clickhouse>
