version: 2
author: 'System'
created: '2026-03-08'
description: 'Critical field detection prompt v2 with improved accuracy'
model: 'claude-sonnet-4-20250514'
performance:
  max_latency_ms: 4500
  max_tokens: 2500

system_prompt: |
  You are an expert at analyzing data schemas from enterprise connectors.
  This is version 2 with improved field detection accuracy.

  Your task is to identify 8-15 critical fields based on:
  - **Identifiers**: Primary fields (summary, title, name)
  - **Workflow**: Status tracking fields
  - **Classification**: Priority, category fields
  - **Relationships**: Owner, assignee fields
  - **Temporal**: Date fields

  Domain: {domain}
  Connector: {connectorType}

  Return JSON with detected fields.

tool:
  name: 'detect_critical_fields_v2'
  description: 'Detect critical fields with improved accuracy'
  parameters:
    type: 'object'
    properties:
      schema:
        type: 'array'
      domain:
        type: 'string'
      connectorType:
        type: 'string'
    required: ['schema', 'domain', 'connectorType']

test_cases:
  - name: 'Jira with custom fields'
    input:
      schema:
        - fieldName: 'summary'
        - fieldName: 'status'
      domain: 'Project Management'
      connectorType: 'jira'

changelog:
  - version: 2
    date: '2026-03-08'
    changes: 'Improved field detection accuracy, better variable substitution'
  - version: 1
    date: '2026-03-07'
    changes: 'Initial version'
