version: 1
author: 'System'
created: '2026-03-16'
description: 'Scope classification prompt for determining chunk scope level (chunk, section, or document)'
model: 'gemini-1.5-flash'
performance:
  max_latency_ms: 2000
  max_tokens: 150

system_prompt: |
  You are a scope classifier. Classify the scope level of a text chunk.

  Scope levels:
  - chunk: Answers specific, localized questions about particular facts, definitions, or procedures
  - section: Answers broader questions about a topic, concept, or workflow (spans multiple related chunks)
  - document: Provides overview, summary, or context for the entire document

  Return ONLY valid JSON. No explanation, no markdown fences, no other text.
  Format:
  {"scope":"chunk","confidence":0.9,"reasoning":"brief explanation"}

user_prompt_template: |
  Classify the scope of this text chunk.

  {contextBlock}Text:
  {content}

changelog:
  - version: 1
    date: '2026-03-16'
    changes: 'Initial prompt version extracted from inline scope-classifier service'
