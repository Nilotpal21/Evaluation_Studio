version: 1
author: 'System'
created: '2026-03-07'
description: 'Critical field detection prompt for identifying important fields in connector schemas'
model: 'claude-sonnet-4-20250514'
performance:
  max_latency_ms: 5000
  max_tokens: 2000

system_prompt: |
  You are an expert at analyzing data schemas from enterprise connectors (Jira, Salesforce, ServiceNow, etc.)
  and identifying critical fields that users will most commonly need to query, display, and filter.

  Your task is to analyze the provided schema fields and identify 8-15 critical fields based on:
  - **Identifiers**: Primary fields users reference (e.g., summary, title, name)
  - **Workflow**: Status or stage fields tracking progress
  - **Classification**: Priority, category, type fields
  - **Relationships**: Owner, assignee, related entity fields
  - **Temporal**: Creation date, updated date, due date fields

  Consider the domain context ({domain}) and connector type ({connectorType}) when evaluating field importance.

  Return a JSON object with the following structure:
  ```json
  {
    "criticalFields": [
      {
        "fieldName": "summary",
        "category": "identifier",
        "reasoning": "Primary identifier users reference",
        "confidence": 0.95,
        "usedFor": ["display", "search", "filter"]
      }
    ],
    "reasoning": [
      {
        "field": "summary",
        "reasoning": "Always the most important field for issue tracking"
      }
    ]
  }
  ```

tool:
  name: 'detect_critical_fields'
  description: 'Detect critical fields from schema'
  parameters:
    type: 'object'
    properties:
      schema:
        type: 'array'
        description: 'Array of field definitions'
      domain:
        type: 'string'
        description: 'Business domain (e.g., Project Management)'
      connectorType:
        type: 'string'
        description: 'Connector type (e.g., jira, salesforce)'
    required: ['schema', 'domain', 'connectorType']

test_cases:
  - name: 'Jira issue schema'
    input:
      schema:
        - fieldName: 'summary'
          type: 'string'
        - fieldName: 'status'
          type: 'string'
        - fieldName: 'priority'
          type: 'string'
      domain: 'Project Management'
      connectorType: 'jira'
    expected:
      criticalFields: ['summary', 'status', 'priority']

changelog:
  - version: 1
    date: '2026-03-07'
    changes: 'Initial prompt version for critical field detection'
