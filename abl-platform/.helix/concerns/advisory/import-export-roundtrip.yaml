id: import-export-roundtrip
title: Import / Export / Round-Trip Fidelity
enforcement: advisory
severity_default: high
rubric_concern: 7

protects:
  - project-io correctness
  - Git/export serialization fidelity
  - import preview and apply correctness
  - persisted config surviving round-trip without semantic loss

review_when:
  - project-io, Git sync, module publish/import changes
  - localization asset, auth profile, or environment variable formats change
  - any persisted asset format changes

review_questions:
  - Can the changed asset still export into the canonical file or manifest shape?
  - Can the same artifact import back without silent drift?
  - Are IDs, aliases, namespaces, environment bindings, and auth references preserved or intentionally remapped?
  - Does the control-plane representation match the runtime materialized representation?
  - If a feature claims import/export support, is there round-trip proof?

proof_expected:
  - round-trip import/export tests
  - snapshot or fixture validation for canonical serialized shapes
  - preview/apply tests if import preview exists
  - explicit docs update when the exported contract changes

scope:
  globs:
    - apps/**/src/services/project-io/**/*.ts
    - apps/**/src/services/git-sync/**/*.ts
    - apps/**/src/services/publish/**/*.ts
    - packages/project-io/src/**/*.ts
    - packages/compiler/src/exporters/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  docs:
    - docs/sdlc/change-review-rubric.md
  related_concerns:
    - clean-contracts
    - session-context

detectors:
  - id: exported-asset-has-roundtrip-coverage
    kind: model-review
    severity: high
    guidance_ref: ../../prompts/roundtrip-fidelity-lens.md
    output_schema:
      rule_id: exported-asset-has-roundtrip-coverage
      severity: high | medium
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: add an export→import round-trip test proving semantic equivalence
        B: confirm the change does not alter persisted shape (cite invariants)
        C: document the intentional shape change and bump the export version
    message: |
      Changes to exporters, importers, Git-sync serialization, or persisted
      asset shapes must prove round-trip fidelity. Silent drift between
      export and import is a recurring failure mode for project-io.
    fix_hint: |
      Add a round-trip test that exports the asset, re-imports it, and
      asserts semantic equivalence. Snapshot the canonical shape under
      __fixtures__/ for future drift detection.

stage_hooks:
  - stage: implementation
    inject_checklist: true
  - stage: oracle-analysis
    as_review_lens: true
