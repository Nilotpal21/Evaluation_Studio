id: clean-contracts
title: Clean Contracts — Explicit Types
enforcement: advisory
severity_default: medium
rubric_concern: 6

scope:
  globs:
    - apps/**/src/**/*.ts
    - apps/**/src/**/*.tsx
    - packages/**/src/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'
    - '**/*.d.ts'

references:
  docs:
    - CLAUDE.md#key-rules
    - CLAUDE.md#type-safety---read-before-you-write
  related_concerns:
    - message-metadata
    - session-context

detectors:
  - id: no-any-where-structured-type-fits
    kind: model-review
    severity: medium
    guidance_ref: ../../prompts/no-any-lens.md
    output_schema:
      rule_id: no-any-where-structured-type-fits
      severity: medium | low
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: replace with a discriminated union or a named interface
        B: confirm the value is truly unknown (external input) — use unknown, not any
        C: add a type guard + narrow before use
    message: |
      `any` is acceptable only when no structured type can express the value
      (true external input). Where a union / interface / discriminated union
      fits, use it — `any` silently drops type safety across the call site.
    fix_hint: |
      Prefer `unknown` + narrowing over `any`. Use discriminated unions for
      event / message shapes. See packages/shared-types for existing unions.

  - id: unsafe-error-cast
    kind: grep
    severity: medium
    # Pattern uses character class to avoid tripping the unsafe-error-cast
    # PreToolUse hook on this concerns file itself.
    pattern: '\(err as [E]rror\)\.message'
    message: |
      Casting `err as Error` lies to the type checker — err may not be an Error.
      Use the canonical narrowing pattern.
    fix_hint: |
      Replace with: err instanceof Error ? err.message : String(err).
      This is a Key Rule in CLAUDE.md.

  - id: inline-magic-number
    kind: model-review
    severity: low
    guidance_ref: ../../prompts/magic-number-lens.md
    output_schema:
      rule_id: inline-magic-number
      severity: low
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: extract to a named constant (in-file or packages/config/src/constants.ts)
        B: confirm the literal is self-documenting (0, 1, unit bounds)
    message: |
      Inline numeric literals in business logic hurt readability and make
      tuning risky. Extract to a named constant with rationale.
    fix_hint: |
      Use an UPPER_SNAKE_CASE const with a brief comment on units and origin.
      Config-driven values go into packages/config.

stage_hooks:
  - stage: implementation
    inject_checklist: true
