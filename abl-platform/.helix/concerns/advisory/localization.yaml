id: localization
title: Localization — User-Facing Strings
enforcement: advisory
severity_default: low
rubric_concern: 14

# Ownership boundary: project vs platform catalogs are separate domains.
# See docs/design/2026-04-18-localization-ownership-boundaries.md for the
# decision record — who owns what, runtime resolution, anti-patterns.
# Detectors below cover platform-catalog files (Studio/Admin). Project-
# catalog detectors (project bundle locale files) are tracked as a
# follow-up once the project-bundle manifest spec lands.

scope:
  globs:
    - apps/studio/src/**/*.tsx
    - apps/studio/src/**/*.ts
    - apps/admin/src/**/*.tsx
    - apps/admin/src/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  docs:
    - CLAUDE.md#key-rules
    - docs/design/2026-04-18-localization-ownership-boundaries.md
  related_concerns:
    - ux-design
    - design-system

detectors:
  - id: user-facing-string-in-i18n
    kind: model-review
    severity: low
    guidance_ref: ../../prompts/i18n-coverage-lens.md
    output_schema:
      rule_id: user-facing-string-in-i18n
      severity: medium | low
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: wrap in t('key') and add the key to the translation bundle
        B: confirm this is developer-only (dev tooling, error IDs, logs)
        C: string is a brand name / identifier that should not be translated
    message: |
      User-visible strings in React components should route through the
      i18n helper so they can be translated. Raw literals block localization.
    fix_hint: |
      Import t from the i18n helper and replace 'Label text' with t('labelKey').
      Add labelKey to the translation bundle. See the i18n-guide skill.

  - id: error-messages-localized
    kind: model-review
    severity: low
    guidance_ref: ../../prompts/i18n-errors-lens.md
    output_schema:
      rule_id: error-messages-localized
      severity: medium | low
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: use a stable error code + localized message lookup
        B: confirm this is a dev-only / internal error
    message: |
      User-facing error messages (chat banners, API error bodies rendered to
      users, session health notices) should pair a stable error code with a
      localized user-facing message.
    fix_hint: |
      Return { code: 'ERR_X', messageKey: 'errX' } from the server; the UI
      renders t(messageKey). Keep raw context in logs (see CLAUDE.md
      "User-Facing Runtime Error Sanitization").

stage_hooks:
  - stage: ux-design-audit
    as_review_lens: true
