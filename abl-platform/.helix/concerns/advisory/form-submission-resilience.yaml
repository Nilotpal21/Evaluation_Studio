id: form-submission-resilience
title: Form Submission Error Handling
enforcement: advisory
severity_default: high
rubric_concern: 13

protects:
  - users seeing actionable error messages when form submission fails
  - async errors not being swallowed silently

review_when:
  - any file in apps/studio adds a form, mutation hook, or onSubmit handler
  - any route handler adds a validation error response

review_questions:
  - Does every async onSubmit handler have a try/catch or .catch() that displays the error in the UI?
  - Does every useMutation call have an onError handler that shows a toast or sets form error state?
  - Does the form show field-level validation errors (not just a toast)?
  - Is the submit button disabled while the mutation is pending (isPending / isLoading)?
  - When the API returns a 422/400 with a message, does the UI display that message?

proof_expected:
  - E2E scenario that submits the form with invalid data and asserts the error message appears in the DOM
  - E2E scenario that simulates API returning 422 and asserts error is surfaced in the form
  - submit button has disabled={isPending} or equivalent

scope:
  globs:
    - apps/studio/src/**/*.tsx
    - apps/admin/src/**/*.tsx
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  related_concerns:
    - ux-design
    - test-integrity
    - studio-wiring

detectors:
  - id: mutate-async-without-catch
    kind: grep
    severity: high
    pattern: "await mutateAsync\\("
    message: |
      mutateAsync() throws on error. Without a try/catch wrapping the await,
      the rejection is unhandled and the form silently freezes or crashes.
      This is the most common cause of "form fails on first try" with no
      visible error message.
    fix_hint: |
      Wrap in try/catch and display the error:
        try { await mutateAsync(data); }
        catch (err) { toast.error(err instanceof Error ? err.message : 'Failed'); }
      Or use mutate() with an onError callback instead.

  - id: mutation-missing-on-error
    kind: grep
    severity: medium
    pattern: 'useMutation\s*\(<'
    message: |
      useMutation calls should declare an onError handler to ensure
      API failures are surfaced to the user. A mutation without onError
      silently drops errors unless every call site wraps mutateAsync().
    fix_hint: |
      Add onError to the mutation options:
        useMutation({ mutationFn: ..., onError: (err) => toast.error(err.message) })
      Or use a global mutation error handler in the query client defaults.

  - id: form-error-display
    kind: model-review
    severity: high
    guidance_ref: ../prompts/form-error-handling-lens.md
    output_schema:
      rule_id: form-error-display
      severity: high | medium
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: add error display in the JSX using mutation.error or form.formState.errors
        B: add a global toast.error call in the onError callback
        C: confirm errors are surfaced via a parent error boundary (cite it)

stage_hooks:
  - stage: implementation
    inject_checklist: true
  - stage: ux-design-audit
    as_review_lens: true
  - stage: testing
    inject_checklist: true
