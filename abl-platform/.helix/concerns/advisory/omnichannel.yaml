id: omnichannel
title: Omnichannel Consistency
enforcement: advisory
severity_default: medium
rubric_concern: 3

scope:
  globs:
    - apps/runtime/src/**/*.ts
    - apps/search-ai/src/**/*.ts
    - packages/compiler/src/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  related_concerns:
    - session-identity
    - message-metadata
    - agent-transfer

detectors:
  - id: channel-agnostic-core
    kind: model-review
    severity: medium
    guidance_ref: ../../prompts/omnichannel-core-lens.md
    output_schema:
      rule_id: channel-agnostic-core
      severity: medium | low
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: extract channel-specific logic to the adapter; core stays channel-agnostic
        B: confirm the branching is justified (cite channel capability asymmetry)
        C: introduce a capability flag instead of a channel check
    message: |
      Core reasoning / execution code should be channel-agnostic. Branching
      on channel (web vs voice vs chat vs IVR) inside core modules creates
      parallel code paths that drift. Adapters at the edge normalize into
      a common shape; the core sees that shape.
    fix_hint: |
      Move `if (channel === 'voice')` branches into the voice adapter.
      Core should read capability flags from ExecutionContext, not channel.

  - id: channel-parity-claims
    kind: model-review
    severity: medium
    guidance_ref: ../../prompts/channel-parity-lens.md
    output_schema:
      rule_id: channel-parity-claims
      severity: medium | low
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: implement the missing channel
        B: document the asymmetry explicitly (feature flag, channel matrix)
        C: docs claim parity incorrectly — update docs
    message: |
      When a feature claims omnichannel / multichannel support, the claim
      must match reality. Missing implementations for one channel produce
      broken user expectations.
    fix_hint: |
      Cross-reference channel parity claims in docs against adapter
      implementations. Keep a channel capability matrix in the feature spec.

stage_hooks:
  - stage: oracle-analysis
    as_review_lens: true
  - stage: ux-design-audit
    as_review_lens: true
