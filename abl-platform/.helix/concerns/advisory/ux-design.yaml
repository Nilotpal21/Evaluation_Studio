id: ux-design
title: UX Design Quality
enforcement: advisory
severity_default: medium
rubric_concern: 13

scope:
  globs:
    - apps/studio/src/**/*.tsx
    - apps/admin/src/**/*.tsx

references:
  related_concerns:
    - design-system
    - studio-wiring
    - onboarding-ux
    - localization

detectors:
  - id: empty-and-error-states
    kind: model-review
    severity: medium
    guidance_ref: ../../prompts/empty-error-states-lens.md
    output_schema:
      rule_id: empty-and-error-states
      severity: medium | low
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: add explicit empty state with guidance (what to do next)
        B: add explicit error state with recovery action
        C: confirm both are handled by a parent boundary (cite it)
    message: |
      List / collection / data-driven views should handle empty, loading,
      and error states explicitly. A blank screen with no guidance is the
      most common UX failure mode in internal tools.
    fix_hint: |
      Use the shared EmptyState / ErrorBoundary / LoadingShimmer components.
      Empty state should include a clear call to action (create first X).

  - id: irreversible-action-confirmation
    kind: model-review
    severity: high
    guidance_ref: ../../prompts/destructive-action-lens.md
    output_schema:
      rule_id: irreversible-action-confirmation
      severity: high | medium
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: add confirmation dialog with the affected resource name
        B: add undo within N seconds
        C: confirm action is reversible (cite the undo path)
    message: |
      Destructive, irreversible actions (delete, force-rotate, force-sign-out,
      bulk-update) need confirmation dialogs showing what will happen and
      asking the user to type or click a confirmation. No one-click destruction.
    fix_hint: |
      Use the shared ConfirmDestructiveDialog. For bulk actions, show the
      count and a representative sample of affected items.

stage_hooks:
  - stage: ux-design-audit
    as_review_lens: true
