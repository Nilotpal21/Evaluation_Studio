id: audit-log
title: Audit Log Coverage
enforcement: blocking
severity_default: high
rubric_concern: 10

scope:
  globs:
    - apps/**/src/**/*.ts
    - packages/**/src/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  docs:
    - CLAUDE.md#core-invariants
  related_concerns:
    - security
    - encryption
    - retention

detectors:
  - id: privileged-mutation-emits-audit
    kind: model-review
    severity: high
    guidance_ref: ../../prompts/audit-log-lens.md
    output_schema:
      rule_id: privileged-mutation-emits-audit
      severity: high | medium
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: add audit event emission at the mutation point
        B: confirm operation is non-privileged (and classify why)
    message: |
      Privileged operations (permission changes, credential rotation,
      cross-project grants, user role changes, deletion of customer data)
      must emit an audit event via the shared audit logger. Missing audit
      events break compliance and incident reconstruction.
    fix_hint: |
      Call auditLog.emit({ actor, action, target, outcome }) at the site
      of the mutation. Include tenantId, actorId, targetType, targetId.

  - id: no-console-log-as-audit-substitute
    kind: grep
    severity: medium
    pattern: 'console\.(log|info)\([^)]*audit'
    message: |
      console.log is not an audit log. Use the shared audit logger so events
      reach the audit sink.
    fix_hint: |
      Replace with auditLog.emit(...). Server code should not use console.*
      at all — use createLogger('module') from @abl/compiler/platform.

stage_hooks:
  - stage: implementation
    inject_checklist: true
  - stage: security-audit
    as_review_lens: true
