id: cross-pod
title: Cross-Pod Distributed Architecture
enforcement: blocking
severity_default: critical
rubric_concern: 11

scope:
  globs:
    - apps/runtime/src/**/*.ts
    - apps/search-ai/src/**/*.ts
    - packages/helix/src/**/*.ts
    - packages/**/src/workers/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  docs:
    - CLAUDE.md#core-invariants
  related_concerns:
    - session-context
    - scale
    - retention

detectors:
  - id: no-pod-local-truth
    kind: model-review
    severity: critical
    guidance_ref: ../../prompts/pod-local-state-lens.md
    output_schema:
      rule_id: no-pod-local-truth
      severity: critical | high
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: move source-of-truth to Redis / MongoDB
        B: confirm this is request-scoped cache only (and note lifetime)
    message: |
      Pod-local state must never be the source of truth. Sessions, locks,
      dedupe sets, counters, rate limits, and in-flight tracking must live
      in Redis or MongoDB. A second pod picking up the same work must see
      the same state.
    fix_hint: |
      Use Redis for ephemeral coordination (distributed locks, dedupe, pub/sub).
      Use MongoDB for durable state. Request-scoped caches are acceptable
      only within a single request lifecycle.

  - id: distributed-lock-pattern
    kind: grep
    severity: high
    pattern: 'redis\.set\([^)]*,\s*[^)]*\)(?![^;]*\bNX\b)'
    multiline: true
    message: |
      Distributed locks must use Redis SET NX PX, not bare SET. Without NX,
      two pods can both think they hold the lock.
    fix_hint: |
      Use redis.set(key, token, 'NX', 'PX', ttlMs) and verify the token on
      release (Lua script) to prevent releasing someone else's lock.

  - id: no-process-scoped-scheduler
    kind: grep
    severity: high
    pattern: 'setInterval\s*\(.*\)'
    message: |
      setInterval inside an app pod creates a per-pod ticker that multiplies
      with replica count. Use BullMQ repeatable jobs or an external scheduler
      instead.
    fix_hint: |
      Move the periodic work to a BullMQ repeatable job with a jobId so
      only one replica holds it. See bullmq-flows-guide skill.

stage_hooks:
  - stage: implementation
    inject_checklist: true
  - stage: security-audit
    as_review_lens: true
  - stage: oracle-analysis
    as_review_lens: true
