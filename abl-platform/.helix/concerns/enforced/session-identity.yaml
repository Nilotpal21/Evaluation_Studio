id: session-identity
title: Session Identity
enforcement: blocking
severity_default: high
rubric_concern: 1

scope:
  globs:
    - apps/runtime/src/**/*.ts
    - apps/search-ai/src/**/*.ts
    - packages/helix/src/**/*.ts
    - packages/**/src/session/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  docs:
    - CLAUDE.md#model-resolution-contract
  related_concerns:
    - session-context
    - message-metadata
    - agent-transfer

detectors:
  - id: no-raw-thread-id-mixing
    kind: grep
    severity: high
    # Session identity should flow through a single canonical sessionId.
    # Mixing threadId, conversationId, sessionId inconsistently leads to
    # orphaned state and cache poisoning.
    pattern: '(threadId|conversationId|chatId)\s*(\?\?|\|\|)\s*sessionId'
    message: |
      Session identity must flow through a single canonical sessionId. Do not
      synthesize sessionId from threadId/conversationId/chatId at call sites —
      normalize at the transport boundary.
    fix_hint: |
      Push the normalization up to the adapter that first receives the request
      (WebSocket handler, HTTP route, queue consumer). Every downstream call
      receives sessionId directly.

  - id: session-lookup-needs-tenant
    kind: ast
    severity: critical
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj
          property: (property_identifier) @prop (#match? @prop "^(findSession|getSession|loadSession)$"))
        arguments: (arguments (identifier) @arg))
    assertion: must-also-pass-tenantId-or-be-tenant-scoped-repo
    message: |
      Session lookups must be tenant-scoped. A bare findSession(id) leaks
      sessions across tenants.
    fix_hint: |
      Use a tenant-scoped repo (SessionRepo constructed with tenantId) or
      pass tenantId as a second argument.

stage_hooks:
  - stage: implementation
    inject_checklist: true
  - stage: oracle-analysis
    as_review_lens: true
