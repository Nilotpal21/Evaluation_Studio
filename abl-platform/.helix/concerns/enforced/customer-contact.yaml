id: customer-contact
title: Customer / Contact Identity
enforcement: blocking
severity_default: high
rubric_concern: 3

scope:
  globs:
    - apps/runtime/src/**/*.ts
    - apps/search-ai/src/**/*.ts
    - packages/**/src/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  docs:
    - CLAUDE.md#core-invariants
  related_concerns:
    - session-identity
    - session-context
    - audit-log

detectors:
  - id: contact-id-must-propagate
    kind: model-review
    severity: high
    guidance_ref: ../../prompts/contact-propagation-lens.md
    output_schema:
      rule_id: contact-id-must-propagate
      severity: high | medium
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: add contactId to the ExecutionContext / session record / audit event
        B: confirm this path is pre-identity (and document why)
    message: |
      When a customer / contact is identified (by phone, email, auth token, or
      CRM lookup), that identity must propagate through the session record,
      ExecutionContext, and every audit event emitted downstream. Dropping
      contactId mid-flow makes downstream analytics and retention-by-contact
      impossible.
    fix_hint: |
      Thread contactId through the session creation call. Avoid inferring it
      later from conversation content — resolve it once at the boundary.

  - id: no-raw-phone-or-email-as-identifier
    kind: grep
    severity: high
    pattern: '(primaryKey|_id)\s*:\s*(phone|email|phoneNumber|emailAddress)'
    message: |
      Phone numbers and email addresses are attributes of a contact, not
      identifiers. Use a stable contactId; phone/email can change or be shared.
    fix_hint: |
      Resolve phone/email to a contactId at the entry point. Store
      phone/email as attributes of the contact record, not as the key.

stage_hooks:
  - stage: implementation
    inject_checklist: true
