id: tenant-isolation
title: Tenant Isolation
enforcement: blocking
severity_default: critical
rubric_concern: 1

scope:
  globs:
    - apps/**/src/**/*.ts
    - packages/**/src/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'
    - '**/*.spec.ts'
    - '**/*.d.ts'

references:
  docs:
    - CLAUDE.md#core-invariants
  tests:
    - apps/runtime/src/__tests__/*-authz.test.ts
  related_concerns:
    - project-isolation
    - user-session
    - security

detectors:
  - id: no-findById
    kind: grep
    severity: critical
    pattern: '\.findById\s*\('
    message: |
      findById skips tenant scope. Cross-tenant access must return 404 (not 403)
      to avoid leaking resource existence, which requires tenantId in the query.
    fix_hint: |
      Replace findById(id) with findOne({ _id: id, tenantId }). Bring tenantId
      in from req.user.tenantId or the ambient tenant context.

  - id: no-findByIdAndUpdate
    kind: grep
    severity: critical
    pattern: '\.findByIdAndUpdate\s*\('
    message: |
      findByIdAndUpdate skips tenant scope and allows cross-tenant writes.
    fix_hint: |
      Use findOneAndUpdate({ _id, tenantId }, update) instead.

  - id: no-findByIdAndDelete
    kind: grep
    severity: critical
    pattern: '\.findByIdAndDelete\s*\('
    message: |
      findByIdAndDelete skips tenant scope and allows cross-tenant deletes.
    fix_hint: |
      Use findOneAndDelete({ _id, tenantId }) instead.

  - id: no-findOneAndX-without-tenantId
    kind: ast
    severity: high
    # Tree-sitter query placeholder. To be refined: match
    # findOne/findOneAndUpdate/findOneAndDelete where the first argument
    # object literal does not contain a `tenantId` property.
    query: |
      (call_expression
        function: (member_expression property: (property_identifier) @method)
        arguments: (arguments (object) @filter))
    assertion: filter-must-contain-tenantId
    message: |
      findOne / findOneAndUpdate / findOneAndDelete calls on tenant-owned
      collections must include tenantId in the filter object.
    fix_hint: |
      Add tenantId to the filter. If the model is truly not tenant-scoped,
      add it to the concerns exclude list with a justification comment.

stage_hooks:
  - stage: implementation
    inject_checklist: true
  - stage: security-audit
    as_review_lens: true
  - stage: oracle-analysis
    as_review_lens: true

acceptance:
  - when: 'new ID-based route handler'
    requires: 'matching authz test that covers cross-tenant 404 case'
