id: user-session
title: User Session Ownership
enforcement: blocking
severity_default: high
rubric_concern: 1

scope:
  globs:
    - apps/**/src/**/*.ts
    - packages/**/src/**/*.ts
  exclude:
    - '**/__tests__/**'
    - '**/*.test.ts'

references:
  docs:
    - CLAUDE.md#core-invariants
  related_concerns:
    - tenant-isolation
    - session-identity

detectors:
  - id: user-owned-resource-must-filter-by-creator
    kind: model-review
    severity: high
    # Model-review detector — must emit structured findings only.
    guidance_ref: ../../prompts/user-isolation-lens.md
    output_schema:
      rule_id: user-owned-resource-must-filter-by-creator
      severity: high | critical
      location:
        file: string
        line: number
      claim: string
      reality: string
      options:
        A: update code to filter by createdBy/userId
        B: confirm resource is not user-owned (and document why)
    message: |
      User-owned resources (sessions, API keys, tokens, personal drafts) must
      filter by createdBy or userId. A user must not be able to read or mutate
      another user's resources even within the same tenant and project.
    fix_hint: |
      Add createdBy: req.user.id (or userId: req.user.id) to the query filter.
      For API keys and OAuth tokens, this is a security requirement, not a convention.

  - id: no-api-key-owner-fallback
    kind: grep
    severity: critical
    pattern: '(createdBy|ownerUserId|owner_user_id)\s*\?\?\s*(tenant|project)'
    message: |
      Machine principals (API keys, platform keys) must be authorized by
      explicit scopes and project scope only — never by creator membership
      or owner fallback.
    fix_hint: |
      Remove the fallback. Use scope-based authorization for machine principals.

stage_hooks:
  - stage: implementation
    inject_checklist: true
  - stage: security-audit
    as_review_lens: true
