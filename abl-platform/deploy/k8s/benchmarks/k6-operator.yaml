# ============================================================================
# k6 Operator Installation Manifest
# ============================================================================
# Installs the Grafana k6 Operator (v0.0.14) for running distributed
# load tests via TestRun CRDs on Kubernetes.
#
# Usage:
#   kubectl apply -f k6-operator.yaml
#
# Prerequisites:
#   - Kubernetes 1.28+
#   - Prometheus endpoint for remote write output
# ============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: k6-operator-system
  labels:
    app.kubernetes.io/name: k6-operator
    app.kubernetes.io/part-of: abl-platform-benchmarks
    app.kubernetes.io/managed-by: kubectl
---
# CRD: TestRun (replaces the deprecated K6 CRD)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: testruns.k6.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: k6.io
  names:
    kind: TestRun
    listKind: TestRunList
    plural: testruns
    singular: testrun
    shortNames:
      - tr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parallelism:
                  type: integer
                  minimum: 1
                  description: Number of k6 runner pods to distribute VUs across
                script:
                  type: object
                  properties:
                    configMap:
                      type: object
                      properties:
                        name:
                          type: string
                        file:
                          type: string
                    localFile:
                      type: string
                separate:
                  type: boolean
                  description: Run initializer and runner as separate jobs
                runner:
                  type: object
                  description: Pod template overrides for runner pods
                  x-kubernetes-preserve-unknown-fields: true
                starter:
                  type: object
                  description: Pod template overrides for starter pod
                  x-kubernetes-preserve-unknown-fields: true
                arguments:
                  type: string
                  description: Additional CLI arguments passed to k6 run
                cleanup:
                  type: string
                  enum: ['post', '']
                  description: Cleanup policy for runner pods after test completion
            status:
              type: object
              properties:
                stage:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Stage
          type: string
          jsonPath: .status.stage
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
        - name: Parallelism
          type: integer
          jsonPath: .spec.parallelism
---
# CRD: PrivateLoadZone (for distributed multi-zone testing)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: privateloadzones.k6.io
spec:
  group: k6.io
  names:
    kind: PrivateLoadZone
    listKind: PrivateLoadZoneList
    plural: privateloadzones
    singular: privateloadzone
    shortNames:
      - plz
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k6-operator-controller-manager
  namespace: k6-operator-system
  labels:
    app.kubernetes.io/name: k6-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k6-operator-manager-role
  labels:
    app.kubernetes.io/name: k6-operator
rules:
  # TestRun and PrivateLoadZone CRDs
  - apiGroups: ['k6.io']
    resources:
      [
        'testruns',
        'testruns/status',
        'testruns/finalizers',
        'privateloadzones',
        'privateloadzones/status',
      ]
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  # Jobs for running k6 pods
  - apiGroups: ['batch']
    resources: ['jobs']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  # Pods for monitoring runner status
  - apiGroups: ['']
    resources: ['pods', 'pods/log']
    verbs: ['get', 'list', 'watch']
  # ConfigMaps for test scripts
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'list', 'watch']
  # Services for runner coordination
  - apiGroups: ['']
    resources: ['services']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  # Events for status reporting
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch']
  # Secrets for k6 Cloud token or custom env vars
  - apiGroups: ['']
    resources: ['secrets']
    verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k6-operator-manager-rolebinding
  labels:
    app.kubernetes.io/name: k6-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k6-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: k6-operator-controller-manager
    namespace: k6-operator-system
---
# Leader election role (for HA operator deployment)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k6-operator-leader-election-role
  namespace: k6-operator-system
rules:
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['coordination.k8s.io']
    resources: ['leases']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['']
    resources: ['events']
    verbs: ['create', 'patch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k6-operator-leader-election-rolebinding
  namespace: k6-operator-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k6-operator-leader-election-role
subjects:
  - kind: ServiceAccount
    name: k6-operator-controller-manager
    namespace: k6-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k6-operator-controller-manager
  namespace: k6-operator-system
  labels:
    app.kubernetes.io/name: k6-operator
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/version: '0.0.14'
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k6-operator
      app.kubernetes.io/component: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k6-operator
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/version: '0.0.14'
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
    spec:
      serviceAccountName: k6-operator-controller-manager
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/grafana/k6-operator:v0.0.14
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      nodeSelector:
        kubernetes.io/os: linux
