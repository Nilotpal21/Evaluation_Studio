---
apiVersion: v1
kind: Namespace
metadata:
  name: embeddings
  labels:
    name: embeddings
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bge-m3-config
  namespace: embeddings
data:
  MODEL_ID: 'BAAI/bge-m3'
  MAX_BATCH_TOKENS: '16384'
  MAX_CONCURRENT_REQUESTS: '64'
  TOKENIZERS_PARALLELISM: 'true'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bge-m3-api
  namespace: embeddings
  labels:
    app: bge-m3-api
    version: v1.2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bge-m3-api
  template:
    metadata:
      labels:
        app: bge-m3-api
        version: v1.2
    spec:
      containers:
        - name: bge-m3
          image: ghcr.io/huggingface/text-embeddings-inference:1.2
          args:
            - --model-id
            - BAAI/bge-m3
            - --port
            - '8001'
            - --max-batch-tokens
            - '16384'
            - --max-concurrent-requests
            - '64'
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: bge-m3-config
                  key: MODEL_ID
            - name: MAX_BATCH_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: bge-m3-config
                  key: MAX_BATCH_TOKENS
            - name: MAX_CONCURRENT_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: bge-m3-config
                  key: MAX_CONCURRENT_REQUESTS
            - name: TOKENIZERS_PARALLELISM
              valueFrom:
                configMapKeyRef:
                  name: bge-m3-config
                  key: TOKENIZERS_PARALLELISM

          # GPU Configuration (uncomment if using GPU nodes)
          # resources:
          #   limits:
          #     nvidia.com/gpu: 1
          #     memory: 8Gi
          #   requests:
          #     nvidia.com/gpu: 1
          #     memory: 4Gi

          # CPU-only configuration
          resources:
            limits:
              cpu: '4'
              memory: 8Gi
            requests:
              cpu: '2'
              memory: 4Gi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi

      # Node affinity for GPU nodes (uncomment if using GPU)
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #       - matchExpressions:
      #         - key: accelerator
      #           operator: In
      #           values:
      #           - nvidia-tesla-t4
      #           - nvidia-tesla-v100
---
apiVersion: v1
kind: Service
metadata:
  name: bge-m3-api
  namespace: embeddings
  labels:
    app: bge-m3-api
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: bge-m3-api


# PVC removed — model is baked into the container image.
# No ReadWriteOnce conflicts. Scales to any replica count.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bge-m3-api-hpa
  namespace: embeddings
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bge-m3-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
