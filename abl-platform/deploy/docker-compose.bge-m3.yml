version: '3.8'

# BGE-M3 Embedding Service
# In-house multilingual embedding model (1024 dimensions, 512 token context)
#
# Usage:
#   docker-compose -f docker-compose.bge-m3.yml up -d
#
# Endpoints:
#   Health: http://localhost:8001/health
#   Embeddings: POST http://localhost:8001/v1/embeddings

services:
  bge-m3-api:
    image: ghcr.io/huggingface/text-embeddings-inference:1.2
    container_name: bge-m3-api
    command: >
      --model-id BAAI/bge-m3
      --port 8001
      --max-batch-tokens 16384
      --max-concurrent-requests 64
    ports:
      - '8001:8001'
    environment:
      # GPU Configuration (uncomment if using GPU)
      # - CUDA_VISIBLE_DEVICES=0

      # Model Configuration
      - MODEL_ID=BAAI/bge-m3
      - MAX_BATCH_TOKENS=16384
      - MAX_CONCURRENT_REQUESTS=64

      # Performance Tuning
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - TOKENIZERS_PARALLELISM=true

    # GPU support (uncomment if using GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # CPU-only configuration
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    volumes:
      # Cache model weights to avoid re-downloading
      - bge-m3-models:/data

    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped

    labels:
      - 'com.agent-platform.service=bge-m3-embedding'
      - 'com.agent-platform.version=1.2'

volumes:
  bge-m3-models:
    driver: local

networks:
  default:
    name: agent-platform-network
    external: true
