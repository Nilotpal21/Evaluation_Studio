# ============================================================================
# ABL Platform - Tier L (Enterprise) Helm Values
# ============================================================================
# Profile: 100-1000 agents, 50K-500K conversations/day, 500K-5M documents
# Cluster: 10-15 general + 3-5 compute + 8-12 data + 0-8 GPU nodes
# Monthly storage growth: ~500 GB - 2 TB
# ============================================================================

global:
  tier: 'L'
  clusterName: 'abl-platform-enterprise'
  storageClass: 'gp3'
  cloudProvider: 'aws'
  imageRegistry: 'ghcr.io/koreai'
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-credentials
  domain: 'abl.example.com'
  tls:
    enabled: true
    issuer: 'letsencrypt-prod'
  monitoring:
    enabled: true
    prometheusEndpoint: 'http://prometheus.monitoring.svc:9090'
  podSecurityStandard: 'restricted'
  # Enterprise: encryption at rest
  encryption:
    enabled: true
    kmsProvider: 'aws-kms'
    kmsKeyId: 'arn:aws:kms:us-east-1:123456789:key/example-key-id'

# ============================================================================
# Tier 1 - Compute-Intensive Services
# ============================================================================

runtime:
  enabled: true
  replicaCount: 6
  image:
    repository: 'ghcr.io/koreai/abl-runtime'
    tag: 'latest'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  ports:
    http: 3112
    ws: 3112
  env:
    NODE_ENV: 'production'
    LOG_LEVEL: 'info'
    # Sharded MongoDB connection via mongos
    MONGODB_URI: 'mongodb://mongos-0.mongos.abl-data.svc:27017,mongos-1.mongos.abl-data.svc:27017/abl?w=majority&readPreference=secondaryPreferred'
    REDIS_URL: 'redis://redis-cluster.abl-data.svc:6379'
    CLICKHOUSE_URL: 'http://clickhouse.abl-data.svc:8123'
    MESSAGE_PERSISTENCE_MAX_BATCH_SIZE: '25'
    MESSAGE_PERSISTENCE_WORKER_CONCURRENCY: '2'
    # Connection pool tuning for high concurrency
    MONGODB_MAX_POOL_SIZE: '50'
    REDIS_MAX_RETRIES: '3'
  autoscaling:
    enabled: true
    minReplicas: 6
    maxReplicas: 20
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 65
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 75
      # Custom metric: WebSocket connection count
      - type: Pods
        pods:
          metric:
            name: websocket_connections
          target:
            type: AverageValue
            averageValue: '500'
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 20
            periodSeconds: 120
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 4
            periodSeconds: 30
        selectPolicy: Max
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
  podDisruptionBudget:
    minAvailable: 4
  nodeSelector:
    node-pool: general
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: runtime

bgeM3:
  enabled: true
  replicaCount: 6
  image:
    repository: 'ghcr.io/huggingface/text-embeddings-inference'
    tag: '1.2'
  args:
    - '--model-id'
    - 'BAAI/bge-m3'
    - '--port'
    - '8001'
    - '--max-batch-tokens'
    - '32768'
    - '--max-concurrent-requests'
    - '256'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  ports:
    http: 8001
  persistence:
    enabled: true
    storageClass: 'gp3'
    size: 20Gi
    mountPath: /data
  autoscaling:
    enabled: true
    minReplicas: 6
    maxReplicas: 20
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 65
  # KEDA ScaledObject for queue-based scaling
  keda:
    enabled: true
    triggers:
      - type: prometheus
        metadata:
          serverAddress: 'http://prometheus.monitoring.svc:9090'
          metricName: 'bullmq_embedding_queue_depth'
          query: 'sum(bullmq_queue_waiting{queue="embedding-ingest"})'
          threshold: '100'
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 120
      periodSeconds: 30
    readiness:
      path: /health
      initialDelaySeconds: 60
      periodSeconds: 10
  podDisruptionBudget:
    minAvailable: 4
  nodeSelector:
    node-pool: compute
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: bge-m3

docling:
  enabled: true
  replicaCount: 4
  image:
    repository: 'ghcr.io/koreai/abl-docling'
    tag: 'latest'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  ports:
    http: 8080
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
  podDisruptionBudget:
    minAvailable: 2
  nodeSelector:
    node-pool: compute

