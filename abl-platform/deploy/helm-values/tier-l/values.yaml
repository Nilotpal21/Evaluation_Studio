# ============================================================================
# Tier 2 - Stateful Data Stores
# ============================================================================

# MongoDB: 2-3 shards x 3-node RS + 3 config servers + 2 mongos
mongodb:
  enabled: true
  operator:
    enabled: true
    version: '1.22.0'
  topology: 'sharded'
  sharding:
    enabled: true
    shards: 3
    configServers:
      replicas: 3
      resources:
        requests:
          cpu: '2'
          memory: 4Gi
        limits:
          cpu: '4'
          memory: 8Gi
      storage:
        size: 50Gi
        storageClass: 'gp3'
    mongos:
      replicas: 2
      resources:
        requests:
          cpu: '2'
          memory: 4Gi
        limits:
          cpu: '4'
          memory: 8Gi
    shardKey:
      messages: '{ tenantId: "hashed" }'
      conversations: '{ tenantId: 1, createdAt: -1 }'
      auditLogs: '{ tenantId: "hashed" }'
  # Per-shard replica set config
  replicas: 3
  resources:
    requests:
      cpu: '8'
      memory: 32Gi
    limits:
      cpu: '16'
      memory: 64Gi
  storage:
    dataDir:
      size: 2Ti
      storageClass: 'gp3'
    logsDir:
      size: 50Gi
      storageClass: 'gp3'
  configuration: |
    operationProfiling:
      mode: slowOp
      slowOpThresholdMs: 50
    replication:
      oplogSizeMB: 16384
    storage:
      wiredTiger:
        engineConfig:
          cacheSizeGB: 16
    net:
      maxIncomingConnections: 10000
  backup:
    enabled: true
    pbm:
      version: '2.7'
      type: 'physical'
    schedule:
      - name: continuous-pitr
        type: oplog
        storageName: s3-backup
      - name: hourly-physical
        schedule: '0 * * * *'
        keep: 48
        storageName: s3-backup
    storages:
      s3-backup:
        type: s3
        s3:
          bucket: 'abl-backup-tier-l'
          region: 'us-east-1'
          prefix: 'mongodb/'
  # Cross-region replication for DR
  crossRegionReplication:
    enabled: false
    # Enable for DR:
    # enabled: true
    # targetRegion: "us-west-2"
  monitoring:
    enabled: true
    exporter:
      enabled: true
  indexes:
    ttl:
      messages: '90d'
      traceEvents: '90d'
      sessions: '24h'
    compound:
      - collection: messages
        keys: '{ tenantId: 1, projectId: 1, createdAt: -1 }'
      - collection: conversations
        keys: '{ tenantId: 1, projectId: 1, createdAt: -1 }'
      - collection: auditLogs
        keys: '{ tenantId: 1, createdAt: -1 }'
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# ClickHouse: 3 shards x 2 replicas + 3 Keeper
clickhouse:
  enabled: true
  operator:
    enabled: true
    version: '0.26.0'
  shards: 3
  replicas: 2
  keeper:
    replicas: 3
    resources:
      requests:
        cpu: '1'
        memory: 1Gi
      limits:
        cpu: '2'
        memory: 2Gi
    storage:
      size: 20Gi
      storageClass: 'gp3'
  resources:
    requests:
      cpu: '8'
      memory: 16Gi
    limits:
      cpu: '16'
      memory: 32Gi
  storage:
    dataDir:
      size: 1Ti
      storageClass: 'gp3'
  settings:
    max_memory_usage: 12884901888 # 12 GB
    background_pool_size: 8
    parts_to_delay_insert: 150
    parts_to_throw_insert: 300
    insert_quorum: 2
    # Shard routing
    distributed_ddl_task_timeout: 300
  ttl:
    traces: '90 DAY'
    metrics: '365 DAY'
    usage: '730 DAY'
  tieredStorage:
    enabled: true
    hotVolume:
      storageClass: 'gp3'
    warmVolume:
      storageClass: 'st1'
      ttlToWarm: '7 DAY'
    coldVolume:
      type: 's3'
      bucket: 'abl-clickhouse-cold-tier-l'
      ttlToCold: '30 DAY'
  shardingConfig:
    # Shard by tenant for data locality
    shardingKey: 'cityHash64(tenant_id)'
  monitoring:
    enabled: true
    prometheusPort: 9363
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# OpenSearch: 5+ hot + 3 warm + 3 masters
opensearch:
  enabled: true
  version: '3.3'
  masterNodes:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: '2'
        memory: 4Gi
      limits:
        cpu: '4'
        memory: 8Gi
    storage:
      size: 20Gi
      storageClass: 'gp3'
    jvmHeap: '2g'
  dataNodes:
    replicas: 6
    resources:
      requests:
        cpu: '8'
        memory: 32Gi
      limits:
        cpu: '16'
        memory: 64Gi
    storage:
      size: 2Ti
      storageClass: 'gp3'
    jvmHeap: '16g'
  warmNodes:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 32Gi
    storage:
      size: 4Ti
      storageClass: 'st1'
    jvmHeap: '8g'
  config:
    index:
      # Chunks: 6 shards, Vectors: 3 shards
      chunksShards: 6
      vectorsShards: 3
      numberOfReplicas: 2
    knn:
      enabled: true
      algoParam:
        efSearch: 200
        efConstruction: 256
        m: 16
    segmentReplication:
      enabled: true
    routing:
      # Route by tenantId for data locality
      allocation:
        awareness:
          attributes: 'zone'
  ism:
    enabled: true
    policies:
      - name: enterprise-lifecycle
        states:
          - name: hot
            actions:
              - rollover:
                  minSize: '50gb'
                  minIndexAge: '7d'
            transitions:
              - stateName: warm
                conditions:
                  minIndexAge: '7d'
          - name: warm
            actions:
              - replicaCount:
                  numberOfReplicas: 1
              - forceMerge:
                  maxNumSegments: 1
            transitions:
              - stateName: cold
                conditions:
                  minIndexAge: '30d'
          - name: cold
            actions:
              - snapshot:
                  repository: 's3-backup'
            transitions:
              - stateName: delete
                conditions:
                  minIndexAge: '90d'
          - name: delete
            actions:
              - delete: {}
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# Redis: 12-node Cluster (6 primary + 6 replica), separate cache/queue clusters
redis:
  enabled: true
  operator:
    enabled: true
  architecture: 'cluster'
  # Primary cluster: queues + locks (noeviction)
  cluster:
    masterNodes: 6
    replicasPerMaster: 1
  master:
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 32Gi
  replica:
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 32Gi
  config:
    maxmemory: '12gb'
    maxmemory-policy: 'noeviction'
    activedefrag: 'yes'
    active-defrag-threshold-lower: '10'
    active-defrag-cycle-max: '25'
    appendonly: 'yes'
    appendfsync: 'everysec'
    cluster-enabled: 'yes'
    cluster-require-full-coverage: 'no'
    cluster-allow-reads-when-down: 'yes'
  # Separate cache cluster (optional, evictable)
  cacheCluster:
    enabled: true
    masterNodes: 3
    replicasPerMaster: 1
    config:
      maxmemory: '8gb'
      maxmemory-policy: 'allkeys-lfu'
      appendonly: 'no'
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# Neo4j: 3 core + 2-3 read replicas
neo4j:
  enabled: true
  core:
    numberOfServers: 3
  readReplicas:
    numberOfServers: 3
  resources:
    requests:
      cpu: '4'
      memory: 16Gi
    limits:
      cpu: '8'
      memory: 32Gi
  readReplicaResources:
    requests:
      cpu: '2'
      memory: 8Gi
    limits:
      cpu: '4'
      memory: 16Gi
  config:
    dbms.memory.heap.initial_size: '8g'
    dbms.memory.heap.max_size: '8g'
    dbms.memory.pagecache.size: '6g'
    causal_clustering.minimum_core_cluster_size_at_formation: '3'
    causal_clustering.minimum_core_cluster_size_at_runtime: '2'
    # Route reads to replicas
    causal_clustering.server.routing_enabled: 'true'
    dbms.routing.default_router: 'SERVER'
  storage:
    data:
      size: 500Gi
      storageClass: 'gp3'
  backup:
    enabled: true
    schedule: '0 */2 * * *' # Every 2 hours
    destination: 's3://abl-backup-tier-l/neo4j/'
  nodeSelector:
    node-pool: data

# Qdrant: 3-5 node Distributed Cluster
qdrant:
  enabled: true
  replicas: 5
  resources:
    requests:
      cpu: '4'
      memory: 16Gi
    limits:
      cpu: '8'
      memory: 32Gi
  storage:
    size: 1Ti
    storageClass: 'gp3'
  config:
    collection:
      vectorSize: 1024
      distance: 'Cosine'
      replicationFactor: 2
      writeConsistency: 'majority'
      # Shard per ~1M vectors
      shardNumber: 5
    optimizers:
      indexingThreshold: 20000
      memmapThreshold: 50000
    quantization:
      scalar:
        type: 'int8'
        alwaysRam: true
    # Custom shard key for tenant isolation
    shardKey: 'tenantId'
  snapshot:
    enabled: true
    schedule: '0 */4 * * *' # Every 4 hours
  nodeSelector:
    node-pool: data

# Restate: 5-node Raft cluster
restate:
  enabled: true
  replicas: 5
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  storage:
    journal:
      size: 500Gi
      storageClass: 'io2'
      iops: 5000
  config:
    partitions: 16
    metadataStoreType: 'replicated'
    snapshotInterval: 5000
    trimDelayInterval: '10m'
    compactionInterval: '1h'
  podDisruptionBudget:
    minAvailable: 3
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# ============================================================================
# Node Pools (Karpenter NodePool definitions)
# ============================================================================

nodePools:
  general:
    instanceTypes:
      aws: ['m5.2xlarge', 'm5.4xlarge']
      azure: ['Standard_D16s_v3', 'Standard_D32s_v3']
      gcp: ['e2-standard-16', 'e2-standard-32']
    minNodes: 10
    maxNodes: 15
    labels:
      node-pool: general
    taints: []

  compute:
    instanceTypes:
      aws: ['c5.4xlarge', 'c5.9xlarge']
      azure: ['Standard_F16s_v2', 'Standard_F32s_v2']
      gcp: ['c2-standard-30', 'c2-standard-60']
    minNodes: 3
    maxNodes: 5
    labels:
      node-pool: compute
    taints: []

  data:
    instanceTypes:
      aws: ['r5.4xlarge', 'r5.8xlarge']
      azure: ['Standard_E16s_v3', 'Standard_E32s_v3']
      gcp: ['n2-highmem-16', 'n2-highmem-32']
    minNodes: 8
    maxNodes: 12
    labels:
      node-pool: data
    taints: []

  gpu:
    enabled: false
    instanceTypes:
      aws: ['p4d.24xlarge']
      azure: ['Standard_NC24ads_A100_v4']
      gcp: ['a2-megagpu-16g']
    minNodes: 0
    maxNodes: 8
    labels:
      node-pool: gpu
      accelerator: nvidia-a100
    taints:
      - key: 'nvidia.com/gpu'
        value: 'true'
        effect: 'NoSchedule'

# ============================================================================
# Ingress / Gateway API
# ============================================================================

gateway:
  enabled: true
  className: 'cilium'
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: abl-tls
  routes:
    - name: studio
      hostnames: ['studio.abl.example.com']
      backendRef:
        name: studio
        port: 5173
    - name: runtime
      hostnames: ['api.abl.example.com']
      backendRef:
        name: runtime
        port: 3112
    - name: admin
      hostnames: ['admin.abl.example.com']
      backendRef:
        name: admin
        port: 3003
    - name: search-ai
      hostnames: ['search.abl.example.com']
      backendRef:
        name: search-ai-runtime
        port: 3114

# ============================================================================
# Network Policies (Cilium)
# ============================================================================

networkPolicies:
  enabled: true
  # Default deny all ingress
  defaultDeny: true
  # Allow specific service-to-service communication
  policies:
    - name: runtime-to-datastores
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: runtime
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mongodb
          ports: [27017]
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
          ports: [6379]
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clickhouse
          ports: [8123, 9000]
    - name: searchai-to-datastores
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: search-ai
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch
          ports: [9200]
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: qdrant
          ports: [6333, 6334]
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: neo4j
          ports: [7474, 7687]
