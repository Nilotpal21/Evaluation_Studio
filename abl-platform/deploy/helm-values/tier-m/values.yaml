# ============================================================================
# Tier 2 - Stateful Data Stores
# ============================================================================

# MongoDB: 3-node Replica Set with optional sharding at >50 tenants
mongodb:
  enabled: true
  operator:
    enabled: true
    version: '1.22.0'
  replicas: 3
  topology: 'replicaset'
  sharding:
    enabled: false
    # Enable when tenant count exceeds 50:
    # enabled: true
    # shards: 2
    # configServers: 3
    # mongos: 2
    # shardKey: '{ tenantId: 1, _id: 1 }'
  # Hidden member for analytics reads
  hiddenMembers: 1
  resources:
    requests:
      cpu: '4'
      memory: 16Gi
    limits:
      cpu: '8'
      memory: 32Gi
  storage:
    dataDir:
      size: 500Gi
      storageClass: 'gp3'
    logsDir:
      size: 20Gi
      storageClass: 'gp3'
  configuration: |
    operationProfiling:
      mode: slowOp
      slowOpThresholdMs: 100
    replication:
      oplogSizeMB: 8192
    storage:
      wiredTiger:
        engineConfig:
          cacheSizeGB: 8
    net:
      maxIncomingConnections: 5000
  backup:
    enabled: true
    pbm:
      version: '2.7'
    schedule:
      - name: hourly-snapshot
        schedule: '0 * * * *'
        keep: 24
        storageName: s3-backup
      - name: continuous-oplog
        type: oplog
        storageName: s3-backup
    storages:
      s3-backup:
        type: s3
        s3:
          bucket: 'abl-backup-tier-m'
          region: 'us-east-1'
          prefix: 'mongodb/'
  monitoring:
    enabled: true
    exporter:
      enabled: true
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# ClickHouse: 2-node ReplicatedMergeTree + 3 Keeper
clickhouse:
  enabled: true
  operator:
    enabled: true
    version: '0.26.0'
  shards: 1
  replicas: 2
  keeper:
    replicas: 3
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: '1'
        memory: 1Gi
    storage:
      size: 10Gi
      storageClass: 'gp3'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  storage:
    dataDir:
      size: 200Gi
      storageClass: 'gp3'
  settings:
    max_memory_usage: 6442450944 # 6 GB
    background_pool_size: 4
    parts_to_delay_insert: 150
    parts_to_throw_insert: 300
    # Quorum writes for data durability
    insert_quorum: 2
  ttl:
    traces: '30 DAY'
    metrics: '90 DAY'
    usage: '365 DAY'
  tieredStorage:
    enabled: true
    hotVolume:
      storageClass: 'gp3'
    coldVolume:
      # S3 cold tier for aged data
      type: 's3'
      bucket: 'abl-clickhouse-cold-tier-m'
      ttlToCold: '30 DAY'
  monitoring:
    enabled: true
    prometheusPort: 9363
  nodeSelector:
    node-pool: data

# OpenSearch: 3 data nodes + 3 dedicated masters
opensearch:
  enabled: true
  version: '3.3'
  masterNodes:
    enabled: true
    replicas: 3
    resources:
      requests:
        cpu: '1'
        memory: 2Gi
      limits:
        cpu: '2'
        memory: 4Gi
    storage:
      size: 10Gi
      storageClass: 'gp3'
    jvmHeap: '1g'
  dataNodes:
    replicas: 3
    resources:
      requests:
        cpu: '4'
        memory: 16Gi
      limits:
        cpu: '8'
        memory: 32Gi
    storage:
      size: 500Gi
      storageClass: 'gp3'
    jvmHeap: '8g'
  warmNodes:
    enabled: true
    replicas: 2
    resources:
      requests:
        cpu: '2'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 16Gi
    storage:
      size: 1Ti
      storageClass: 'gp3'
    jvmHeap: '4g'
  config:
    index:
      numberOfShards: 3
      numberOfReplicas: 1
    knn:
      enabled: true
      algoParam:
        efSearch: 100
        efConstruction: 256
        m: 16
    segmentReplication:
      enabled: true
  ism:
    enabled: true
    policies:
      - name: default-lifecycle
        states:
          - name: hot
            actions:
              - rollover:
                  minSize: '50gb'
                  minIndexAge: '7d'
            transitions:
              - stateName: warm
                conditions:
                  minIndexAge: '7d'
          - name: warm
            actions:
              - replicaCount:
                  numberOfReplicas: 1
              - forceMerge:
                  maxNumSegments: 1
            transitions:
              - stateName: delete
                conditions:
                  minIndexAge: '90d'
          - name: delete
            actions:
              - delete: {}
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# Redis: 6-node Cluster (3 primary + 3 replica)
redis:
  enabled: true
  operator:
    enabled: true
  architecture: 'cluster'
  cluster:
    masterNodes: 3
    replicasPerMaster: 1
  master:
    resources:
      requests:
        cpu: '2'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 16Gi
  replica:
    resources:
      requests:
        cpu: '2'
        memory: 8Gi
      limits:
        cpu: '4'
        memory: 16Gi
  config:
    maxmemory: '6gb'
    maxmemory-policy: 'noeviction'
    activedefrag: 'yes'
    active-defrag-threshold-lower: '10'
    active-defrag-cycle-max: '25'
    appendonly: 'yes'
    appendfsync: 'everysec'
    save: '3600 1 300 10'
    # Cluster mode settings
    cluster-enabled: 'yes'
    cluster-require-full-coverage: 'no'
    cluster-allow-reads-when-down: 'yes'
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# Neo4j: 3-node Causal Cluster
neo4j:
  enabled: true
  replicas: 3
  core:
    numberOfServers: 3
  readReplicas:
    numberOfServers: 0
  resources:
    requests:
      cpu: '2'
      memory: 8Gi
    limits:
      cpu: '4'
      memory: 16Gi
  config:
    dbms.memory.heap.initial_size: '4g'
    dbms.memory.heap.max_size: '4g'
    dbms.memory.pagecache.size: '3g'
    # Causal cluster settings
    causal_clustering.minimum_core_cluster_size_at_formation: '3'
    causal_clustering.minimum_core_cluster_size_at_runtime: '2'
  storage:
    data:
      size: 100Gi
      storageClass: 'gp3'
  backup:
    enabled: true
    schedule: '0 3 * * *' # Daily
    destination: 's3://abl-backup-tier-m/neo4j/'
  nodeSelector:
    node-pool: data

# Qdrant: 3-node Distributed Cluster
qdrant:
  enabled: true
  replicas: 3
  resources:
    requests:
      cpu: '2'
      memory: 8Gi
    limits:
      cpu: '4'
      memory: 16Gi
  storage:
    size: 200Gi
    storageClass: 'gp3'
  config:
    collection:
      vectorSize: 1024
      distance: 'Cosine'
      replicationFactor: 2
    optimizers:
      indexingThreshold: 20000
      memmapThreshold: 50000
    quantization:
      scalar:
        type: 'int8'
        alwaysRam: true
  snapshot:
    enabled: true
    schedule: '0 */6 * * *' # Every 6 hours
  nodeSelector:
    node-pool: data

# Restate: 3-node Raft cluster
restate:
  enabled: true
  replicas: 3
  resources:
    requests:
      cpu: '2'
      memory: 4Gi
    limits:
      cpu: '4'
      memory: 8Gi
  storage:
    journal:
      size: 100Gi
      storageClass: 'io1'
      iops: 3000
  config:
    partitions: 4
    metadataStoreType: 'replicated'
    snapshotInterval: 10000
    trimDelayInterval: '10m'
  podDisruptionBudget:
    minAvailable: 2
  nodeSelector:
    node-pool: data
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

# ============================================================================
# Node Pools (Karpenter NodePool definitions)
# ============================================================================

nodePools:
  general:
    instanceTypes:
      aws: ['m5.xlarge', 'm5.2xlarge']
      azure: ['Standard_D8s_v3', 'Standard_D16s_v3']
      gcp: ['e2-standard-8', 'e2-standard-16']
    minNodes: 6
    maxNodes: 8
    labels:
      node-pool: general
    taints: []

  compute:
    instanceTypes:
      aws: ['c5.2xlarge', 'c5.4xlarge']
      azure: ['Standard_F8s_v2', 'Standard_F16s_v2']
      gcp: ['c2-standard-16', 'c2-standard-30']
    minNodes: 2
    maxNodes: 3
    labels:
      node-pool: compute
    taints: []

  data:
    instanceTypes:
      aws: ['r5.2xlarge', 'r5.4xlarge']
      azure: ['Standard_E8s_v3', 'Standard_E16s_v3']
      gcp: ['n2-highmem-8', 'n2-highmem-16']
    minNodes: 4
    maxNodes: 6
    labels:
      node-pool: data
    taints: []

  # GPU pool (optional, for self-hosted LLM)
  gpu:
    enabled: false
    instanceTypes:
      aws: ['g5.2xlarge', 'g5.4xlarge']
      azure: ['Standard_NC6s_v3']
      gcp: ['a2-highgpu-1g']
    minNodes: 0
    maxNodes: 4
    labels:
      node-pool: gpu
      accelerator: nvidia-a10g
    taints:
      - key: 'nvidia.com/gpu'
        value: 'true'
        effect: 'NoSchedule'

# ============================================================================
# Ingress / Gateway API
# ============================================================================

gateway:
  enabled: true
  className: 'cilium'
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - name: abl-tls
  routes:
    - name: studio
      hostnames: ['studio.abl.example.com']
      backendRef:
        name: studio
        port: 5173
    - name: runtime
      hostnames: ['api.abl.example.com']
      backendRef:
        name: runtime
        port: 3112
    - name: admin
      hostnames: ['admin.abl.example.com']
      backendRef:
        name: admin
        port: 3003
    - name: search-ai
      hostnames: ['search.abl.example.com']
      backendRef:
        name: search-ai-runtime
        port: 3114
