# ============================================================================
# ABL Platform - Tier M (Mid-Market) Helm Values
# ============================================================================
# Profile: 10-100 agents, 1K-50K conversations/day, 10K-500K documents
# Cluster: 6-8 general + 2-3 compute + 4-6 data + 0-4 GPU nodes
# Monthly storage growth: ~50-200 GB
# ============================================================================

global:
  tier: 'M'
  clusterName: 'abl-platform-midmarket'
  storageClass: 'gp3'
  cloudProvider: 'aws'
  imageRegistry: 'ghcr.io/koreai'
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-credentials
  domain: 'abl.example.com'
  tls:
    enabled: true
    issuer: 'letsencrypt-prod'
  monitoring:
    enabled: true
    prometheusEndpoint: 'http://prometheus.monitoring.svc:9090'
  podSecurityStandard: 'restricted'

# ============================================================================
# Tier 1 - Compute-Intensive Services
# ============================================================================

runtime:
  enabled: true
  replicaCount: 3
  image:
    repository: 'ghcr.io/koreai/abl-runtime'
    tag: 'latest'
  resources:
    requests:
      cpu: '2'
      memory: 4Gi
    limits:
      cpu: '4'
      memory: 8Gi
  ports:
    http: 3112
    ws: 3112
  env:
    NODE_ENV: 'production'
    LOG_LEVEL: 'info'
    MONGODB_URI: 'mongodb://mongodb-0.mongodb-headless.abl-data.svc:27017,mongodb-1.mongodb-headless.abl-data.svc:27017,mongodb-2.mongodb-headless.abl-data.svc:27017/abl?replicaSet=rs0&w=majority&readPreference=secondaryPreferred'
    REDIS_URL: 'redis://redis-cluster.abl-data.svc:6379'
    CLICKHOUSE_URL: 'http://clickhouse.abl-data.svc:8123'
    MESSAGE_PERSISTENCE_MAX_BATCH_SIZE: '25'
    MESSAGE_PERSISTENCE_WORKER_CONCURRENCY: '2'
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 2
            periodSeconds: 30
        selectPolicy: Max
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
  podDisruptionBudget:
    minAvailable: 2
  nodeSelector:
    node-pool: general
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: runtime

bgeM3:
  enabled: true
  replicaCount: 3
  image:
    repository: 'ghcr.io/huggingface/text-embeddings-inference'
    tag: '1.2'
  args:
    - '--model-id'
    - 'BAAI/bge-m3'
    - '--port'
    - '8001'
    - '--max-batch-tokens'
    - '16384'
    - '--max-concurrent-requests'
    - '128'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  ports:
    http: 8001
  persistence:
    enabled: true
    storageClass: 'gp3'
    size: 10Gi
    mountPath: /data
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 120
      periodSeconds: 30
    readiness:
      path: /health
      initialDelaySeconds: 60
      periodSeconds: 10
  podDisruptionBudget:
    minAvailable: 2
  nodeSelector:
    node-pool: compute

docling:
  enabled: true
  replicaCount: 2
  image:
    repository: 'ghcr.io/koreai/abl-docling'
    tag: 'latest'
  resources:
    requests:
      cpu: '2'
      memory: 4Gi
    limits:
      cpu: '4'
      memory: 8Gi
  ports:
    http: 8080
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 75
  nodeSelector:
    node-pool: compute

# Self-hosted LLM (optional for Tier M)
selfHostedLlm:
  enabled: false
  # Uncomment to enable self-hosted LLM
