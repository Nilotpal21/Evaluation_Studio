# ============================================================================
# ABL Platform - Tier XL (Hyperscale) Helm Values
# ============================================================================
# Profile: 1000+ agents, 500K+ conversations/day, 5M+ documents, multi-region
# Cluster: 30-60+ nodes per region (primary + DR)
# Monthly storage growth: 2-10+ TB
#
# Special considerations:
#   - Sharded MongoDB with zone-based routing
#   - Cross-region replication for all data stores
#   - CDN for Studio static assets
#   - Dedicated ingress per service tier
#   - Cilium network policies + PSA restricted
#   - Managed services recommended for data stores
# ============================================================================

global:
  tier: 'XL'
  clusterName: 'abl-platform-hyperscale'
  storageClass: 'gp3'
  cloudProvider: 'aws'
  imageRegistry: 'ghcr.io/koreai'
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-credentials
  domain: 'abl.example.com'
  tls:
    enabled: true
    issuer: 'letsencrypt-prod'
  monitoring:
    enabled: true
    prometheusEndpoint: 'http://prometheus.monitoring.svc:9090'
  podSecurityStandard: 'restricted'
  # Multi-region configuration
  multiRegion:
    enabled: true
    primaryRegion: 'us-east-1'
    drRegion: 'us-west-2'
    mode: 'active-passive'
  # Encryption at rest with BYOK
  encryption:
    enabled: true
    kmsProvider: 'aws-kms'
    kmsKeyId: 'arn:aws:kms:us-east-1:123456789:key/example-key-id'
  # CDN for static assets
  cdn:
    enabled: true
    provider: 'cloudfront'
    distributionId: 'E1234567890'

# ============================================================================
# Tier 1 - Compute-Intensive Services
# ============================================================================

runtime:
  enabled: true
  replicaCount: 12
  image:
    repository: 'ghcr.io/koreai/abl-runtime'
    tag: 'latest'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  ports:
    http: 3112
    ws: 3112
  env:
    NODE_ENV: 'production'
    LOG_LEVEL: 'info'
    # Sharded MongoDB via multiple mongos routers
    MONGODB_URI: 'mongodb://mongos-0.mongos.abl-data.svc:27017,mongos-1.mongos.abl-data.svc:27017,mongos-2.mongos.abl-data.svc:27017/abl?w=majority&readPreference=secondaryPreferred'
    REDIS_URL: 'redis://redis-cluster.abl-data.svc:6379'
    CLICKHOUSE_URL: 'http://clickhouse-lb.abl-data.svc:8123'
    MESSAGE_PERSISTENCE_MAX_BATCH_SIZE: '25'
    MESSAGE_PERSISTENCE_WORKER_CONCURRENCY: '2'
    # High concurrency connection tuning
    MONGODB_MAX_POOL_SIZE: '100'
    REDIS_MAX_RETRIES: '5'
    WS_MAX_CONNECTIONS_PER_POD: '2000'
  autoscaling:
    enabled: true
    minReplicas: 12
    maxReplicas: 40
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 60
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 70
      - type: Pods
        pods:
          metric:
            name: websocket_connections
          target:
            type: AverageValue
            averageValue: '1000'
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 600
        policies:
          - type: Percent
            value: 15
            periodSeconds: 120
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 8
            periodSeconds: 30
        selectPolicy: Max
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 20
    readiness:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 10
  podDisruptionBudget:
    minAvailable: 8
  nodeSelector:
    node-pool: general
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: runtime

bgeM3:
  enabled: true
  replicaCount: 12
  image:
    repository: 'ghcr.io/huggingface/text-embeddings-inference'
    tag: '1.2'
  args:
    - '--model-id'
    - 'BAAI/bge-m3'
    - '--port'
    - '8001'
    - '--max-batch-tokens'
    - '65536'
    - '--max-concurrent-requests'
    - '512'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  ports:
    http: 8001
  persistence:
    enabled: true
    storageClass: 'gp3'
    size: 20Gi
    mountPath: /data
  autoscaling:
    enabled: true
    minReplicas: 12
    maxReplicas: 40
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 60
  keda:
    enabled: true
    triggers:
      - type: prometheus
        metadata:
          serverAddress: 'http://prometheus.monitoring.svc:9090'
          metricName: 'bullmq_embedding_queue_depth'
          query: 'sum(bullmq_queue_waiting{queue="embedding-ingest"})'
          threshold: '50'
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 120
      periodSeconds: 30
    readiness:
      path: /health
      initialDelaySeconds: 60
      periodSeconds: 10
  podDisruptionBudget:
    minAvailable: 8
  nodeSelector:
    node-pool: compute
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: bge-m3

docling:
  enabled: true
  replicaCount: 8
  image:
    repository: 'ghcr.io/koreai/abl-docling'
    tag: 'latest'
  resources:
    requests:
      cpu: '4'
      memory: 8Gi
    limits:
      cpu: '8'
      memory: 16Gi
  ports:
    http: 8080
  autoscaling:
    enabled: true
    minReplicas: 8
    maxReplicas: 20
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 65
  podDisruptionBudget:
    minAvailable: 4
  nodeSelector:
    node-pool: compute

