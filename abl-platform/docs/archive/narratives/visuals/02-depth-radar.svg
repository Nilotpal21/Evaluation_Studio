<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 900" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
    <filter id="koreGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Depth in 1-2 dimensions doesn't make a platform.</text>
  <text x="480" y="78" text-anchor="middle" font-size="22" font-weight="700" fill="#00BFA6" letter-spacing="0.5">Depth in all 7 does.</text>

  <!--
    Radar center: (480, 420)
    Radius per level: L1=65, L2=130, L3=195, L4=260
    7 axes, 51.43° apart, starting from top (-90°):
      BUILD:       -90.00°  cos=0.0000  sin=-1.0000
      ORCHESTRATE: -38.57°  cos=0.7826  sin=-0.6235
      DEPLOY:       12.86°  cos=0.9749  sin=0.2225
      GOVERN:       64.29°  cos=0.4339  sin=0.9010
      OBSERVE:     115.71°  cos=-0.4339 sin=0.9010
      SCALE:       167.14°  cos=-0.9749 sin=0.2225
      AI-PROG:     218.57°  cos=-0.7826 sin=-0.6235

    Point at level L on axis: x = 480 + (L*65)*cosA, y = 420 + (L*65)*sinA
  -->

  <!-- Grid rings -->
  <circle cx="480" cy="420" r="65"  fill="none" stroke="#1A3A5C" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="480" cy="420" r="130" fill="none" stroke="#1A3A5C" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="480" cy="420" r="195" fill="none" stroke="#1A3A5C" stroke-width="0.5" stroke-dasharray="4,4"/>
  <circle cx="480" cy="420" r="260" fill="none" stroke="#1E4060" stroke-width="1"/>

  <!-- Level labels (along BUILD axis, top) -->
  <text x="498" y="358" font-size="9" fill="#3A6A8C" font-weight="600">L1</text>
  <text x="498" y="293" font-size="9" fill="#3A6A8C" font-weight="600">L2</text>
  <text x="498" y="228" font-size="9" fill="#3A6A8C" font-weight="600">L3</text>
  <text x="498" y="163" font-size="9" fill="#3A6A8C" font-weight="600">L4</text>

  <!-- Axis lines -->
  <!-- BUILD: top -->
  <line x1="480" y1="420" x2="480" y2="160" stroke="#1A3A5C" stroke-width="0.8"/>
  <!-- ORCHESTRATE -->
  <line x1="480" y1="420" x2="683" y2="258" stroke="#1A3A5C" stroke-width="0.8"/>
  <!-- DEPLOY -->
  <line x1="480" y1="420" x2="733" y2="478" stroke="#1A3A5C" stroke-width="0.8"/>
  <!-- GOVERN -->
  <line x1="480" y1="420" x2="593" y2="654" stroke="#1A3A5C" stroke-width="0.8"/>
  <!-- OBSERVE -->
  <line x1="480" y1="420" x2="367" y2="654" stroke="#1A3A5C" stroke-width="0.8"/>
  <!-- SCALE -->
  <line x1="480" y1="420" x2="227" y2="478" stroke="#1A3A5C" stroke-width="0.8"/>
  <!-- AI-PROG -->
  <line x1="480" y1="420" x2="277" y2="258" stroke="#1A3A5C" stroke-width="0.8"/>

  <!--
    ============================================================
    COMPETITOR POLYGONS (back to front: build-myself, open-source,
    ai-native, enterprise, then Kore on top)
    ============================================================

    Per-axis levels from the narrative depth map:
                        BUILD  ORCH  DEPLOY  GOVERN  OBSERVE  SCALE  AI-PROG
    "Build it myself"     1      1      1       1       1       1       1
    Open-source           1      2      1       1       1       1       1
    AI-native startups    2      2      2       2       2       2       1
    Enterprise            2      3      3       2       2       3       2
    Kore                  4      4      4       4       4       4       4

    Coordinate table (x = 480 + L*65*cosA, y = 420 + L*65*sinA):

    BUILD (cos=0, sin=-1):
      L1=(480,355) L2=(480,290) L3=(480,225) L4=(480,160)

    ORCHESTRATE (cos=0.7826, sin=-0.6235):
      L1=(531,379) L2=(582,339) L3=(633,298) L4=(683,258)

    DEPLOY (cos=0.9749, sin=0.2225):
      L1=(543,434) L2=(607,449) L3=(670,463) L4=(733,478)

    GOVERN (cos=0.4339, sin=0.9010):
      L1=(508,479) L2=(537,537) L3=(565,596) L4=(593,654)

    OBSERVE (cos=-0.4339, sin=0.9010):
      L1=(452,479) L2=(423,537) L3=(395,596) L4=(367,654)

    SCALE (cos=-0.9749, sin=0.2225):
      L1=(417,434) L2=(353,449) L3=(290,463) L4=(227,478)

    AI-PROG (cos=-0.7826, sin=-0.6235):
      L1=(429,379) L2=(378,339) L3=(327,298) L4=(277,258)
  -->

  <!-- 1. "Build it myself" — L1 on all axes (red, tiny dot near center) -->
  <polygon
    points="480,355 531,379 543,434 508,479 452,479 417,434 429,379"
    fill="#FF5252" fill-opacity="0.20" stroke="#FF5252" stroke-width="2" stroke-opacity="0.8"/>
  <!-- Vertex dots -->
  <circle cx="480" cy="355" r="3" fill="#FF5252"/>
  <circle cx="531" cy="379" r="3" fill="#FF5252"/>
  <circle cx="543" cy="434" r="3" fill="#FF5252"/>
  <circle cx="508" cy="479" r="3" fill="#FF5252"/>
  <circle cx="452" cy="479" r="3" fill="#FF5252"/>
  <circle cx="417" cy="434" r="3" fill="#FF5252"/>
  <circle cx="429" cy="379" r="3" fill="#FF5252"/>

  <!-- 2. Open-source — L1 all except L2 ORCHESTRATE (gray, lopsided) -->
  <polygon
    points="480,355 582,339 543,434 508,479 452,479 417,434 429,379"
    fill="#78909C" fill-opacity="0.12" stroke="#78909C" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="582" cy="339" r="3" fill="#78909C"/>

  <!-- 3. AI-native startups — L2 all except L1 AI-PROG (orange, small even shape) -->
  <polygon
    points="480,290 582,339 607,449 537,537 423,537 353,449 429,379"
    fill="#FFB74D" fill-opacity="0.10" stroke="#FFB74D" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="6,3"/>
  <circle cx="480" cy="290" r="3" fill="#FFB74D"/>
  <circle cx="582" cy="339" r="3" fill="#FFB74D"/>
  <circle cx="607" cy="449" r="3" fill="#FFB74D"/>
  <circle cx="537" cy="537" r="3" fill="#FFB74D"/>
  <circle cx="423" cy="537" r="3" fill="#FFB74D"/>
  <circle cx="353" cy="449" r="3" fill="#FFB74D"/>
  <circle cx="429" cy="379" r="3" fill="#FFB74D"/>

  <!-- 4. Enterprise — L2 BUILD, L3 ORCH, L3 DEPLOY, L2 GOVERN, L2 OBSERVE, L3 SCALE, L2 AI-PROG (blue, stretched on 3 axes) -->
  <polygon
    points="480,290 633,298 670,463 537,537 423,537 290,463 378,339"
    fill="#42A5F5" fill-opacity="0.10" stroke="#42A5F5" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="8,4"/>
  <circle cx="480" cy="290" r="3" fill="#42A5F5"/>
  <circle cx="633" cy="298" r="3" fill="#42A5F5"/>
  <circle cx="670" cy="463" r="3" fill="#42A5F5"/>
  <circle cx="537" cy="537" r="3" fill="#42A5F5"/>
  <circle cx="423" cy="537" r="3" fill="#42A5F5"/>
  <circle cx="290" cy="463" r="3" fill="#42A5F5"/>
  <circle cx="378" cy="339" r="3" fill="#42A5F5"/>

  <!-- 5. KORE — L4 on ALL axes (teal, fills entire chart) -->
  <polygon
    points="480,160 683,258 733,478 593,654 367,654 227,478 277,258"
    fill="#00BFA6" fill-opacity="0.22" stroke="#00BFA6" stroke-width="3" filter="url(#koreGlow)"/>
  <!-- Kore vertex dots with glow -->
  <circle cx="480" cy="160" r="6" fill="#00BFA6" filter="url(#subtleGlow)"/>
  <circle cx="683" cy="258" r="6" fill="#00BFA6" filter="url(#subtleGlow)"/>
  <circle cx="733" cy="478" r="6" fill="#00BFA6" filter="url(#subtleGlow)"/>
  <circle cx="593" cy="654" r="6" fill="#00BFA6" filter="url(#subtleGlow)"/>
  <circle cx="367" cy="654" r="6" fill="#00BFA6" filter="url(#subtleGlow)"/>
  <circle cx="227" cy="478" r="6" fill="#00BFA6" filter="url(#subtleGlow)"/>
  <circle cx="277" cy="258" r="6" fill="#00BFA6" filter="url(#subtleGlow)"/>

  <!-- Axis labels with data callouts -->
  <text x="480" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#E0F7FA" letter-spacing="1">BUILD</text>
  <text x="480" y="123" text-anchor="middle" font-size="10" fill="#5BA4CF">Compilable YAML DSL + IR</text>

  <text x="700" y="248" text-anchor="start" font-size="14" font-weight="700" fill="#E0F7FA" letter-spacing="1">ORCHESTRATE</text>
  <text x="700" y="264" text-anchor="start" font-size="10" fill="#5BA4CF">20+ runtime primitives</text>

  <text x="748" y="485" text-anchor="start" font-size="14" font-weight="700" fill="#E0F7FA" letter-spacing="1">DEPLOY</text>
  <text x="748" y="501" text-anchor="start" font-size="10" fill="#5BA4CF">Multi-protocol, multi-auth</text>

  <text x="607" y="675" text-anchor="start" font-size="14" font-weight="700" fill="#E0F7FA" letter-spacing="1">GOVERN</text>
  <text x="607" y="691" text-anchor="start" font-size="10" fill="#5BA4CF">3 tiers, 5 actions, scoped</text>

  <text x="350" y="675" text-anchor="end" font-size="14" font-weight="700" fill="#E0F7FA" letter-spacing="1">OBSERVE</text>
  <text x="350" y="691" text-anchor="end" font-size="10" fill="#5BA4CF">8-15 trace events/turn</text>

  <text x="210" y="485" text-anchor="end" font-size="14" font-weight="700" fill="#E0F7FA" letter-spacing="1">SCALE</text>
  <text x="210" y="501" text-anchor="end" font-size="10" fill="#5BA4CF">Project isolation, versioned</text>

  <text x="260" y="248" text-anchor="end" font-size="14" font-weight="700" fill="#E0F7FA" letter-spacing="1">AI-PROG</text>
  <text x="260" y="264" text-anchor="end" font-size="10" fill="#5BA4CF">Arch + MCP + CLI + SDK</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="55" y="770" width="850" height="115" rx="12" fill="#0D1B2A" stroke="#1A3A5C" stroke-width="1"/>

  <!-- Row 1 -->
  <!-- Kore -->
  <line x1="80" y1="798" x2="120" y2="798" stroke="#00BFA6" stroke-width="3"/>
  <circle cx="100" cy="798" r="5" fill="#00BFA6"/>
  <text x="130" y="802" font-size="13" font-weight="700" fill="#00BFA6">Kore</text>
  <text x="180" y="802" font-size="11" fill="#7AAFCF">— L4 across all 7 dimensions (fills entire chart)</text>

  <!-- Enterprise -->
  <line x1="530" y1="798" x2="570" y2="798" stroke="#42A5F5" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="550" cy="798" r="3" fill="#42A5F5"/>
  <text x="580" y="802" font-size="13" font-weight="600" fill="#42A5F5">Enterprise Incumbents</text>
  <text x="745" y="802" font-size="11" fill="#5A7A9A">— L2-3, stretched</text>

  <!-- Row 2 -->
  <!-- AI-native -->
  <line x1="80" y1="828" x2="120" y2="828" stroke="#FFB74D" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="100" cy="828" r="3" fill="#FFB74D"/>
  <text x="130" y="832" font-size="13" font-weight="600" fill="#FFB74D">AI-Native Startups</text>
  <text x="280" y="832" font-size="11" fill="#5A7A9A">— L2 even polygon, shallow everywhere</text>

  <!-- Open-source -->
  <line x1="530" y1="828" x2="570" y2="828" stroke="#78909C" stroke-width="2"/>
  <circle cx="550" cy="828" r="3" fill="#78909C"/>
  <text x="580" y="832" font-size="13" font-weight="600" fill="#78909C">Open-Source</text>
  <text x="670" y="832" font-size="11" fill="#5A7A9A">— L1 everywhere, L2 orchestrate only</text>

  <!-- Row 3 -->
  <!-- Build it myself -->
  <line x1="80" y1="858" x2="120" y2="858" stroke="#FF5252" stroke-width="2"/>
  <circle cx="100" cy="858" r="3" fill="#FF5252"/>
  <text x="130" y="862" font-size="13" font-weight="600" fill="#FF5252">"Build It Myself"</text>
  <text x="268" y="862" font-size="11" fill="#5A7A9A">— L1 across the board (tiny shape near center)</text>
</svg>
