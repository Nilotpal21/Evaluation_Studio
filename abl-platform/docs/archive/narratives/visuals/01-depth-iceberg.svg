<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#B3DDF2"/>
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B6B93"/>
      <stop offset="30%" stop-color="#0F4C75"/>
      <stop offset="70%" stop-color="#0A2647"/>
      <stop offset="100%" stop-color="#061225"/>
    </linearGradient>
    <linearGradient id="iceAbove" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0EFF8"/>
    </linearGradient>
    <linearGradient id="iceBelow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89CFF0"/>
      <stop offset="50%" stop-color="#5BA4CF"/>
      <stop offset="100%" stop-color="#3A7BD5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="900" height="280" fill="url(#skyGrad)"/>

  <!-- Ocean background -->
  <rect y="280" width="900" height="820" fill="url(#oceanGrad)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0A2647" letter-spacing="0.5">Every platform demos the waterline.</text>
  <text x="450" y="68" text-anchor="middle" font-size="22" font-weight="700" fill="#0A2647" letter-spacing="0.5">Production lives beneath it.</text>

  <!-- Iceberg above water -->
  <polygon points="450,95 560,265 340,265" fill="url(#iceAbove)" stroke="#B0D4E8" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Above-water labels -->
  <text x="450" y="155" text-anchor="middle" font-size="11" fill="#5A7A8A" font-weight="600" letter-spacing="1">WHAT EVERY PLATFORM DEMOS</text>
  <text x="450" y="178" text-anchor="middle" font-size="13" fill="#3A5A6A">"We have guardrails"</text>
  <text x="450" y="196" text-anchor="middle" font-size="13" fill="#3A5A6A">"We do tool calling"</text>
  <text x="450" y="214" text-anchor="middle" font-size="13" fill="#3A5A6A">"We support multi-agent"</text>
  <text x="450" y="232" text-anchor="middle" font-size="13" fill="#3A5A6A">"We have observability"</text>

  <!-- 10% label -->
  <text x="130" y="185" text-anchor="middle" font-size="42" font-weight="800" fill="#7AAFCF" opacity="0.4">10%</text>
  <text x="130" y="205" text-anchor="middle" font-size="12" fill="#7AAFCF" opacity="0.5">of the problem</text>

  <!-- Waterline waves -->
  <path d="M0,270 Q50,260 100,270 Q150,280 200,270 Q250,260 300,270 Q350,280 400,270 Q450,260 500,270 Q550,280 600,270 Q650,260 700,270 Q750,280 800,270 Q850,260 900,270 L900,290 Q850,280 800,290 Q750,300 700,290 Q650,280 600,290 Q550,300 500,290 Q450,280 400,290 Q350,300 300,290 Q250,280 200,290 Q150,300 100,290 Q50,280 0,290 Z" fill="#1B6B93" opacity="0.6"/>
  <path d="M0,278 Q60,268 120,278 Q180,288 240,278 Q300,268 360,278 Q420,288 480,278 Q540,268 600,278 Q660,288 720,278 Q780,268 840,278 Q870,283 900,278 L900,295 Q840,285 780,295 Q720,305 660,295 Q600,285 540,295 Q480,305 420,295 Q360,285 300,295 Q240,305 180,295 Q120,285 60,295 Q30,300 0,295 Z" fill="#1B6B93" opacity="0.4"/>

  <!-- Iceberg below water -->
  <polygon points="340,285 560,285 680,620 720,850 450,1050 180,850 220,620" fill="url(#iceBelow)" opacity="0.85" stroke="#3A7BD5" stroke-width="0.5"/>

  <!-- 90% label -->
  <text x="130" y="660" text-anchor="middle" font-size="52" font-weight="800" fill="#FFFFFF" opacity="0.2">90%</text>
  <text x="130" y="685" text-anchor="middle" font-size="13" fill="#FFFFFF" opacity="0.25">of the problem</text>

  <!-- GOVERN section -->
  <rect x="290" y="310" width="320" height="140" rx="8" fill="#0F4C75" opacity="0.7" stroke="#00BFA6" stroke-width="1.5"/>
  <text x="310" y="332" font-size="11" font-weight="700" fill="#00BFA6" letter-spacing="1.5">GOVERN</text>
  <text x="310" y="352" font-size="11.5" fill="#B8D8E8">3-tier cascade (regex → model → LLM)</text>
  <text x="310" y="370" font-size="11.5" fill="#B8D8E8">5 actions: block / redact / reask / escalate / fix</text>
  <text x="310" y="388" font-size="11.5" fill="#B8D8E8">Per-agent policy scoping</text>
  <text x="310" y="406" font-size="11.5" fill="#B8D8E8">Streaming-aware enforcement</text>
  <text x="310" y="424" font-size="11.5" fill="#B8D8E8">Pluggable guardrail providers</text>
  <text x="310" y="442" font-size="11.5" fill="#B8D8E8">Inline enforcement at execution boundaries</text>

  <!-- ORCHESTRATE section -->
  <rect x="270" y="465" width="360" height="185" rx="8" fill="#0F4C75" opacity="0.7" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="290" y="487" font-size="11" font-weight="700" fill="#FFB74D" letter-spacing="1.5">ORCHESTRATE</text>
  <text x="290" y="507" font-size="11.5" fill="#B8D8E8">Handoff with cycle detection + allow-lists</text>
  <text x="290" y="525" font-size="11.5" fill="#B8D8E8">Stack-based delegation + supervision</text>
  <text x="290" y="543" font-size="11.5" fill="#B8D8E8">CEL expression engine</text>
  <text x="290" y="561" font-size="11.5" fill="#B8D8E8">Intelligent gather (15+ field types)</text>
  <text x="290" y="579" font-size="11.5" fill="#B8D8E8">Response processing pipeline</text>
  <text x="290" y="597" font-size="11.5" fill="#B8D8E8">Completion detection + constraints</text>
  <text x="290" y="615" font-size="11.5" fill="#B8D8E8">Session draining + memory windowing</text>
  <text x="290" y="633" font-size="11.5" fill="#B8D8E8">Threaded conversations + scoped recall</text>

  <!-- DEPLOY + SCALE section -->
  <rect x="280" y="665" width="340" height="140" rx="8" fill="#0F4C75" opacity="0.7" stroke="#7C4DFF" stroke-width="1.5"/>
  <text x="300" y="687" font-size="11" font-weight="700" fill="#7C4DFF" letter-spacing="1.5">DEPLOY + SCALE</text>
  <text x="300" y="707" font-size="11.5" fill="#B8D8E8">Multi-protocol tool abstraction (REST/MCP/gRPC)</text>
  <text x="300" y="725" font-size="11.5" fill="#B8D8E8">Credential rotation lifecycle</text>
  <text x="300" y="743" font-size="11.5" fill="#B8D8E8">Knowledge graph domain topologies</text>
  <text x="300" y="761" font-size="11.5" fill="#B8D8E8">Project-level isolation</text>
  <text x="300" y="779" font-size="11.5" fill="#B8D8E8">Versioned compilation + deployment</text>
  <text x="300" y="797" font-size="11.5" fill="#B8D8E8">Compiler-validated agent definitions</text>

  <!-- AI-PROGRAMMABLE section -->
  <rect x="305" y="820" width="290" height="100" rx="8" fill="#0F4C75" opacity="0.7" stroke="#E040FB" stroke-width="1.5"/>
  <text x="325" y="842" font-size="11" font-weight="700" fill="#E040FB" letter-spacing="1.5">AI-PROGRAMMABLE</text>
  <text x="325" y="862" font-size="11.5" fill="#B8D8E8">Arch: design → build → test → deploy → debug</text>
  <text x="325" y="880" font-size="11.5" fill="#B8D8E8">MCP tools + CLI + SDK interfaces</text>
  <text x="325" y="898" font-size="11.5" fill="#B8D8E8">Compiler validation of AI output</text>

  <!-- Bottom caption -->
  <text x="450" y="960" text-anchor="middle" font-size="12" fill="#5BA4CF" font-style="italic">Each item below the waterline = 1 week to 1 quarter of engineering</text>
  <text x="450" y="978" text-anchor="middle" font-size="12" fill="#5BA4CF" font-style="italic">you didn't budget for.</text>

  <!-- Kore badge -->
  <rect x="350" y="1010" width="200" height="36" rx="18" fill="#00BFA6" filter="url(#glow)"/>
  <text x="450" y="1034" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF" letter-spacing="1">KORE GOES HERE</text>
</svg>
