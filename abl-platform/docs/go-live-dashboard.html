<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SearchAI Go-Live Dashboard</title>
    <style>
      :root {
        --bg: #08090d;
        --surface: #111318;
        --elevated: #191c24;
        --border: rgba(255, 255, 255, 0.06);
        --border2: rgba(255, 255, 255, 0.1);
        --text: #e8e8ed;
        --text2: #9195a1;
        --text3: #5d6270;
        --green: #34d399;
        --green-bg: rgba(52, 211, 153, 0.12);
        --blue: #60a5fa;
        --blue-bg: rgba(96, 165, 250, 0.12);
        --amber: #fbbf24;
        --amber-bg: rgba(251, 191, 36, 0.12);
        --red: #f87171;
        --red-bg: rgba(248, 113, 113, 0.1);
        --violet: #8b5cf6;
        --violet-bg: rgba(139, 92, 246, 0.14);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 32px 40px;
        max-width: 1440px;
        margin: 0 auto;
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
        line-height: 1.5;
      }
      a {
        color: var(--blue);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .meta {
        font-size: 13px;
        color: var(--text3);
        margin-top: 4px;
        margin-bottom: 24px;
      }

      /* Alert — fail-visible: shown by default, hidden by JS if no alert */
      .alert {
        background: var(--red-bg);
        border: 1px solid rgba(248, 113, 113, 0.25);
        border-radius: 10px;
        padding: 14px 18px;
        margin-bottom: 20px;
        font-size: 14px;
        line-height: 1.6;
      }
      .alert strong {
        color: var(--red);
        font-weight: 600;
      }
      .alert span {
        color: var(--text2);
      }
      .alert-esc {
        font-size: 12px;
        color: var(--text3);
        margin-top: 4px;
      }

      /* Summary strip */
      .summary-strip {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      @media (max-width: 900px) {
        .summary-strip {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .sum-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .sum-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text3);
        margin-bottom: 4px;
      }
      .sum-value {
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .sum-sub {
        font-size: 12px;
        color: var(--text3);
        margin-top: 2px;
      }

      /* Bus factor callout */
      .bus-factor {
        background: var(--amber-bg);
        border: 1px solid rgba(251, 191, 36, 0.2);
        border-radius: 10px;
        padding: 12px 18px;
        margin-bottom: 20px;
        font-size: 13px;
        color: var(--text2);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .bus-factor-icon {
        font-size: 20px;
        flex-shrink: 0;
      }
      .bus-factor b {
        color: var(--amber);
        font-weight: 600;
      }

      /* Velocity + Completed Stories */
      .velocity {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 18px;
        margin-bottom: 20px;
      }
      .velocity-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }
      .velocity-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
      }
      .velocity-stats {
        display: flex;
        gap: 20px;
        font-size: 13px;
        color: var(--text3);
        margin-top: 8px;
      }
      .velocity-stats b {
        color: var(--green);
        font-weight: 600;
      }
      .completed-stories {
        display: none;
        margin-top: 10px;
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }
      .velocity.open .completed-stories {
        display: block;
      }
      .cs-row {
        display: flex;
        gap: 10px;
        padding: 4px 0;
        font-size: 12px;
        color: var(--text3);
      }
      .cs-key {
        color: var(--blue);
        font-weight: 500;
        min-width: 70px;
      }
      .cs-summary {
        color: var(--text2);
      }

      /* Timeline */
      .timeline {
        display: flex;
        margin: 0 0 28px;
        padding: 0 40px;
        position: relative;
      }
      @media (max-width: 768px) {
        .timeline {
          padding: 0 10px;
          flex-wrap: wrap;
          gap: 8px;
        }
      }
      .tl-track {
        position: absolute;
        top: 24px;
        left: 40px;
        right: 40px;
        height: 3px;
        background: var(--elevated);
        border-radius: 2px;
      }
      .tl-progress {
        position: absolute;
        top: 24px;
        left: 40px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--green), var(--violet));
        transition: width 0.6s;
        min-width: 24px;
      }
      .tl-node {
        flex: 1;
        text-align: center;
        position: relative;
        z-index: 2;
      }
      .tl-dot {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        margin: 14px auto 10px;
        border: 2.5px solid var(--border2);
        background: var(--surface);
        transition: all 0.3s;
      }
      .tl-node.now .tl-dot {
        background: var(--violet);
        border-color: var(--violet);
        box-shadow:
          0 0 0 5px var(--violet-bg),
          0 0 16px rgba(139, 92, 246, 0.4);
      }
      .tl-node.done .tl-dot {
        background: var(--green);
        border-color: var(--green);
        box-shadow: 0 0 0 4px var(--green-bg);
      }
      .tl-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text3);
      }
      .tl-date {
        font-size: 12px;
        color: var(--text3);
        margin-top: 2px;
      }
      .tl-days {
        font-size: 11px;
        margin-top: 1px;
        font-weight: 500;
      }
      .tl-kr {
        font-size: 12px;
        margin-top: 3px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .tl-dep {
        font-size: 10px;
        color: var(--text3);
        margin-top: 2px;
        font-style: italic;
      }
      .tl-node.now .tl-label {
        color: var(--violet);
      }
      .tl-node.done .tl-label {
        color: var(--green);
      }

      /* Card */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 12px;
        transition: border-color 0.2s;
      }
      .card:hover {
        border-color: var(--border2);
      }
      .card-head {
        display: flex;
        align-items: center;
        padding: 16px 20px;
        cursor: pointer;
        gap: 14px;
      }
      .ring-wrap {
        position: relative;
        width: 44px;
        height: 44px;
        flex-shrink: 0;
      }
      .ring-wrap svg {
        transform: rotate(-90deg);
      }
      .ring-wrap circle {
        fill: none;
        stroke-width: 4;
        stroke-linecap: round;
      }
      .ring-track {
        stroke: var(--elevated);
      }
      .ring-fill {
        transition: stroke-dashoffset 0.6s;
      }
      .ring-pct {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: var(--text2);
        font-variant-numeric: tabular-nums;
      }
      .card-info {
        flex: 1;
        min-width: 0;
      }
      .card-title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .card-sub {
        font-size: 12px;
        color: var(--text3);
        margin-top: 2px;
      }
      .card-risk {
        font-size: 12px;
        color: var(--amber);
        margin-top: 3px;
        line-height: 1.4;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 16px;
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
      }
      .tag::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .tag-risk {
        background: var(--amber-bg);
        color: var(--amber);
      }
      .tag-risk::before {
        background: var(--amber);
      }
      .tag-miss {
        background: var(--red-bg);
        color: var(--red);
      }
      .tag-miss::before {
        background: var(--red);
      }
      .tag-blocked {
        background: var(--red-bg);
        color: var(--red);
      }
      .tag-blocked::before {
        background: var(--red);
      }
      .tag-pending {
        background: rgba(93, 98, 112, 0.12);
        color: var(--text3);
      }
      .tag-pending::before {
        background: var(--text3);
      }
      .tag-track {
        background: var(--green-bg);
        color: var(--green);
      }
      .tag-track::before {
        background: var(--green);
      }
      .arrow {
        color: var(--text3);
        font-size: 11px;
        margin-left: 6px;
        transition: transform 0.2s;
      }
      .card.open .arrow {
        transform: rotate(90deg);
      }
      .card-body {
        display: none;
        border-top: 1px solid var(--border);
      }
      .card.open .card-body {
        display: block;
      }

      /* Items */
      .item {
        display: flex;
        align-items: flex-start;
        padding: 14px 20px;
        gap: 12px;
        border-bottom: 1px solid var(--border);
      }
      .item:last-child {
        border-bottom: none;
      }

      /* Status badge */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        flex-shrink: 0;
        margin-top: 2px;
        white-space: nowrap;
      }
      .sb-done {
        background: var(--green-bg);
        color: var(--green);
      }
      .sb-wip {
        background: var(--blue-bg);
        color: var(--blue);
      }
      .sb-not {
        background: rgba(93, 98, 112, 0.1);
        color: var(--text3);
      }
      .sb-blocked {
        background: var(--red-bg);
        color: var(--red);
      }

      .item-body {
        flex: 1;
        min-width: 0;
      }
      .item-title-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .item-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }
      .item-key {
        font-size: 11px;
        color: var(--blue);
        font-weight: 500;
      }
      .item-detail {
        font-size: 12px;
        color: var(--text3);
        margin-top: 3px;
        line-height: 1.4;
      }

      /* Achieved + Next */
      .item-progress {
        margin-top: 6px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .achieved-row {
        display: flex;
        align-items: flex-start;
        gap: 5px;
        font-size: 11px;
        color: var(--text3);
        line-height: 1.3;
      }
      .achieved-icon {
        color: var(--green);
        flex-shrink: 0;
        font-size: 12px;
      }
      .next-action {
        display: flex;
        align-items: flex-start;
        gap: 5px;
        font-size: 12px;
        line-height: 1.3;
        margin-top: 5px;
        padding: 5px 8px;
        background: var(--violet-bg);
        border-radius: 5px;
        border: 1px solid rgba(139, 92, 246, 0.12);
      }
      .next-label {
        color: var(--violet);
        font-weight: 700;
        flex-shrink: 0;
      }
      .next-text {
        color: var(--text2);
      }

      /* Sub-items (checklist within an item) */
      .sub-items {
        margin-top: 6px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .sub-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--text3);
      }
      .sub-check {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        border: 1.5px solid var(--text3);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 10px;
      }
      .sub-check.checked {
        background: var(--green-bg);
        border-color: var(--green);
        color: var(--green);
      }

      /* Done when */
      .item-done-when {
        font-size: 11px;
        color: var(--text3);
        margin-top: 5px;
        padding: 3px 7px;
        background: var(--elevated);
        border-radius: 4px;
        display: block;
      }
      .item-done-when strong {
        color: var(--text2);
        font-weight: 600;
      }

      .item-who {
        flex-shrink: 0;
        font-size: 11px;
        color: var(--text3);
        text-align: right;
        min-width: 90px;
        padding-top: 2px;
      }
      .av {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--elevated);
        border: 1px solid var(--border2);
        font-size: 8px;
        font-weight: 700;
        color: var(--text2);
        margin-right: 4px;
        vertical-align: middle;
      }
      .unassigned {
        color: var(--red);
        font-style: italic;
      }

      /* Sections */
      .section-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 28px 0 10px;
      }
      .defer {
        font-size: 12px;
        color: var(--text3);
        padding: 8px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .defer:last-child {
        border-bottom: none;
      }
      .defer b {
        color: var(--text2);
        font-weight: 500;
      }
      .defer-left {
        flex: 1;
      }
      .defer-trigger {
        font-size: 11px;
        color: var(--text3);
        font-style: italic;
        max-width: 280px;
        text-align: right;
      }
      .missed-box {
        border: 1px dashed var(--border2);
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        color: var(--text3);
        font-size: 12px;
      }

      /* Resource allocation */
      .resource-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 8px;
        margin-top: 6px;
      }
      .resource-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
      }
      .resource-bar {
        height: 5px;
        background: var(--elevated);
        border-radius: 3px;
        overflow: hidden;
        display: flex;
        margin: 6px 0 2px;
      }
      .resource-bar-done {
        background: var(--green);
        height: 100%;
      }
      .resource-bar-wip {
        background: var(--blue);
        height: 100%;
      }
      .resource-bar-todo {
        background: var(--text3);
        height: 100%;
        opacity: 0.3;
      }
      .resource-name {
        font-size: 12px;
        font-weight: 500;
      }
      .resource-count {
        font-size: 11px;
        color: var(--text3);
        font-variant-numeric: tabular-nums;
      }
      .resource-note {
        font-size: 10px;
        color: var(--amber);
        margin-top: 2px;
      }

      .footer {
        text-align: center;
        font-size: 11px;
        color: var(--text3);
        margin-top: 32px;
      }

      @media print {
        body {
          background: #fff;
          color: #111;
          padding: 20px;
        }
        .card,
        .sum-card,
        .velocity,
        .alert,
        .bus-factor {
          background: #f8f8f8;
          border-color: #ddd;
        }
        .card-body {
          display: block !important;
        }
        :root {
          --text: #111;
          --text2: #444;
          --text3: #666;
          --green: #059669;
          --blue: #2563eb;
          --amber: #d97706;
          --red: #dc2626;
          --violet: #7c3aed;
        }
      }
    </style>
  </head>
  <body>
    <h1 id="title"></h1>
    <p class="meta" id="meta"></p>

    <!-- Alert: visible by default as a safety net -->
    <div class="alert" id="alert">
      <strong>Loading dashboard data...</strong>
    </div>

    <div id="bus-factor"></div>
    <div class="summary-strip" id="summary"></div>
    <div class="velocity" id="velocity" style="display: none"></div>
    <div class="timeline" id="timeline"></div>
    <div id="cards"></div>

    <div class="section-label">Team Allocation</div>
    <div id="resources"></div>

    <div class="section-label">Deferred — Post Go-Live</div>
    <div id="deferred"></div>

    <div class="section-label">Missed Milestones</div>
    <div id="missed"></div>

    <div class="footer" id="footer"></div>

    <!-- Data file: edit go-live-data.js to update the dashboard -->
    <script src="go-live-data.js"></script>

    <script>
      const STATUS_BADGE = {
        done: { cls: 'sb-done', icon: '\u2713', label: 'DONE' },
        wip: { cls: 'sb-wip', icon: '\u25B6', label: 'IN PROGRESS' },
        not: { cls: 'sb-not', icon: '\u2014', label: 'NOT STARTED' },
        blocked: { cls: 'sb-blocked', icon: '\u2716', label: 'BLOCKED' },
      };
      const TAG_CLASS = {
        'At Risk': 'tag-risk',
        'Likely Miss': 'tag-miss',
        Blocked: 'tag-blocked',
        Pending: 'tag-pending',
        'On Track': 'tag-track',
      };
      const KR_COLOR = (met, total) => {
        const p = met / total;
        return p >= 0.7 ? 'var(--green)' : p >= 0.3 ? 'var(--amber)' : 'var(--red)';
      };
      const CIRC = 2 * Math.PI * 18;

      function initials(name) {
        return name
          ? name
              .split(' ')
              .map((w) => w[0])
              .join('')
              .toUpperCase()
              .slice(0, 2)
          : '';
      }

      function daysUntil(dateStr) {
        const months = {
          Jan: 0,
          Feb: 1,
          Mar: 2,
          Apr: 3,
          May: 4,
          Jun: 5,
          Jul: 6,
          Aug: 7,
          Sep: 8,
          Oct: 9,
          Nov: 10,
          Dec: 11,
        };
        const [mon, day] = dateStr.split(' ');
        const target = new Date(2026, months[mon], parseInt(day));
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        const diff = Math.ceil((target - now) / 86400000);
        if (diff < 0) return { text: `${Math.abs(diff)}d overdue`, color: 'var(--red)' };
        if (diff === 0) return { text: 'Today', color: 'var(--red)' };
        if (diff <= 2) return { text: `${diff}d away`, color: 'var(--amber)' };
        return { text: `${diff}d away`, color: 'var(--text3)' };
      }

      function jiraLink(key, base) {
        return key
          ? `<a class="item-key" href="${base}${key}" target="_blank" rel="noopener">${key}</a>`
          : '';
      }

      function renderBadge(status) {
        const b = STATUS_BADGE[status] || STATUS_BADGE.not;
        return `<span class="status-badge ${b.cls}"><span>${b.icon}</span>${b.label}</span>`;
      }

      function renderProgress(item) {
        let html = '';
        if (item.achieved && item.achieved.length > 0) {
          html += '<div class="item-progress">';
          item.achieved.forEach((a) => {
            html += `<div class="achieved-row"><span class="achieved-icon">\u2713</span><span>${a}</span></div>`;
          });
          html += '</div>';
        }
        if (item.subItems && item.subItems.length > 0) {
          html += '<div class="sub-items">';
          item.subItems.forEach((si) => {
            const cls = si.done ? 'checked' : '';
            const icon = si.done ? '\u2713' : '';
            html += `<div class="sub-item"><span class="sub-check ${cls}">${icon}</span><span>${si.label}</span></div>`;
          });
          html += '</div>';
        }
        if (item.nextAction) {
          html += `<div class="next-action"><span class="next-label">Next:</span> <span class="next-text">${item.nextAction}</span></div>`;
        }
        return html;
      }

      function render(data) {
        document.getElementById('title').textContent = data.title;
        document.getElementById('meta').innerHTML =
          `<a href="${data.jiraBase}${data.epic}" target="_blank">${data.epic}</a> &bull; Updated ${data.updated} &bull; ${data.source}`;

        // Alert
        const alertEl = document.getElementById('alert');
        if (data.alert) {
          let alertHTML = `<strong>${jiraLink(data.alert.key, data.jiraBase)} \u2014 ${data.alert.label}:</strong> <span>${data.alert.text}</span>`;
          if (data.alert.targetDate)
            alertHTML += ` <strong style="color:var(--amber)">Target: ${data.alert.targetDate}</strong>`;
          if (data.alert.escalation)
            alertHTML += `<div class="alert-esc">${data.alert.escalation}</div>`;
          alertEl.innerHTML = alertHTML;
        } else {
          alertEl.style.display = 'none';
        }

        // Bus factor
        const maxOwner = data.resourceAllocation
          ? Object.entries(data.resourceAllocation).sort((a, b) => b[1].total - a[1].total)[0]
          : null;
        if (
          maxOwner &&
          maxOwner[1].total /
            Object.values(data.resourceAllocation).reduce((s, r) => s + r.total, 0) >
            0.5
        ) {
          document.getElementById('bus-factor').innerHTML =
            `<div class="bus-factor"><span class="bus-factor-icon">\u26A0</span><span><b>${maxOwner[0]}</b> owns ${maxOwner[1].total} of ${Object.values(data.resourceAllocation).reduce((s, r) => s + r.total, 0)} items (${Math.round((maxOwner[1].total / Object.values(data.resourceAllocation).reduce((s, r) => s + r.total, 0)) * 100)}%). ${maxOwner[1].note || 'Single point of failure risk.'}</span></div>`;
        }

        // Summary strip — lead with next-milestone progress, not overall
        const totalItems = data.checkpoints.reduce((s, c) => s + c.total, 0);
        const totalMet = data.checkpoints.reduce((s, c) => s + c.met, 0);
        const blocked = data.checkpoints.reduce(
          (s, c) => s + c.items.filter((i) => i.status === 'blocked').length,
          0,
        );
        const wip = data.checkpoints.reduce(
          (s, c) => s + c.items.filter((i) => i.status === 'wip').length,
          0,
        );
        const nextCP =
          data.checkpoints.find((c) => c.status === 'active') ||
          data.checkpoints.find((c) => c.status === 'future');
        const nextPct = nextCP ? Math.round((nextCP.met / nextCP.total) * 100) : 0;
        const nextDays = nextCP ? daysUntil(nextCP.date) : { text: 'N/A', color: 'var(--text3)' };
        const overallPct = Math.round((totalMet / totalItems) * 100);
        // Burn rate
        const daysToProduction = (() => {
          const prod = data.checkpoints.find((c) => c.name === 'Production');
          return prod ? daysUntil(prod.date) : null;
        })();
        const remaining = totalItems - totalMet;
        const sprintVelocity =
          data.completedSprints && data.completedSprints.length > 0
            ? data.completedSprints[data.completedSprints.length - 1].stories
            : null;
        const itemsPerDay = sprintVelocity ? (sprintVelocity / 14).toFixed(1) : null;

        document.getElementById('summary').innerHTML = `
    <div class="sum-card"><div class="sum-label">Next: ${nextCP ? nextCP.name : 'N/A'}</div><div class="sum-value" style="color:${nextPct >= 70 ? 'var(--green)' : nextPct >= 30 ? 'var(--amber)' : 'var(--red)'}">${nextPct}%</div><div class="sum-sub" style="color:${nextDays.color}">${nextDays.text} \u2014 ${nextCP ? nextCP.met + '/' + nextCP.total : ''}</div></div>
    <div class="sum-card"><div class="sum-label">Overall</div><div class="sum-value" style="color:${overallPct >= 50 ? 'var(--green)' : overallPct >= 25 ? 'var(--amber)' : 'var(--red)'}">${totalMet}/${totalItems}</div><div class="sum-sub">${overallPct}% complete</div></div>
    <div class="sum-card"><div class="sum-label">In Progress</div><div class="sum-value" style="color:var(--blue)">${wip}</div><div class="sum-sub">items actively worked</div></div>
    <div class="sum-card"><div class="sum-label">Blockers</div><div class="sum-value" style="color:${blocked > 0 ? 'var(--red)' : 'var(--green)'}">${blocked}</div><div class="sum-sub">${blocked > 0 ? 'action required' : 'clear'}</div></div>
    <div class="sum-card"><div class="sum-label">Burn Rate</div><div class="sum-value" style="color:var(--text2)">${itemsPerDay || '?'}</div><div class="sum-sub">items/day (need ${remaining} more)</div></div>
  `;

        // Velocity + Completed Stories
        if (data.completedSprints && data.completedSprints.length > 0) {
          const vel = document.getElementById('velocity');
          vel.style.display = 'block';
          const sp = data.completedSprints[data.completedSprints.length - 1];
          let storiesHTML = '';
          if (sp.tickets && sp.tickets.length > 0) {
            storiesHTML = '<div class="completed-stories">';
            sp.tickets.forEach((t) => {
              const key = typeof t === 'string' ? t : t.key;
              const summary = typeof t === 'string' ? '' : t.summary;
              storiesHTML += `<div class="cs-row"><span class="cs-key">${jiraLink(key, data.jiraBase)}</span><span class="cs-summary">${summary}</span></div>`;
            });
            storiesHTML += '</div>';
          }
          vel.innerHTML = `
      <div class="velocity-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="velocity-title">Completed: ${sp.name} (${sp.planned ? sp.stories + '/' + sp.planned + ' planned' : sp.stories + ' stories'})</span>
        <span class="arrow">\u25B6</span>
      </div>
      <div class="velocity-stats"><span><b>${sp.stories}</b> stories</span><span><b>${sp.commits}</b> commits</span><span><b>${sp.testsAdded}</b> tests</span></div>
      ${storiesHTML}`;
        }

        // Timeline
        const tl = document.getElementById('timeline');
        const activeIdx = data.checkpoints.findIndex((c) => c.status === 'active');
        const progress = activeIdx >= 0 ? ((activeIdx + 0.3) / data.checkpoints.length) * 100 : 0;
        let tlHTML = `<div class="tl-track"></div><div class="tl-progress" style="width:${Math.max(progress, 3)}%"></div>`;
        data.checkpoints.forEach((cp) => {
          const cls = cp.status === 'active' ? 'now' : cp.status === 'done' ? 'done' : '';
          const krColor = KR_COLOR(cp.met, cp.total);
          const days = daysUntil(cp.date);
          const depHTML = cp.dependsOn ? `<div class="tl-dep">\u2190 ${cp.dependsOn}</div>` : '';
          tlHTML += `<div class="tl-node ${cls}"><div class="tl-dot"></div><div class="tl-label">${cp.name}</div><div class="tl-date">${cp.date}</div><div class="tl-days" style="color:${days.color}">${days.text}</div><div class="tl-kr" style="color:${krColor}">${cp.met}/${cp.total}</div>${depHTML}</div>`;
        });
        tl.innerHTML = tlHTML;

        // Cards
        const container = document.getElementById('cards');
        container.innerHTML = '';
        data.checkpoints.forEach((cp, i) => {
          const pct = Math.round((cp.met / cp.total) * 100);
          const offset = CIRC - (CIRC * pct) / 100;
          const ringColor = KR_COLOR(cp.met, cp.total);
          const tagCls = TAG_CLASS[cp.tag] || 'tag-pending';
          const openCls = i === 0 ? 'open' : '';
          const days = daysUntil(cp.date);

          let itemsHTML = '';
          cp.items.forEach((item) => {
            const whoHTML = item.assignee
              ? `<span class="av">${initials(item.assignee)}</span>${item.assignee.split(' ')[0]}`
              : '<span class="unassigned">unassigned</span>';
            const keyHTML = jiraLink(item.key, data.jiraBase);
            const doneHTML = item.doneWhen
              ? `<div class="item-done-when"><strong>Done when:</strong> ${item.doneWhen}</div>`
              : '';
            const progressHTML = renderProgress(item);

            itemsHTML += `
        <div class="item">
          ${renderBadge(item.status)}
          <div class="item-body">
            <div class="item-title-row"><span class="item-title">${item.title}</span>${keyHTML}</div>
            <div class="item-detail">${item.detail}</div>
            ${progressHTML}
            ${doneHTML}
          </div>
          <div class="item-who">${whoHTML}</div>
        </div>`;
          });

          const riskHTML = cp.riskNote ? `<div class="card-risk">${cp.riskNote}</div>` : '';

          const card = document.createElement('div');
          card.className = `card ${openCls}`;
          card.innerHTML = `
      <div class="card-head" onclick="this.parentElement.classList.toggle('open')">
        <div class="ring-wrap">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle class="ring-track" cx="22" cy="22" r="18" stroke-dasharray="${CIRC}" stroke-dashoffset="0"/>
            <circle class="ring-fill" cx="22" cy="22" r="18" stroke-dasharray="${CIRC}" stroke-dashoffset="${offset}" style="stroke:${ringColor}"/>
          </svg>
          <span class="ring-pct">${pct}%</span>
        </div>
        <div class="card-info">
          <div class="card-title">${cp.name}</div>
          <div class="card-sub">${cp.date} (<span style="color:${days.color}">${days.text}</span>) \u2014 ${cp.met}/${cp.total} met${cp.dependsOn ? ' \u00b7 depends on ' + cp.dependsOn : ''}</div>
          ${riskHTML}
        </div>
        <span class="tag ${tagCls}">${cp.tag}</span>
        <span class="arrow">\u25B6</span>
      </div>
      <div class="card-body">${itemsHTML}</div>`;
          container.appendChild(card);
        });

        // Resources
        const resEl = document.getElementById('resources');
        if (data.resourceAllocation) {
          let resHTML = '<div class="resource-grid">';
          for (const [name, r] of Object.entries(data.resourceAllocation)) {
            const dPct = r.total > 0 ? (r.done / r.total) * 100 : 0;
            const wPct = r.total > 0 ? (r.inProgress / r.total) * 100 : 0;
            const tPct = r.total > 0 ? (r.todo / r.total) * 100 : 0;
            const noteHTML = r.note ? `<div class="resource-note">${r.note}</div>` : '';
            resHTML += `<div class="resource-card"><div style="display:flex;justify-content:space-between;align-items:center"><span class="resource-name"><span class="av">${initials(name)}</span>${name}</span><span class="resource-count">${r.done}D ${r.inProgress}W ${r.todo}T</span></div><div class="resource-bar"><div class="resource-bar-done" style="width:${dPct}%"></div><div class="resource-bar-wip" style="width:${wPct}%"></div><div class="resource-bar-todo" style="width:${tPct}%"></div></div>${noteHTML}</div>`;
          }
          resHTML += '</div>';
          resEl.innerHTML = resHTML;
        }

        // Deferred
        document.getElementById('deferred').innerHTML = data.deferred
          .map((d) => {
            const triggerHTML = d.revisitTrigger
              ? `<span class="defer-trigger">${d.monitorOwner ? d.monitorOwner.split(' ')[0] + ' monitors: ' : 'Revisit: '}${d.revisitTrigger}</span>`
              : '';
            return `<div class="defer"><span class="defer-left"><b>${d.title}</b> (${jiraLink(d.key, data.jiraBase)}) \u2014 ${d.reason}</span>${triggerHTML}</div>`;
          })
          .join('');

        // Missed
        const missEl = document.getElementById('missed');
        if (!data.missed || data.missed.length === 0) {
          missEl.innerHTML = '<div class="missed-box">No missed milestones yet</div>';
        } else {
          missEl.innerHTML = data.missed
            .map(
              (m) =>
                `<div class="item" style="background:var(--surface);border-radius:8px;margin-top:6px">${renderBadge('blocked')}<div class="item-body"><div class="item-title">${m.checkpoint} \u2014 missed ${m.target}</div><div class="item-detail">Reason: ${m.reason}. Impact: ${m.impact}. Action: ${m.action}.</div></div></div>`,
            )
            .join('');
        }

        document.getElementById('footer').innerHTML =
          `${data.source} &bull; Last synced: ${data.updated}`;
      }

      // Data is loaded via <script src="go-live-data.js"> which sets window.GO_LIVE_DATA.
      // Edit go-live-data.js → refresh browser. Works on file:// with no server.
      if (typeof GO_LIVE_DATA !== 'undefined') {
        render(GO_LIVE_DATA);
      } else {
        document.getElementById('alert').innerHTML =
          '<strong>Could not load data.</strong> <span>Ensure <code>go-live-data.js</code> is in the same directory as this HTML file.</span>';
      }
    </script>
  </body>
</html>
